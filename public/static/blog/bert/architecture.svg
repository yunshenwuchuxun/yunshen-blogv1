<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#a0aec0"/>
    </marker>
  </defs>
  <rect width="780" height="360" rx="10" fill="#f7fafc" stroke="#e2e8f0"/>

  <!-- Title -->
  <text x="390" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#2d3748">BERT 预训练架构（深度双向 Transformer Encoder）</text>

  <!-- ===== Output Heads (Top) ===== -->
  <!-- MLM Head -->
  <rect x="80" y="46" width="280" height="50" rx="8" fill="#fefcbf" stroke="#d69e2e" stroke-width="1.3"/>
  <text x="220" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#975a16">MLM Head（掩码语言模型）</text>
  <text x="220" y="84" text-anchor="middle" font-size="10" fill="#975a16">预测被 [MASK] 遮盖的原始 Token</text>

  <!-- NSP Head -->
  <rect x="420" y="46" width="280" height="50" rx="8" fill="#fed7d7" stroke="#fc8181" stroke-width="1.3"/>
  <text x="560" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#9b2c2c">NSP Head（下一句预测）</text>
  <text x="560" y="84" text-anchor="middle" font-size="10" fill="#9b2c2c">[CLS] 输出 &#8594; 二分类 IsNext / NotNext</text>

  <!-- Arrows from Encoder to Heads -->
  <line x1="220" y1="130" x2="220" y2="96" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="560" y1="130" x2="560" y2="96" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- ===== BERT Encoder (Middle) ===== -->
  <rect x="40" y="130" width="700" height="120" rx="10" fill="#f5f0ff" stroke="#805ad5" stroke-width="1.5"/>

  <!-- Encoder Title -->
  <text x="390" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#6b46c1">BERT Encoder</text>

  <!-- Transformer Blocks -->
  <rect x="60" y="160" width="120" height="40" rx="6" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="120" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#553c9a">Transformer Block 1</text>

  <rect x="200" y="160" width="120" height="40" rx="6" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="260" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#553c9a">Transformer Block 2</text>

  <text x="370" y="184" text-anchor="middle" font-size="16" fill="#805ad5">&#8230;</text>

  <rect x="410" y="160" width="140" height="40" rx="6" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="480" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#553c9a">Transformer Block L</text>

  <!-- Bidirectional annotation -->
  <rect x="590" y="158" width="130" height="44" rx="6" fill="#fff" stroke="#805ad5" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="655" y="176" text-anchor="middle" font-size="10" font-weight="600" fill="#6b46c1">&#8592; 双向注意力 &#8594;</text>
  <text x="655" y="192" text-anchor="middle" font-size="9" fill="#805ad5">每个 Token 看全部上下文</text>

  <!-- Model sizes -->
  <text x="390" y="240" text-anchor="middle" font-size="10" fill="#718096">BERT-Base: L=12, H=768, A=12 (110M) &#160;&#160;|&#160;&#160; BERT-Large: L=24, H=1024, A=16 (340M)</text>

  <!-- ===== Input Layer (Bottom) ===== -->
  <!-- Arrow from Input to Encoder -->
  <line x1="390" y1="280" x2="390" y2="254" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="390" y="274" text-anchor="middle" font-size="9" fill="#718096">Token + Segment + Position Embedding</text>

  <!-- Input tokens -->
  <rect x="55" y="290" width="60" height="36" rx="5" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.2"/>
  <text x="85" y="313" text-anchor="middle" font-size="10" font-weight="700" fill="#2b6cb0">[CLS]</text>

  <rect x="125" y="290" width="55" height="36" rx="5" fill="#f0fff4" stroke="#38a169" stroke-width="1.2"/>
  <text x="152" y="313" text-anchor="middle" font-size="10" fill="#276749">Tok 1</text>

  <rect x="190" y="290" width="55" height="36" rx="5" fill="#f0fff4" stroke="#38a169" stroke-width="1.2"/>
  <text x="217" y="313" text-anchor="middle" font-size="10" fill="#276749">Tok 2</text>

  <text x="268" y="312" text-anchor="middle" font-size="12" fill="#a0aec0">&#8230;</text>

  <rect x="290" y="290" width="60" height="36" rx="5" fill="#fefcbf" stroke="#d69e2e" stroke-width="1.2"/>
  <text x="320" y="308" text-anchor="middle" font-size="9" font-weight="600" fill="#975a16">[MASK]</text>

  <text x="373" y="312" text-anchor="middle" font-size="12" fill="#a0aec0">&#8230;</text>

  <rect x="395" y="290" width="60" height="36" rx="5" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.2"/>
  <text x="425" y="313" text-anchor="middle" font-size="10" font-weight="700" fill="#2b6cb0">[SEP]</text>

  <rect x="465" y="290" width="55" height="36" rx="5" fill="#fff5f5" stroke="#fc8181" stroke-width="1.2"/>
  <text x="492" y="313" text-anchor="middle" font-size="10" fill="#9b2c2c">Tok A</text>

  <rect x="530" y="290" width="55" height="36" rx="5" fill="#fff5f5" stroke="#fc8181" stroke-width="1.2"/>
  <text x="557" y="313" text-anchor="middle" font-size="10" fill="#9b2c2c">Tok B</text>

  <text x="608" y="312" text-anchor="middle" font-size="12" fill="#a0aec0">&#8230;</text>

  <rect x="630" y="290" width="60" height="36" rx="5" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.2"/>
  <text x="660" y="313" text-anchor="middle" font-size="10" font-weight="700" fill="#2b6cb0">[SEP]</text>

  <!-- Sentence labels -->
  <text x="250" y="344" text-anchor="middle" font-size="9" fill="#38a169">&#8592; Sentence A &#8594;</text>
  <text x="560" y="344" text-anchor="middle" font-size="9" fill="#9b2c2c">&#8592; Sentence B &#8594;</text>
</svg>