<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" fill="none" role="img" aria-labelledby="fatitle fadesc">
	<title id="fatitle">五种 GELU 实现耗时对比</title>
	<desc id="fadesc">同一个 16384×16384 的 GELU，逐算子手写 PyTorch 要 8.1 毫秒、跑 6 个以上 kernel；融合成单个 kernel 后，无论是 PyTorch 原生、CUDA C++、Triton 还是 torch.compile，都在 1.1 到 1.85 毫秒之间，提速约 4 到 7 倍。</desc>
	<rect width="1200" height="540" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="492" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />

	<text x="56" y="76" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">同一个 GELU，五种写法</text>
	<text x="56" y="110" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="19">16384×16384 输入。差距全在 kernel 数量——多一个 kernel，就多一趟 HBM 往返。</text>

	<!-- 网格基线 -->
	<g stroke="#E5E7EB" stroke-width="1" font-family="ui-monospace, monospace" font-size="12" fill="#9CA3AF">
		<line x1="320" y1="150" x2="320" y2="470" />
		<line x1="500" y1="150" x2="500" y2="470" /><text x="500" y="492" text-anchor="middle">2ms</text>
		<line x1="680" y1="150" x2="680" y2="470" /><text x="680" y="492" text-anchor="middle">4ms</text>
		<line x1="860" y1="150" x2="860" y2="470" /><text x="860" y="492" text-anchor="middle">6ms</text>
		<line x1="1040" y1="150" x2="1040" y2="470" /><text x="1040" y="492" text-anchor="middle">8ms</text>
		<text x="320" y="492" text-anchor="middle">0</text>
	</g>

	<g font-family="Inter, Arial, sans-serif">
		<!-- 1. 手写 PyTorch 逐算子 -->
		<text x="304" y="196" text-anchor="end" fill="#334155" font-size="16" font-weight="600">手写 PyTorch（逐算子）</text>
		<rect x="320" y="176" width="729" height="40" rx="8" fill="#EF4444" />
		<text x="1062" y="202" fill="#B91C1C" font-family="ui-monospace, monospace" font-size="17" font-weight="800">8.1 ms</text>
		<text x="336" y="202" fill="#fff" font-size="13" font-weight="700">~6+ kernels · 中间结果反复往返 HBM</text>

		<!-- 2. Triton -->
		<text x="304" y="260" text-anchor="end" fill="#334155" font-size="16" font-weight="600">Triton（手写 block kernel）</text>
		<rect x="320" y="240" width="167" height="40" rx="8" fill="#8B5CF6" />
		<text x="500" y="266" fill="#6D28D9" font-family="ui-monospace, monospace" font-size="17" font-weight="800">1.85 ms</text>
		<text x="336" y="266" fill="#fff" font-size="13" font-weight="700">1 kernel</text>

		<!-- 3. CUDA C++ -->
		<text x="304" y="324" text-anchor="end" fill="#334155" font-size="16" font-weight="600">手写 CUDA C++ kernel</text>
		<rect x="320" y="304" width="162" height="40" rx="8" fill="#0EA5E9" />
		<text x="495" y="330" fill="#0369A1" font-family="ui-monospace, monospace" font-size="17" font-weight="800">1.8 ms</text>
		<text x="336" y="330" fill="#fff" font-size="13" font-weight="700">1 kernel</text>

		<!-- 4. torch.compile -->
		<text x="304" y="388" text-anchor="end" fill="#334155" font-size="16" font-weight="600">torch.compile（自动）</text>
		<rect x="320" y="368" width="132" height="40" rx="8" fill="#14B8A6" />
		<text x="465" y="394" fill="#0F766E" font-family="ui-monospace, monospace" font-size="17" font-weight="800">1.47 ms</text>
		<text x="336" y="394" fill="#fff" font-size="13" font-weight="700">1 kernel · 一行搞定</text>

		<!-- 5. PyTorch 原生 -->
		<text x="304" y="452" text-anchor="end" fill="#334155" font-size="16" font-weight="600">PyTorch 原生（已融合）</text>
		<rect x="320" y="432" width="99" height="40" rx="8" fill="#22C55E" />
		<text x="432" y="458" fill="#15803D" font-family="ui-monospace, monospace" font-size="17" font-weight="800">1.1 ms</text>
		<text x="336" y="458" fill="#fff" font-size="13" font-weight="700">1 kernel</text>
	</g>

	<!-- 旁注 -->
	<rect x="700" y="240" width="436" height="120" rx="14" fill="#ECFDF5" stroke="#6EE7B7" />
	<text x="724" y="276" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">结论：融合 ≈ 7× 提速</text>
	<text x="724" y="306" fill="#065F46" font-family="Inter, Arial, sans-serif" font-size="14">只要压成 1 个 kernel，四种方式都进入 1~2ms 区间；</text>
	<text x="724" y="330" fill="#065F46" font-family="Inter, Arial, sans-serif" font-size="14">彼此差异不大。瓶颈从来是 kernel 数量，</text>
	<text x="724" y="350" fill="#065F46" font-family="Inter, Arial, sans-serif" font-size="14">而不是用哪种语言写。</text>
</svg>
