<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" fill="none" role="img" aria-labelledby="tstitle tsdesc">
	<title id="tstitle">GPU 编程的抽象阶梯</title>
	<desc id="tsdesc">从上到下抽象逐层降低、控制力逐层提升：PyTorch 最省心但难控融合；torch.compile 自动融合一行接入；Triton 在 Python 里写 block 级 kernel，自动管理访存合并与共享内存；CUDA C++ 是 thread 级全手动。</desc>
	<defs>
		<marker id="ts" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#64748B" /></marker>
	</defs>
	<rect width="1200" height="540" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="492" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />

	<text x="56" y="76" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">从一行 Python 到一条 PTX 指令</text>
	<text x="56" y="110" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="19">越往下，你能控制的越多，要操心的也越多。Triton 卡在甜点位：写得像 Python，跑得接近手写。</text>

	<!-- 纵向轴 -->
	<g font-family="Inter, Arial, sans-serif" font-size="13" fill="#94A3B8">
		<line x1="92" y1="150" x2="92" y2="468" stroke="#CBD5E1" stroke-width="2" marker-end="url(#ts)" />
		<text x="78" y="170" transform="rotate(-90 78 300)" text-anchor="middle">抽象更低 · 控制更细 · 更费力 ↓</text>
	</g>

	<!-- 表头 -->
	<g font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#64748B">
		<text x="300" y="170" text-anchor="middle">层级</text>
		<text x="560" y="170" text-anchor="middle">你负责写</text>
		<text x="820" y="170" text-anchor="middle">谁来管访存细节</text>
		<text x="1050" y="170" text-anchor="middle">耗时</text>
	</g>

	<g font-family="Inter, Arial, sans-serif">
		<!-- PyTorch -->
		<rect x="120" y="184" width="1024" height="62" rx="12" fill="#F1F5F9" stroke="#CBD5E1" />
		<text x="160" y="222" fill="#0F172A" font-size="18" font-weight="700">PyTorch 算子</text>
		<text x="560" y="216" text-anchor="middle" fill="#475467" font-size="14">a*b + c……逐个调用</text>
		<text x="560" y="236" text-anchor="middle" fill="#94A3B8" font-size="12">最省心</text>
		<text x="820" y="222" text-anchor="middle" fill="#16A34A" font-size="14">框架全包，但每算子一个 kernel</text>
		<text x="1050" y="222" text-anchor="middle" fill="#B91C1C" font-family="ui-monospace, monospace" font-size="15" font-weight="700">8.1ms</text>

		<!-- torch.compile -->
		<rect x="120" y="256" width="1024" height="62" rx="12" fill="#ECFEFF" stroke="#67E8F9" />
		<text x="160" y="294" fill="#0E7490" font-size="18" font-weight="700">torch.compile</text>
		<text x="560" y="288" text-anchor="middle" fill="#475467" font-size="14">在原函数外包一行</text>
		<text x="560" y="308" text-anchor="middle" fill="#94A3B8" font-size="12">@torch.compile</text>
		<text x="820" y="294" text-anchor="middle" fill="#16A34A" font-size="14">编译器自动融合 + 选 kernel</text>
		<text x="1050" y="294" text-anchor="middle" fill="#0F766E" font-family="ui-monospace, monospace" font-size="15" font-weight="700">1.47ms</text>

		<!-- Triton -->
		<rect x="120" y="328" width="1024" height="78" rx="12" fill="#F5F3FF" stroke="#A78BFA" stroke-width="2.5" />
		<text x="160" y="362" fill="#6D28D9" font-size="18" font-weight="800">Triton ★</text>
		<text x="160" y="388" fill="#7C3AED" font-size="12">甜点位</text>
		<text x="560" y="362" text-anchor="middle" fill="#475467" font-size="14">block 级逻辑：load → 计算 → store</text>
		<text x="560" y="384" text-anchor="middle" fill="#94A3B8" font-size="12">@triton.jit，纯 Python 语法</text>
		<text x="820" y="362" text-anchor="middle" fill="#16A34A" font-size="14">编译器自动处理访存合并、</text>
		<text x="820" y="384" text-anchor="middle" fill="#16A34A" font-size="14">共享内存、线程调度</text>
		<text x="1050" y="372" text-anchor="middle" fill="#6D28D9" font-family="ui-monospace, monospace" font-size="15" font-weight="700">1.85ms</text>

		<!-- CUDA C++ -->
		<rect x="120" y="416" width="1024" height="62" rx="12" fill="#FFF7ED" stroke="#FDBA74" />
		<text x="160" y="454" fill="#C2410C" font-size="18" font-weight="700">CUDA C++</text>
		<text x="560" y="448" text-anchor="middle" fill="#475467" font-size="14">thread 级：算 index、判边界</text>
		<text x="560" y="468" text-anchor="middle" fill="#94A3B8" font-size="12">__global__ kernel</text>
		<text x="820" y="448" text-anchor="middle" fill="#DC2626" font-size="14">全手动：coalescing / 共享内存 / 同步</text>
		<text x="1050" y="454" text-anchor="middle" fill="#9A3412" font-family="ui-monospace, monospace" font-size="15" font-weight="700">1.8ms</text>
	</g>
</svg>
