<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none" role="img" aria-labelledby="gftitle gfdesc">
	<title id="gftitle">GELU 的逐算子写法 vs 融合写法</title>
	<desc id="gfdesc">逐算子写 GELU 时，每个 elementwise 运算（立方、乘、加、tanh 等）都是一个独立 kernel，各自把整张张量在 HBM 上读出写回；融合后整条计算链合成一个 kernel，只在首尾各读写一次 HBM。</desc>
	<defs>
		<marker id="gf" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#94A3B8" /></marker>
	</defs>
	<rect width="1200" height="520" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="472" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />

	<text x="56" y="76" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">GELU：一条公式，能拆成 8 个 kernel</text>
	<text x="56" y="110" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="18" font-family-x="monospace">GELU(x) = 0.5·x·(1 + tanh(0.798·(x + 0.0447·x³)))，全是逐元素运算。</text>

	<!-- 左：逐算子 -->
	<rect x="56" y="140" width="520" height="332" rx="18" fill="#FEF2F2" stroke="#FCA5A5" />
	<text x="80" y="178" fill="#B91C1C" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">逐算子：每个运算都进出 HBM</text>
	<g font-family="ui-monospace, Menlo, monospace" font-size="13" text-anchor="middle">
		<g>
			<rect x="84" y="200" width="64" height="36" rx="7" fill="#E5E7EB" stroke="#9CA3AF" /><text x="116" y="223" fill="#374151">HBM</text>
			<rect x="200" y="200" width="92" height="36" rx="7" fill="#FCA5A5" fill-opacity="0.5" stroke="#DC2626" /><text x="246" y="223" fill="#991B1B" font-weight="700">x³</text>
			<rect x="344" y="200" width="64" height="36" rx="7" fill="#E5E7EB" stroke="#9CA3AF" /><text x="376" y="223" fill="#374151">HBM</text>
			<rect x="430" y="200" width="116" height="36" rx="7" fill="#FCA5A5" fill-opacity="0.5" stroke="#DC2626" /><text x="488" y="223" fill="#991B1B" font-weight="700">+ 0.0447·</text>
		</g>
		<g>
			<rect x="84" y="256" width="64" height="36" rx="7" fill="#E5E7EB" stroke="#9CA3AF" /><text x="116" y="279" fill="#374151">HBM</text>
			<rect x="200" y="256" width="92" height="36" rx="7" fill="#FCA5A5" fill-opacity="0.5" stroke="#DC2626" /><text x="246" y="279" fill="#991B1B" font-weight="700">× 0.798</text>
			<rect x="344" y="256" width="64" height="36" rx="7" fill="#E5E7EB" stroke="#9CA3AF" /><text x="376" y="279" fill="#374151">HBM</text>
			<rect x="430" y="256" width="116" height="36" rx="7" fill="#FCA5A5" fill-opacity="0.5" stroke="#DC2626" /><text x="488" y="279" fill="#991B1B" font-weight="700">tanh</text>
		</g>
		<g>
			<rect x="84" y="312" width="64" height="36" rx="7" fill="#E5E7EB" stroke="#9CA3AF" /><text x="116" y="335" fill="#374151">HBM</text>
			<rect x="200" y="312" width="92" height="36" rx="7" fill="#FCA5A5" fill-opacity="0.5" stroke="#DC2626" /><text x="246" y="335" fill="#991B1B" font-weight="700">1 +</text>
			<rect x="344" y="312" width="64" height="36" rx="7" fill="#E5E7EB" stroke="#9CA3AF" /><text x="376" y="335" fill="#374151">HBM</text>
			<rect x="430" y="312" width="116" height="36" rx="7" fill="#FCA5A5" fill-opacity="0.5" stroke="#DC2626" /><text x="488" y="335" fill="#991B1B" font-weight="700">× 0.5x</text>
		</g>
		<g stroke="#94A3B8" stroke-width="1.6" marker-end="url(#gf)">
			<line x1="148" y1="218" x2="198" y2="218" /><line x1="292" y1="218" x2="342" y2="218" /><line x1="408" y1="218" x2="428" y2="218" />
			<line x1="148" y1="274" x2="198" y2="274" /><line x1="292" y1="274" x2="342" y2="274" /><line x1="408" y1="274" x2="428" y2="274" />
			<line x1="148" y1="330" x2="198" y2="330" /><line x1="292" y1="330" x2="342" y2="330" /><line x1="408" y1="330" x2="428" y2="330" />
		</g>
	</g>
	<rect x="200" y="372" width="232" height="34" rx="17" fill="#B91C1C" /><text x="316" y="395" text-anchor="middle" fill="#fff" font-family="ui-monospace, monospace" font-size="15" font-weight="700">≈ 6+ kernel · 反复进出 HBM</text>
	<text x="316" y="444" text-anchor="middle" fill="#991B1B" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">8.1 ms</text>

	<!-- 右：融合 -->
	<rect x="604" y="140" width="540" height="332" rx="18" fill="#ECFDF5" stroke="#6EE7B7" />
	<text x="628" y="178" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">融合：读一次，片上连算，写一次</text>
	<g font-family="ui-monospace, Menlo, monospace" font-size="13" text-anchor="middle">
		<rect x="632" y="252" width="64" height="40" rx="8" fill="#E5E7EB" stroke="#9CA3AF" /><text x="664" y="277" fill="#374151">HBM</text>
		<rect x="724" y="214" width="320" height="116" rx="14" fill="#34D399" fill-opacity="0.16" stroke="#059669" />
		<text x="884" y="240" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">融合 kernel（寄存器/片上）</text>
		<g font-size="11">
			<rect x="742" y="256" width="52" height="30" rx="6" fill="#34D399" fill-opacity="0.5" stroke="#059669" /><text x="768" y="276" fill="#065F46" font-weight="700">x³</text>
			<rect x="804" y="256" width="52" height="30" rx="6" fill="#34D399" fill-opacity="0.5" stroke="#059669" /><text x="830" y="276" fill="#065F46" font-weight="700">+×</text>
			<rect x="866" y="256" width="60" height="30" rx="6" fill="#34D399" fill-opacity="0.5" stroke="#059669" /><text x="896" y="276" fill="#065F46" font-weight="700">tanh</text>
			<rect x="936" y="256" width="92" height="30" rx="6" fill="#34D399" fill-opacity="0.5" stroke="#059669" /><text x="982" y="276" fill="#065F46" font-weight="700">1+ · ×0.5x</text>
		</g>
		<rect x="1064" y="252" width="60" height="40" rx="8" fill="#E5E7EB" stroke="#9CA3AF" /><text x="1094" y="277" fill="#374151" font-size="12">HBM</text>
		<g stroke="#94A3B8" stroke-width="2" marker-end="url(#gf)">
			<line x1="696" y1="272" x2="722" y2="272" /><line x1="1046" y1="272" x2="1062" y2="272" />
		</g>
	</g>
	<rect x="724" y="372" width="232" height="34" rx="17" fill="#047857" /><text x="840" y="395" text-anchor="middle" fill="#fff" font-family="ui-monospace, monospace" font-size="15" font-weight="700">1 kernel · 首尾各 1 趟 HBM</text>
	<text x="840" y="444" text-anchor="middle" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">1.1 ms　≈ 7× 更快</text>
</svg>
