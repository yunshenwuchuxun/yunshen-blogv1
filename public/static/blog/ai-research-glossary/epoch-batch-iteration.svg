  <!-- Epoch 2 -->
  <rect x="16" y="250" width="508" height="100" rx="8" fill="#f0fff4" stroke="#c6f6d5"/>
  <text x="36" y="273" font-size="14" font-weight="700" fill="#276749">Epoch 2</text>

  <text x="50" y="300" font-size="12" fill="#4a5568">Iteration 3 :</text>
  <rect x="140" y="286" width="22" height="20" rx="3" fill="#4299e1"/>
  <rect x="166" y="286" width="22" height="20" rx="3" fill="#4299e1"/>
  <rect x="192" y="286" width="22" height="20" rx="3" fill="#4299e1"/>
  <rect x="218" y="286" width="22" height="20" rx="3" fill="#4299e1"/>
