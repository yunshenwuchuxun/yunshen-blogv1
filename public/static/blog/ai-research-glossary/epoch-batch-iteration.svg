  <rect x="64" y="70" width="34" height="34" rx="5" fill="#4299e1"/>
  <text x="81" y="92" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">2</text>
  <rect x="104" y="70" width="34" height="34" rx="5" fill="#4299e1"/>
  <text x="121" y="92" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">3</text>
  <rect x="144" y="70" width="34" height="34" rx="5" fill="#4299e1"/>
  <text x="161" y="92" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">4</text>

  <!-- Batch 2 green -->
  <rect x="196" y="70" width="34" height="34" rx="5" fill="#48bb78"/>
  <text x="213" y="92" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">5</text>
  <rect x="236" y="70" width="34" height="34" rx="5" fill="#48bb78"/>
  <text x="253" y="92" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">6</text>
  <rect x="276" y="70" width="34" height="34" rx="5" fill="#48bb78"/>
  <text x="293" y="92" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">7</text>
  <rect x="316" y="70" width="34" height="34" rx="5" fill="#48bb78"/>
  <text x="333" y="92" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">8</text>

  <!-- Batch bracket labels -->
  <line x1="24" y1="112" x2="178" y2="112" stroke="#4299e1" stroke-width="1.5"/>
  <text x="101" y="126" text-anchor="middle" font-size="12" fill="#4299e1" font-weight="600">Batch 1</text>
  <line x1="196" y1="112" x2="350" y2="112" stroke="#48bb78" stroke-width="1.5"/>
  <text x="273" y="126" text-anchor="middle" font-size="12" fill="#48bb78" font-weight="600">Batch 2</text>

  <!-- Epoch 1 -->
  <rect x="16" y="140" width="508" height="100" rx="8" fill="#ebf8ff" stroke="#bee3f8"/>
  <text x="36" y="163" font-size="14" font-weight="700" fill="#2b6cb0">Epoch 1</text>

  <text x="50" y="190" font-size="12" fill="#4a5568">Iteration 1 :</text>
  <rect x="140" y="176" width="22" height="20" rx="3" fill="#4299e1"/>
  <rect x="166" y="176" width="22" height="20" rx="3" fill="#4299e1"/>
  <rect x="192" y="176" width="22" height="20" rx="3" fill="#4299e1"/>
  <rect x="218" y="176" width="22" height="20" rx="3" fill="#4299e1"/>
  <text x="260" y="191" font-size="12" fill="#718096">&#8594; 更新参数</text>

  <text x="50" y="220" font-size="12" fill="#4a5568">Iteration 2 :</text>
  <rect x="140" y="206" width="22" height="20" rx="3" fill="#48bb78"/>
  <rect x="166" y="206" width="22" height="20" rx="3" fill="#48bb78"/>
  <rect x="192" y="206" width="22" height="20" rx="3" fill="#48bb78"/>
  <rect x="218" y="206" width="22" height="20" rx="3" fill="#48bb78"/>
