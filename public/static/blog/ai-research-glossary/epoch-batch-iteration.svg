<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 410" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="540" height="410" rx="10" fill="#f7fafc" stroke="#e2e8f0"/>

  <text x="270" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Epoch / Batch / Iteration</text>

  <!-- Dataset -->
  <text x="24" y="58" font-size="13" fill="#4a5568">训练集: 8 个样本</text>
  <text x="340" y="58" font-size="13" fill="#4a5568" font-weight="600">Batch Size = 4</text>

  <!-- 8 sample boxes: Batch 1 blue -->
  <rect x="24" y="70" width="34" height="34" rx="5" fill="#4299e1"/>
