  <text x="50" y="330" font-size="12" fill="#4a5568">Iteration 4 :</text>
  <rect x="140" y="316" width="22" height="20" rx="3" fill="#48bb78"/>
  <rect x="166" y="316" width="22" height="20" rx="3" fill="#48bb78"/>
  <rect x="192" y="316" width="22" height="20" rx="3" fill="#48bb78"/>
  <rect x="218" y="316" width="22" height="20" rx="3" fill="#48bb78"/>
  <text x="260" y="331" font-size="12" fill="#718096">&#8594; 更新参数</text>

  <!-- Summary -->
  <rect x="80" y="366" width="380" height="30" rx="6" fill="#edf2f7"/>
  <text x="270" y="386" text-anchor="middle" font-size="13" font-weight="600" fill="#2d3748">2 Epochs &#215; 2 Iters/Epoch = 4 Iterations</text>
</svg>