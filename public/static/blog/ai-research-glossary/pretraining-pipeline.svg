<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#a0aec0"/>
    </marker>
  </defs>
  <rect width="700" height="240" rx="10" fill="#f7fafc" stroke="#e2e8f0"/>

  <!-- Stage 1: Large data -->
  <rect x="20" y="60" width="120" height="60" rx="8" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.5"/>
  <text x="80" y="86" text-anchor="middle" font-size="13" font-weight="600" fill="#2b6cb0">大规模数据</text>
  <text x="80" y="104" text-anchor="middle" font-size="10" fill="#718096">（无标注）</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="90" x2="184" y2="90" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="162" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#805ad5">Pre-train</text>

  <!-- Stage 2: Pre-trained model -->
  <rect x="186" y="60" width="120" height="60" rx="8" fill="#f5f0ff" stroke="#805ad5" stroke-width="1.5"/>
  <text x="246" y="86" text-anchor="middle" font-size="13" font-weight="600" fill="#6b46c1">预训练模型</text>
  <text x="246" y="104" text-anchor="middle" font-size="10" fill="#718096">（通用表示）</text>

  <!-- Arrow 2 -->
  <line x1="306" y1="90" x2="350" y2="90" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="328" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#38a169">Fine-tune</text>

  <!-- Small labeled data (below arrow 2) -->
  <rect x="306" y="120" width="80" height="36" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="1.2"/>
  <text x="346" y="135" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">少量标注</text>
  <text x="346" y="149" text-anchor="middle" font-size="10" fill="#276749">数据</text>
  <line x1="336" y1="120" x2="328" y2="100" stroke="#48bb78" stroke-width="1.2" stroke-dasharray="4 2"/>

  <!-- Stage 3: Task model -->
  <rect x="352" y="60" width="120" height="60" rx="8" fill="#f0fff4" stroke="#38a169" stroke-width="1.5"/>
  <text x="412" y="86" text-anchor="middle" font-size="13" font-weight="600" fill="#276749">任务模型</text>
  <text x="412" y="104" text-anchor="middle" font-size="10" fill="#718096">（专用）</text>

  <!-- Arrow 3 -->
  <line x1="472" y1="90" x2="516" y2="90" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Downstream tasks -->
  <rect x="518" y="24" width="160" height="130" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="598" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#2d3748">下游任务</text>
  <rect x="534" y="56" width="128" height="26" rx="5" fill="#fed7d7"/>
  <text x="598" y="74" text-anchor="middle" font-size="11" fill="#9b2c2c">情感分析</text>
  <rect x="534" y="88" width="128" height="26" rx="5" fill="#fefcbf"/>
  <text x="598" y="106" text-anchor="middle" font-size="11" fill="#975a16">问答系统</text>
  <rect x="534" y="120" width="128" height="26" rx="5" fill="#c6f6d5"/>
  <text x="598" y="138" text-anchor="middle" font-size="11" fill="#276749">文本生成</text>

  <!-- Bottom summary -->
  <rect x="100" y="190" width="500" height="34" rx="6" fill="#edf2f7"/>
  <text x="350" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">Pre-training &#8594; Fine-tuning 是当前 AI 的主流范式（GPT / BERT / ViT）</text>
</svg>