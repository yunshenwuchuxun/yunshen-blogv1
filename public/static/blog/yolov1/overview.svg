<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7FB"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DE1D8D"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 42px Inter, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 22px Inter, Arial, sans-serif; fill: #334155; }
      .label { font: 700 22px Inter, Arial, sans-serif; fill: #0F172A; }
      .body { font: 400 18px Inter, Arial, sans-serif; fill: #475569; }
      .small { font: 600 16px Inter, Arial, sans-serif; fill: #64748B; letter-spacing: 0.04em; }
      .pill { font: 700 16px Inter, Arial, sans-serif; fill: #FFFFFF; }
      .mini { font: 600 15px Inter, Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>

  <rect x="56" y="48" width="188" height="36" rx="18" fill="url(#accent)"/>
  <text x="150" y="72" text-anchor="middle" class="pill">YOLOv1 Overview</text>

  <text x="56" y="138" class="title">从候选框流水线到统一回归</text>
  <text x="56" y="176" class="subtitle">YOLOv1 把目标检测改写为一次前向传播完成的端到端预测任务</text>

  <g filter="url(#shadow)">
    <rect x="56" y="228" width="290" height="364" rx="24" fill="#FFFFFF"/>
    <rect x="376" y="228" width="448" height="364" rx="24" fill="#FFFFFF"/>
    <rect x="854" y="228" width="290" height="364" rx="24" fill="#FFFFFF"/>
  </g>

  <text x="88" y="276" class="small">BEFORE YOLO</text>
  <text x="88" y="314" class="label">两阶段检测</text>
  <text x="88" y="358" class="body">1. 生成候选区域</text>
  <text x="88" y="392" class="body">2. 提取区域特征</text>
  <text x="88" y="426" class="body">3. 分类 + 边框回归</text>
  <text x="88" y="482" class="body">优点：定位精细</text>
  <text x="88" y="516" class="body">代价：流程割裂、推理慢</text>
  <rect x="88" y="546" width="132" height="32" rx="16" fill="#FCE7F3"/>
  <text x="154" y="567" text-anchor="middle" class="mini">R-CNN 系列</text>

  <text x="408" y="276" class="small">YOLOV1 CORE IDEA</text>
  <text x="408" y="314" class="label">统一预测</text>
  <text x="408" y="356" class="body">输入图像 → CNN → 7 × 7 × 30 输出张量</text>
  <text x="408" y="396" class="body">每个 grid cell 预测 2 个框 + 20 类条件概率</text>

  <rect x="408" y="432" width="384" height="108" rx="18" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="430" y="470" class="mini">输出结构</text>
  <text x="430" y="510" class="label">S × S × (5B + C)</text>
  <text x="650" y="510" class="body">= 7 × 7 × (5 × 2 + 20)</text>

  <rect x="430" y="560" width="110" height="32" rx="16" fill="#FCE7F3"/>
  <text x="485" y="581" text-anchor="middle" class="mini">实时</text>
  <rect x="552" y="560" width="110" height="32" rx="16" fill="#EDE9FE"/>
  <text x="607" y="581" text-anchor="middle" class="mini">端到端</text>
  <rect x="674" y="560" width="118" height="32" rx="16" fill="#E0F2FE"/>
  <text x="733" y="581" text-anchor="middle" class="mini">全局感知</text>

  <text x="886" y="276" class="small">LIMITATIONS</text>
  <text x="886" y="314" class="label">为什么它仍不完美</text>
  <text x="886" y="358" class="body">• 7 × 7 特征图分辨率偏低</text>
  <text x="886" y="392" class="body">• 一个 cell 只能负责一个目标</text>
  <text x="886" y="426" class="body">• 小目标与密集场景较弱</text>
  <text x="886" y="460" class="body">• 尚未引入 anchor 机制</text>
  <rect x="886" y="520" width="174" height="32" rx="16" fill="#F1F5F9"/>
  <text x="973" y="541" text-anchor="middle" class="mini">one-stage 起点</text>

  <path d="M332 410H376" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M810 410H854" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M360 394L384 410L360 426" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M838 394L862 410L838 426" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
