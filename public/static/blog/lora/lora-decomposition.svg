<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" fill="none">
  <rect width="1200" height="860" fill="#FFF7ED"/>
  <text x="60" y="92" fill="#7C2D12" font-size="38" font-family="Arial, sans-serif" font-weight="700">低秩分解把“大更新矩阵”压缩成两个小矩阵</text>
  <text x="60" y="128" fill="#9A3412" font-size="21" font-family="Arial, sans-serif">与其直接学习 d_out × d_in 的完整更新，不如只在 rank = r 的子空间里学习。</text>

  <rect x="90" y="210" width="250" height="380" rx="22" fill="#CBD5E1" stroke="#475569" stroke-width="4"/>
  <g stroke="#64748B" stroke-width="2">
    <path d="M121 210V590"/><path d="M152 210V590"/><path d="M183 210V590"/><path d="M214 210V590"/><path d="M245 210V590"/><path d="M276 210V590"/><path d="M307 210V590"/>
    <path d="M90 252H340"/><path d="M90 294H340"/><path d="M90 336H340"/><path d="M90 378H340"/><path d="M90 420H340"/><path d="M90 462H340"/><path d="M90 504H340"/><path d="M90 546H340"/>
  </g>
  <text x="215" y="640" text-anchor="middle" fill="#0F172A" font-size="34" font-family="Arial, sans-serif" font-weight="700">ΔW</text>
  <text x="215" y="674" text-anchor="middle" fill="#475569" font-size="22" font-family="Arial, sans-serif">完整更新矩阵</text>

  <text x="405" y="430" fill="#7C2D12" font-size="72" font-family="Arial, sans-serif" font-weight="700">=</text>

  <rect x="500" y="250" width="120" height="320" rx="20" fill="#FB923C" stroke="#9A3412" stroke-width="4"/>
  <g stroke="#9A3412" stroke-width="2">
    <path d="M530 250V570"/><path d="M560 250V570"/><path d="M590 250V570"/>
    <path d="M500 290H620"/><path d="M500 330H620"/><path d="M500 370H620"/><path d="M500 410H620"/><path d="M500 450H620"/><path d="M500 490H620"/><path d="M500 530H620"/>
  </g>
  <text x="560" y="224" text-anchor="middle" fill="#9A3412" font-size="23" font-family="Arial, sans-serif">d_out × r</text>
  <text x="560" y="640" text-anchor="middle" fill="#7C2D12" font-size="34" font-family="Arial, sans-serif" font-weight="700">B</text>

  <text x="682" y="430" fill="#7C2D12" font-size="60" font-family="Arial, sans-serif" font-weight="700">×</text>

  <rect x="770" y="365" width="280" height="92" rx="18" fill="#2DD4BF" stroke="#115E59" stroke-width="4"/>
  <g stroke="#115E59" stroke-width="2">
    <path d="M816 365V457"/><path d="M862 365V457"/><path d="M908 365V457"/><path d="M954 365V457"/><path d="M1000 365V457"/>
    <path d="M770 411H1050"/>
  </g>
  <text x="910" y="340" text-anchor="middle" fill="#115E59" font-size="23" font-family="Arial, sans-serif">r × d_in</text>
  <text x="910" y="640" text-anchor="middle" fill="#134E4A" font-size="34" font-family="Arial, sans-serif" font-weight="700">A</text>

  <rect x="90" y="738" width="1020" height="74" rx="14" fill="#FFEDD5" stroke="#FDBA74"/>
  <text x="118" y="774" fill="#7C2D12" font-size="20" font-family="Arial, sans-serif">
    <tspan x="118" dy="0">如果 r 很小，那么需要学习的参数量就会从 d_out × d_in</tspan>
    <tspan x="118" dy="28">下降到 d_out × r + r × d_in。LoRA 的收益就来自这一步压缩。</tspan>
  </text>
</svg>