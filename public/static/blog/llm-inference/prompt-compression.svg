<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="450" viewBox="0 0 1200 450" fill="none" role="img" aria-labelledby="t d">
	<title id="t">三种提示词压缩</title>
	<desc id="d">硬压缩删改离散 token，软压缩换成连续向量，视觉压缩把文本渲染成图像。</desc>
	<rect width="1200" height="450" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="402" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />
	<text x="56" y="70" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">把输入变短：三种提示词压缩</text>
	<text x="56" y="100" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="17">prefill 成本与 KV Cache 都随 prompt 长度增长，所以第三条路是直接压缩输入。</text>

	<g font-family="Inter, Arial, sans-serif">
		<!-- 硬压缩 -->
		<rect x="56" y="138" width="346" height="266" rx="16" fill="#EEF2FF" stroke="#6366F1" />
		<text x="80" y="178" fill="#3730A3" font-size="19" font-weight="700">硬压缩</text>
		<text x="80" y="202" fill="#6366F1" font-size="13">在离散 token 层面删 / 改</text>
		<g>
			<rect x="80" y="226" width="40" height="26" rx="4" fill="#C7D2FE" /><rect x="126" y="226" width="40" height="26" rx="4" fill="#E5E7EB" /><rect x="172" y="226" width="40" height="26" rx="4" fill="#C7D2FE" /><rect x="218" y="226" width="40" height="26" rx="4" fill="#E5E7EB" /><rect x="264" y="226" width="40" height="26" rx="4" fill="#C7D2FE" /><rect x="310" y="226" width="40" height="26" rx="4" fill="#E5E7EB" />
		</g>
		<text x="215" y="284" fill="#4338CA" font-size="13" text-anchor="middle">↓ 只留最相关的</text>
		<g>
			<rect x="130" y="300" width="40" height="26" rx="4" fill="#6366F1" /><rect x="176" y="300" width="40" height="26" rx="4" fill="#6366F1" /><rect x="222" y="300" width="40" height="26" rx="4" fill="#6366F1" />
		</g>
		<text x="229" y="368" fill="#6366F1" font-size="13" text-anchor="middle">筛选关键句 / 改写精简</text>

		<!-- 软压缩 -->
		<rect x="426" y="138" width="346" height="266" rx="16" fill="#ECFEFF" stroke="#0891B2" />
		<text x="450" y="178" fill="#155E75" font-size="19" font-weight="700">软压缩</text>
		<text x="450" y="202" fill="#0891B2" font-size="13">换成连续向量替代 token</text>
		<g>
			<rect x="450" y="226" width="34" height="26" rx="4" fill="#A5F3FC" /><rect x="490" y="226" width="34" height="26" rx="4" fill="#A5F3FC" /><rect x="530" y="226" width="34" height="26" rx="4" fill="#A5F3FC" /><rect x="570" y="226" width="34" height="26" rx="4" fill="#A5F3FC" /><rect x="610" y="226" width="34" height="26" rx="4" fill="#A5F3FC" /><rect x="650" y="226" width="34" height="26" rx="4" fill="#A5F3FC" />
		</g>
		<text x="599" y="284" fill="#0E7490" font-size="13" text-anchor="middle">↓ 编码</text>
		<rect x="520" y="300" width="160" height="30" rx="8" fill="#0891B2" />
		<text x="600" y="321" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">连续向量</text>
		<text x="599" y="368" fill="#0891B2" font-size="13" text-anchor="middle">更紧凑，但可解释性差</text>

		<!-- 视觉压缩 -->
		<rect x="796" y="138" width="340" height="266" rx="16" fill="#F5F3FF" stroke="#7C3AED" />
		<text x="820" y="178" fill="#5B21B6" font-size="19" font-weight="700">视觉压缩</text>
		<text x="820" y="202" fill="#7C3AED" font-size="13">DeepSeek-OCR：文本 → 图像</text>
		<g>
			<rect x="820" y="224" width="120" height="30" rx="5" fill="#FFFFFF" stroke="#C4B5FD" />
			<line x1="830" y1="234" x2="930" y2="234" stroke="#DDD6FE" stroke-width="3" /><line x1="830" y1="244" x2="910" y2="244" stroke="#DDD6FE" stroke-width="3" />
			<text x="824" y="284" fill="#6D28D9" font-size="13">↓ 渲染成图片，视觉编码读回</text>
		</g>
		<rect x="900" y="300" width="120" height="64" rx="8" fill="#DDD6FE" stroke="#7C3AED" />
		<text x="960" y="330" fill="#5B21B6" font-size="13" text-anchor="middle">固定维度</text>
		<text x="960" y="350" fill="#5B21B6" font-size="13" text-anchor="middle">图像表示</text>
	</g>
</svg>
