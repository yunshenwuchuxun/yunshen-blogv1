<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">LLM 推理优化封面</title>
	<desc id="desc">LLM 推理的瓶颈从算力转向带宽：大多数时候 GPU 不是在算，而是在等数据从显存搬过来。</desc>
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#0b1120" />
			<stop offset="0.5" stop-color="#111a2e" />
			<stop offset="1" stop-color="#1e293b" />
		</linearGradient>
		<linearGradient id="accentA" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#22d3ee" />
			<stop offset="1" stop-color="#a78bfa" />
		</linearGradient>
		<filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
			<feGaussianBlur stdDeviation="5" result="blur" />
			<feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
		</filter>
	</defs>
	<rect width="1200" height="630" fill="url(#bg)" />

	<text x="80" y="116" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="3">DATAWHALE diy-llm · CH.10</text>
	<text x="80" y="196" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="800">LLM 推理优化</text>
	<text x="80" y="258" fill="url(#accentA)" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">当瓶颈从"算力"变成"带宽"</text>

	<text x="80" y="324" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="23">推理慢，多数时候不是 GPU 算不过来，而是它在"等数据"。</text>
	<text x="80" y="360" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="23">读懂这一点，省显存、省步数、省输入三条优化路线便顺理成章。</text>

	<!-- 右侧：roofline 示意 -->
	<g transform="translate(720,372)" font-family="Inter, Arial, sans-serif">
		<line x1="0" y1="0" x2="0" y2="190" stroke="#475569" stroke-width="2" />
		<line x1="0" y1="190" x2="400" y2="190" stroke="#475569" stroke-width="2" />
		<text x="-8" y="-4" fill="#64748b" font-size="15" text-anchor="end">性能</text>
		<text x="400" y="214" fill="#64748b" font-size="15" text-anchor="end">算术强度 (FLOPs/byte)</text>
		<!-- roofline: 斜坡 + 平台 -->
		<line x1="6" y1="184" x2="200" y2="40" stroke="url(#accentA)" stroke-width="4" filter="url(#glow)" />
		<line x1="200" y1="40" x2="396" y2="40" stroke="#a78bfa" stroke-width="4" />
		<line x1="200" y1="40" x2="200" y2="190" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 5" />
		<text x="200" y="172" fill="#7dd3fc" font-size="14" text-anchor="middle">295</text>
		<!-- B=1 点在内存受限区 -->
		<circle cx="60" cy="146" r="7" fill="#f472b6" />
		<text x="72" y="142" fill="#f9a8d4" font-size="14">B=1（内存受限）</text>
		<text x="300" y="32" fill="#67e8f9" font-size="14" text-anchor="middle">批处理 → 算力饱和</text>
	</g>
</svg>
