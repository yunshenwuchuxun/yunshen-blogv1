<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" fill="none" role="img" aria-labelledby="ntitle ndesc">
	<title id="ntitle">Post-Norm 与 Pre-Norm 对比</title>
	<desc id="ndesc">Post-Norm 把 LayerNorm 放在残差相加之后，Pre-Norm 放在子层之前，后者训练更稳定、无需学习率预热。</desc>
	<rect width="1200" height="560" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="512" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />
	<text x="56" y="78" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">归一化放哪里：Post-Norm vs Pre-Norm</text>
	<text x="56" y="112" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="18">现代大模型几乎都把 LayerNorm 前移到子层之前，让残差成为一条干净的恒等通路。</text>

	<defs>
		<marker id="ar3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475467" /></marker>
	</defs>

	<!-- 左：Post-Norm -->
	<g font-family="Inter, Arial, sans-serif" text-anchor="middle">
		<rect x="80" y="150" width="460" height="360" rx="16" fill="#FEF2F2" stroke="#FCA5A5" />
		<text x="310" y="184" fill="#B91C1C" font-size="22" font-weight="700">Post-Norm（原始论文）</text>

		<rect x="240" y="456" width="160" height="36" rx="8" fill="#E2E8F0" stroke="#94A3B8" /><text x="320" y="480" fill="#334155" font-size="15" font-weight="600">输入 x</text>
		<line x1="320" y1="456" x2="320" y2="430" stroke="#475467" stroke-width="2" marker-end="url(#ar3)" />
		<rect x="220" y="382" width="200" height="46" rx="10" fill="#60A5FA" fill-opacity="0.22" stroke="#2563EB" /><text x="320" y="411" fill="#1D4ED8" font-size="16" font-weight="700">子层 Sublayer(x)</text>
		<line x1="320" y1="382" x2="320" y2="356" stroke="#475467" stroke-width="2" marker-end="url(#ar3)" />
		<rect x="240" y="312" width="160" height="42" rx="10" fill="#FBBF24" fill-opacity="0.3" stroke="#D97706" /><text x="320" y="339" fill="#92400E" font-size="16" font-weight="700">⊕ 残差相加</text>
		<line x1="320" y1="312" x2="320" y2="286" stroke="#475467" stroke-width="2" marker-end="url(#ar3)" />
		<rect x="230" y="240" width="180" height="46" rx="10" fill="#F472B6" fill-opacity="0.25" stroke="#DB2777" /><text x="320" y="269" fill="#9D174D" font-size="16" font-weight="700">LayerNorm</text>
		<!-- 残差从输入绕到相加 -->
		<path d="M240,474 C150,474 150,333 240,333" stroke="#EA580C" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#ar3)" />
		<text x="310" y="222" fill="#B91C1C" font-family="ui-monospace, monospace" font-size="14">x = LayerNorm(x + Sublayer(x))</text>
	</g>

	<!-- 右：Pre-Norm -->
	<g font-family="Inter, Arial, sans-serif" text-anchor="middle">
		<rect x="660" y="150" width="460" height="360" rx="16" fill="#F0FDF4" stroke="#86EFAC" />
		<text x="890" y="184" fill="#15803D" font-size="22" font-weight="700">Pre-Norm（现代主流）</text>

		<rect x="820" y="456" width="160" height="36" rx="8" fill="#E2E8F0" stroke="#94A3B8" /><text x="900" y="480" fill="#334155" font-size="15" font-weight="600">输入 x</text>
		<line x1="900" y1="456" x2="900" y2="430" stroke="#475467" stroke-width="2" marker-end="url(#ar3)" />
		<rect x="810" y="382" width="180" height="46" rx="10" fill="#F472B6" fill-opacity="0.25" stroke="#DB2777" /><text x="900" y="411" fill="#9D174D" font-size="16" font-weight="700">LayerNorm</text>
		<line x1="900" y1="382" x2="900" y2="356" stroke="#475467" stroke-width="2" marker-end="url(#ar3)" />
		<rect x="800" y="312" width="200" height="44" rx="10" fill="#60A5FA" fill-opacity="0.22" stroke="#2563EB" /><text x="900" y="340" fill="#1D4ED8" font-size="16" font-weight="700">子层 Sublayer</text>
		<line x1="900" y1="312" x2="900" y2="286" stroke="#475467" stroke-width="2" marker-end="url(#ar3)" />
		<rect x="820" y="240" width="160" height="46" rx="10" fill="#FBBF24" fill-opacity="0.3" stroke="#D97706" /><text x="900" y="269" fill="#92400E" font-size="16" font-weight="700">⊕ 残差相加</text>
		<!-- 残差从输入直达相加（干净通路） -->
		<path d="M820,474 C720,474 720,263 820,263" stroke="#16A34A" stroke-width="2.5" fill="none" marker-end="url(#ar3)" />
		<text x="700" y="360" fill="#16A34A" font-size="13" font-weight="600" transform="rotate(-90 700 360)">恒等捷径无阻断</text>
		<text x="900" y="222" fill="#15803D" font-family="ui-monospace, monospace" font-size="14">x = x + Sublayer(LayerNorm(x))</text>
	</g>

	<text x="600" y="540" text-anchor="middle" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="15">Pre-Norm 优势：训练更稳、可免学习率预热、支持 100+ 层深网络（GPT-3、PaLM 默认）</text>
</svg>
