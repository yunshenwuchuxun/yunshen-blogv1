<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="680" rx="32" fill="#0B1020"/>
  <rect x="60" y="60" width="1080" height="560" rx="28" fill="#11182D" stroke="#26314D" stroke-width="2"/>
  <text x="80" y="110" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Reset vs Compaction</text>
  <text x="80" y="150" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">原文特别强调：reset 不等于 compaction。两者都在压上下文，但方式和效果不同。</text>

  <rect x="100" y="200" width="430" height="340" rx="28" fill="#172036" stroke="#8B5CF6" stroke-width="2"/>
  <text x="315" y="255" text-anchor="middle" fill="#F5F3FF" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Compaction</text>
  <text x="315" y="298" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">压缩历史后，让同一个 agent 继续</text>
  <rect x="150" y="340" width="330" height="70" rx="18" fill="#1E293B"/>
  <text x="315" y="383" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="22">历史摘要 → 同一 agent 继续</text>
  <text x="150" y="455" fill="#C4B5FD" font-family="Inter, Arial, sans-serif" font-size="18">优点：保留连续性，切换成本低</text>
  <text x="150" y="490" fill="#FCA5A5" font-family="Inter, Arial, sans-serif" font-size="18">问题：任务“已经很长”的心理负担还在</text>
  <text x="150" y="520" fill="#FCA5A5" font-family="Inter, Arial, sans-serif" font-size="18">context anxiety 可能继续存在</text>

  <rect x="670" y="200" width="430" height="340" rx="28" fill="#172036" stroke="#22C55E" stroke-width="2"/>
  <text x="885" y="255" text-anchor="middle" fill="#ECFDF5" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Reset</text>
  <text x="885" y="298" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">停掉旧 agent，让新 agent 只读 handoff</text>
  <rect x="720" y="340" width="330" height="70" rx="18" fill="#1E293B"/>
  <text x="885" y="383" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="22">structured handoff → 新 agent 接手</text>
  <text x="720" y="455" fill="#86EFAC" font-family="Inter, Arial, sans-serif" font-size="18">优点：更接近 clean slate，更能缓解长任务惯性</text>
  <text x="720" y="490" fill="#FCA5A5" font-family="Inter, Arial, sans-serif" font-size="18">代价：编排更重，token overhead 和 latency 更高</text>

  <text x="80" y="590" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="18">原文结论：在真正的长任务里，reset 往往比 compaction 更有效，但系统也更重。</text>
</svg>
