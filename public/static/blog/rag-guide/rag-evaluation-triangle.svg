<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none">
  <rect width="1200" height="760" rx="28" fill="#F8FAFC"/>
  <rect x="24" y="24" width="1152" height="712" rx="24" fill="#FFFFFF" stroke="#D0D5DD"/>
  <text x="56" y="84" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">RAG 评估三元组：检索、忠实度、答案是否切题</text>
  <text x="56" y="118" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="20">评估 RAG 不能只看“答案看起来像不像对”，还要拆开看证据链是否健康。</text>

  <circle cx="470" cy="410" r="150" fill="#EEF4FF" fill-opacity="0.9" stroke="#84ADFF"/>
  <circle cx="690" cy="410" r="150" fill="#ECFDF3" fill-opacity="0.9" stroke="#6AD39E"/>
  <circle cx="580" cy="260" r="150" fill="#FFF7ED" fill-opacity="0.95" stroke="#FDBA74"/>

  <text x="482" y="232" fill="#C2410C" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">上下文相关性</text>
  <text x="507" y="264" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">检索器是否</text>
  <text x="495" y="290" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">找到了对的证据</text>

  <text x="377" y="414" fill="#2457D6" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">忠实度</text>
  <text x="336" y="446" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">答案是否真正来自</text>
  <text x="350" y="472" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">提供的上下文</text>

  <text x="640" y="414" fill="#027A48" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">答案相关性</text>
  <text x="637" y="446" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">最终回答是否</text>
  <text x="631" y="472" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">直接且完整地答题</text>

  <rect x="140" y="590" width="920" height="92" rx="18" fill="#111827"/>
  <text x="176" y="628" fill="#F9FAFB" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">一个常见误区</text>
  <text x="176" y="660" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="19">答案答错，不一定是生成模型差；也可能是检索没召回、证据太脏，或提示词没有约束 groundedness。</text>
</svg>
