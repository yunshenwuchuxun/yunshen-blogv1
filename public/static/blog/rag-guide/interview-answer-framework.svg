<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none">
  <rect width="1280" height="720" rx="28" fill="#F6F9FD"/>
  <rect x="28" y="28" width="1224" height="664" rx="24" fill="#FFFFFF" stroke="#D7E2EF"/>
  <text x="56" y="86" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">面试回答框架：先定义，再拆链路，最后补 trade-off</text>
  <text x="56" y="120" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="20">很多 RAG 面试题并不怕你不会，怕的是你回答得不成体系。</text>

  <rect x="72" y="190" width="320" height="230" rx="24" fill="#EEF4FF" stroke="#8FB5FF"/>
  <text x="106" y="238" fill="#2457D6" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">1. 先下定义</text>
  <text x="106" y="282" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20">一句话说清：它是什么，</text>
  <text x="106" y="314" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20">解决什么问题。</text>
  <text x="106" y="360" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20">例：RAG 是把外部证据检索</text>
  <text x="106" y="392" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20">与生成结合起来的系统设计。</text>

  <rect x="480" y="190" width="320" height="230" rx="24" fill="#ECFDF3" stroke="#7AD8A2"/>
  <text x="514" y="238" fill="#027A48" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">2. 再拆链路</text>
  <text x="514" y="282" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20">把系统拆成数据、chunking、</text>
  <text x="514" y="314" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20">retrieval、rerank、generation。</text>
  <text x="514" y="360" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20">这样回答更像工程师，</text>
  <text x="514" y="392" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20">而不是只会背概念。</text>

  <rect x="888" y="190" width="320" height="230" rx="24" fill="#FFF7ED" stroke="#F7BE77"/>
  <text x="922" y="238" fill="#C2410C" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">3. 最后讲权衡</text>
  <text x="922" y="282" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20">讲清收益、代价、适用边界。</text>
  <text x="922" y="314" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20">例：GraphRAG 更强，但更重；</text>
  <text x="922" y="346" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20">Hybrid 更稳，但实现更复杂。</text>

  <path d="M392 306H480" stroke="#90A4C6" stroke-width="6" stroke-linecap="round"/>
  <path d="M800 306H888" stroke="#90A4C6" stroke-width="6" stroke-linecap="round"/>

  <rect x="124" y="494" width="1032" height="120" rx="24" fill="#111827"/>
  <text x="160" y="542" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">一句万能模板</text>
  <text x="160" y="580" fill="#D7E3F7" font-family="Inter, Arial, sans-serif" font-size="20">“它本质上是 X，核心链路是 A → B → C，真正难点在 D，工程上要权衡 E 和 F。”</text>
</svg>
