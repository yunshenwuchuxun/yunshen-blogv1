<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="830" viewBox="0 0 1400 830" fill="none">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="830" rx="30" fill="#F5F8FC"/>
  <rect x="30" y="30" width="1340" height="770" rx="26" fill="url(#card)" stroke="#D6E0EE"/>
  <text x="56" y="88" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">Modular RAG：把检索增强拆成可独立优化的证据流水线</text>
  <text x="56" y="124" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="20">重点不是“有没有 RAG”，而是每一段链路是否都在为证据质量服务。</text>

  <g transform="translate(62 180)">
    <rect x="0" y="0" width="190" height="120" rx="22" fill="#EEF4FF" stroke="#8FB5FF"/>
    <text x="42" y="44" fill="#2457D6" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Indexing</text>
    <text x="30" y="76" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">加载文档 / 清洗文本</text>
    <text x="42" y="102" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">分块 / embedding</text>

    <rect x="248" y="0" width="220" height="120" rx="22" fill="#ECFDF3" stroke="#7AD8A2"/>
    <text x="282" y="44" fill="#027A48" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Pre-Retrieval</text>
    <text x="281" y="76" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">query rewrite / HyDE</text>
    <text x="303" y="102" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">routing / filters</text>

    <rect x="526" y="0" width="220" height="120" rx="22" fill="#FFF7ED" stroke="#F7BE77"/>
    <text x="582" y="44" fill="#C2410C" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Retrieval</text>
    <text x="550" y="76" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">dense / sparse / hybrid</text>
    <text x="557" y="102" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">Top-K / metadata filter</text>

    <rect x="804" y="0" width="220" height="120" rx="22" fill="#FDF2F8" stroke="#F6A9D0"/>
    <text x="833" y="44" fill="#BE185D" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Post-Retrieval</text>
    <text x="863" y="76" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">rerank</text>
    <text x="838" y="102" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">compression / selection</text>

    <rect x="1082" y="0" width="200" height="120" rx="22" fill="#F5F3FF" stroke="#C4B5FD"/>
    <text x="1127" y="44" fill="#6D28D9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Generation</text>
    <text x="1113" y="76" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">grounded answer</text>
    <text x="1121" y="102" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="18">citation / refusal</text>

    <path d="M190 60H248" stroke="#90A4C6" stroke-width="5" stroke-linecap="round"/>
    <path d="M468 60H526" stroke="#90A4C6" stroke-width="5" stroke-linecap="round"/>
    <path d="M746 60H804" stroke="#90A4C6" stroke-width="5" stroke-linecap="round"/>
    <path d="M1024 60H1082" stroke="#90A4C6" stroke-width="5" stroke-linecap="round"/>
  </g>

  <rect x="76" y="390" width="392" height="210" rx="24" fill="#FFFFFF" stroke="#D6E0EE"/>
  <text x="106" y="434" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">为什么要模块化</text>
  <text x="106" y="476" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="20">• 召回差，不一定是 embedding 差</text>
  <text x="106" y="510" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="20">• 答案差，也可能是 top-k 噪声太大</text>
  <text x="106" y="544" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="20">• 只有拆开，才能做精确排障与 A/B</text>

  <rect x="504" y="390" width="392" height="210" rx="24" fill="#FFFFFF" stroke="#D6E0EE"/>
  <text x="534" y="434" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">典型优化顺序</text>
  <text x="534" y="476" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="20">1. 先把数据清洗与 chunking 做对</text>
  <text x="534" y="510" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="20">2. 再加 hybrid search 与 rerank</text>
  <text x="534" y="544" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="20">3. 最后再考虑 GraphRAG / 复杂 routing</text>

  <rect x="932" y="390" width="392" height="210" rx="24" fill="#111827"/>
  <text x="962" y="434" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">工程结论</text>
  <text x="962" y="476" fill="#D7E3F7" font-family="Inter, Arial, sans-serif" font-size="20">Naive RAG 只是起点。</text>
  <text x="962" y="510" fill="#D7E3F7" font-family="Inter, Arial, sans-serif" font-size="20">真正可用的 RAG 是一条可观察、</text>
  <text x="962" y="544" fill="#D7E3F7" font-family="Inter, Arial, sans-serif" font-size="20">可替换、可评估的证据流水线。</text>

  <rect x="220" y="664" width="960" height="112" rx="24" fill="#EAF2FF" stroke="#B7CCF7"/>
  <text x="262" y="710" fill="#23406F" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="800">把 RAG 理解成“证据工程”，会比把它理解成“向量检索外挂”更接近真实生产系统。</text>
</svg>
