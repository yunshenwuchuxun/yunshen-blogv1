<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">强化学习基础到推理预测过程</title>
  <desc id="desc">Agent 与 Environment 交互，并通过 Policy Gradient 更新策略。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="0.52" stop-color="#1e1b4b" />
      <stop offset="1" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#a78bfa" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1000" cy="110" r="180" fill="#38bdf8" opacity="0.08" />
  <circle cx="180" cy="510" r="220" fill="#a78bfa" opacity="0.1" />

  <text x="86" y="132" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800">强化学习基础到推理预测过程</text>
  <text x="88" y="184" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="25">MDP · Policy Gradient · Actor · Trajectory · Inference</text>

  <g transform="translate(120 270)">
    <rect x="0" y="0" width="270" height="132" rx="26" fill="#020617" opacity="0.78" stroke="#38bdf8" stroke-width="2" />
    <text x="135" y="58" text-anchor="middle" fill="#e0f2fe" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700">Agent</text>
    <text x="135" y="92" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="18">策略 πθ(a|s)</text>
  </g>

  <g transform="translate(810 270)">
    <rect x="0" y="0" width="270" height="132" rx="26" fill="#020617" opacity="0.78" stroke="#a78bfa" stroke-width="2" />
    <text x="135" y="58" text-anchor="middle" fill="#ede9fe" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700">Environment</text>
    <text x="135" y="92" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="18">状态转移与奖励</text>
  </g>

  <path d="M 410 318 C 520 250, 680 250, 790 318" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 778 300 L 808 319 L 775 333" fill="none" stroke="#a78bfa" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <text x="600" y="263" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="22">action aₜ</text>

  <path d="M 790 370 C 680 452, 520 452, 410 370" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.9" filter="url(#glow)" />
  <path d="M 425 388 L 392 369 L 425 353" fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <text x="600" y="462" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="22">next state sₜ₊₁, reward rₜ</text>

  <g transform="translate(454 320)">
    <rect x="0" y="0" width="292" height="70" rx="18" fill="#0f172a" stroke="#64748b" opacity="0.9" />
    <text x="146" y="43" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">maximize E[R(τ)]</text>
  </g>
</svg>
