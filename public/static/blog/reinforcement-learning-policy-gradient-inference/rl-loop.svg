<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">强化学习交互闭环</title>
  <desc id="desc">智能体根据状态输出动作，环境返回下一个状态与奖励，轨迹用于估计期望回报并更新策略。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="980" height="430" rx="28" fill="#f8fafc" />
  <rect x="70" y="126" width="260" height="126" rx="22" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="200" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700" fill="#1e3a8a">Agent</text>
  <text x="200" y="211" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#475569">策略网络 πθ(a|s)</text>

  <rect x="650" y="126" width="260" height="126" rx="22" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" />
  <text x="780" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700" fill="#4c1d95">Environment</text>
  <text x="780" y="211" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#475569">P(s′|s,a), r(s,a)</text>

  <path d="M 340 170 C 430 112, 550 112, 640 170" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)" />
  <text x="490" y="112" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#0f172a">动作 aₜ</text>

  <path d="M 640 218 C 550 304, 430 304, 340 218" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)" />
  <text x="490" y="312" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#0f172a">状态 sₜ₊₁ 与奖励 rₜ</text>

  <rect x="275" y="340" width="430" height="52" rx="16" fill="#0f172a" />
  <text x="490" y="374" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#f8fafc">轨迹 τ = (s₁, a₁, r₁, ..., sT, aT, rT)</text>

  <path d="M 200 252 C 200 330, 275 366, 275 366" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8" />
  <path d="M 705 366 C 780 366, 780 310, 780 252" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8" />
</svg>
