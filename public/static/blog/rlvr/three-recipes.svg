<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" fill="none" role="img" aria-labelledby="t d">
	<title id="t">三个推理模型的训练配方对比</title>
	<desc id="d">DeepSeek-R1、Kimi k1.5、Qwen3 虽细节各异，却收敛到同一条主线：基座模型 → 冷启动的长思维链 SFT → 可验证奖励的 RL →（可选）蒸馏到小模型。</desc>
	<rect width="1200" height="600" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="552" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />
	<text x="56" y="66" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">三条路，一个配方</text>
	<text x="56" y="96" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="16">细节各不相同，但都收敛到同一主线：基座 → 冷启动长-CoT SFT → 可验证奖励 RL →（蒸馏）。</text>

	<!-- 阶段列标题 -->
	<g font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#475569">
		<text x="235" y="140">① 基座模型</text>
		<text x="470" y="140">② 冷启动 长-CoT SFT</text>
		<text x="720" y="140">③ 可验证奖励 RL</text>
		<text x="985" y="140">④ 蒸馏（可选）</text>
	</g>

	<g font-family="Inter, Arial, sans-serif" font-size="13.5">
		<!-- R1 行 -->
		<text x="72" y="196" fill="#1D4ED8" font-size="17" font-weight="700">DeepSeek-R1</text>
		<rect x="150" y="176" width="170" height="52" rx="10" fill="#EFF6FF" stroke="#BFDBFE" /><text x="235" y="200" fill="#0F172A" text-anchor="middle" font-weight="600">V3-Base</text><text x="235" y="218" fill="#64748B" font-size="11.5" text-anchor="middle">先有 R1-Zero 纯RL</text>
		<rect x="385" y="176" width="170" height="52" rx="10" fill="#EFF6FF" stroke="#BFDBFE" /><text x="470" y="200" fill="#0F172A" text-anchor="middle" font-weight="600">冷启动数据 SFT</text><text x="470" y="218" fill="#64748B" font-size="11.5" text-anchor="middle">解决可读性/混语</text>
		<rect x="635" y="176" width="170" height="52" rx="10" fill="#EFF6FF" stroke="#BFDBFE" /><text x="720" y="200" fill="#0F172A" text-anchor="middle" font-weight="600">GRPO(规则奖励)</text><text x="720" y="218" fill="#64748B" font-size="11.5" text-anchor="middle">再拒绝采样+全域RL</text>
		<rect x="900" y="176" width="170" height="52" rx="10" fill="#EFF6FF" stroke="#BFDBFE" /><text x="985" y="204" fill="#0F172A" text-anchor="middle" font-weight="600">蒸馏到 Qwen/Llama</text>
		<path d="M320 202 L 383 202" stroke="#93C5FD" stroke-width="2" marker-end="url(#a1)"/><path d="M555 202 L 633 202" stroke="#93C5FD" stroke-width="2" marker-end="url(#a1)"/><path d="M805 202 L 898 202" stroke="#93C5FD" stroke-width="2" marker-end="url(#a1)"/>

		<!-- Kimi 行 -->
		<text x="72" y="316" fill="#C2410C" font-size="17" font-weight="700">Kimi k1.5</text>
		<rect x="150" y="296" width="170" height="52" rx="10" fill="#FFF7ED" stroke="#FED7AA" /><text x="235" y="327" fill="#0F172A" text-anchor="middle" font-weight="600">基座模型</text>
		<rect x="385" y="296" width="170" height="52" rx="10" fill="#FFF7ED" stroke="#FED7AA" /><text x="470" y="320" fill="#0F172A" text-anchor="middle" font-weight="600">长-CoT SFT</text><text x="470" y="338" fill="#64748B" font-size="11.5" text-anchor="middle">难度/质量过滤</text>
		<rect x="635" y="296" width="170" height="52" rx="10" fill="#FFF7ED" stroke="#FED7AA" /><text x="720" y="320" fill="#0F172A" text-anchor="middle" font-weight="600">自定义 RL</text><text x="720" y="338" fill="#64748B" font-size="11.5" text-anchor="middle">镜像下降+长度奖励</text>
		<rect x="900" y="296" width="170" height="52" rx="10" fill="#F1F5F9" stroke="#E2E8F0" stroke-dasharray="5 5" /><text x="985" y="327" fill="#94A3B8" text-anchor="middle">—</text>
		<path d="M320 322 L 383 322" stroke="#FDBA74" stroke-width="2" marker-end="url(#a2)"/><path d="M555 322 L 633 322" stroke="#FDBA74" stroke-width="2" marker-end="url(#a2)"/><path d="M805 322 L 898 322" stroke="#FDBA74" stroke-width="2" marker-end="url(#a2)"/>

		<!-- Qwen3 行 -->
		<text x="72" y="436" fill="#047857" font-size="17" font-weight="700">Qwen3</text>
		<rect x="150" y="416" width="170" height="52" rx="10" fill="#ECFDF5" stroke="#A7F3D0" /><text x="235" y="447" fill="#0F172A" text-anchor="middle" font-weight="600">基座模型</text>
		<rect x="385" y="416" width="170" height="52" rx="10" fill="#ECFDF5" stroke="#A7F3D0" /><text x="470" y="440" fill="#0F172A" text-anchor="middle" font-weight="600">长-CoT SFT</text><text x="470" y="458" fill="#64748B" font-size="11.5" text-anchor="middle">+思维模式融合</text>
		<rect x="635" y="416" width="170" height="52" rx="10" fill="#ECFDF5" stroke="#A7F3D0" /><text x="720" y="440" fill="#0F172A" text-anchor="middle" font-weight="600">GRPO</text><text x="720" y="458" fill="#64748B" font-size="11.5" text-anchor="middle">~4k 高价值样本</text>
		<rect x="900" y="416" width="170" height="52" rx="10" fill="#ECFDF5" stroke="#A7F3D0" /><text x="985" y="440" fill="#0F172A" text-anchor="middle" font-weight="600">强到弱蒸馏</text><text x="985" y="458" fill="#64748B" font-size="11.5" text-anchor="middle">出轻量版</text>
		<path d="M320 442 L 383 442" stroke="#6EE7B7" stroke-width="2" marker-end="url(#a3)"/><path d="M555 442 L 633 442" stroke="#6EE7B7" stroke-width="2" marker-end="url(#a3)"/><path d="M805 442 L 898 442" stroke="#6EE7B7" stroke-width="2" marker-end="url(#a3)"/>

		<!-- 底部总结条 -->
		<rect x="150" y="500" width="920" height="52" rx="12" fill="#0F172A" />
		<text x="176" y="532" fill="#E2E8F0" font-size="15">共同规律：<tspan fill="#7dd3fc" font-weight="700">冷启动 SFT 稳住格式</tspan> → <tspan fill="#6ee7b7" font-weight="700">RL 放大推理能力</tspan> → <tspan fill="#fca5a5" font-weight="700">蒸馏把能力搬进小模型</tspan>；能力越强，回复越长。</text>
	</g>
	<defs>
		<marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#93C5FD" /></marker>
		<marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#FDBA74" /></marker>
		<marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#6EE7B7" /></marker>
	</defs>
</svg>
