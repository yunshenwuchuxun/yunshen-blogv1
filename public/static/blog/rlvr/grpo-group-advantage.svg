<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" fill="none" role="img" aria-labelledby="t d">
	<title id="t">GRPO 的组内 z-score 优势</title>
	<desc id="d">对同一个问题采样 G 个答案，各自得到奖励；用这一组奖励的均值当基线、标准差做归一化，得到每个答案的相对优势——高于组内平均的被鼓励，低于的被抑制。</desc>
	<rect width="1200" height="500" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="452" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />
	<text x="56" y="66" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">不用 Critic，怎么算基线？组内比一比</text>
	<text x="56" y="96" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="16">同一问题采样一组答案，"比组内平均好"就给正优势，"比平均差"就给负优势。</text>

	<g font-family="Inter, Arial, sans-serif">
		<!-- 左：一组奖励柱状 -->
		<text x="80" y="150" fill="#334155" font-size="15" font-weight="700">① 一组答案各自的奖励 r（0/1 判分）</text>
		<g transform="translate(80,170)">
			<line x1="0" y1="180" x2="470" y2="180" stroke="#CBD5E1" stroke-width="2" />
			<!-- 均值虚线 (mean=0.5) -->
			<line x1="0" y1="90" x2="470" y2="90" stroke="#F59E0B" stroke-width="2" stroke-dasharray="7 6" />
			<text x="474" y="94" fill="#B45309" font-size="13">均值</text>
			<!-- bars: r = 1,0,1,1,0,0  正确=绿 错误=红 -->
			<g>
				<rect x="20"  y="20" width="48" height="160" rx="5" fill="#34D399" /><text x="44" y="200" fill="#475569" font-size="13" text-anchor="middle">o₁·✓</text>
				<rect x="98"  y="180" width="48" height="0.5" rx="5" fill="#F87171" /><rect x="98" y="176" width="48" height="4" fill="#F87171"/><text x="122" y="200" fill="#475569" font-size="13" text-anchor="middle">o₂·✗</text>
				<rect x="176" y="20" width="48" height="160" rx="5" fill="#34D399" /><text x="200" y="200" fill="#475569" font-size="13" text-anchor="middle">o₃·✓</text>
				<rect x="254" y="20" width="48" height="160" rx="5" fill="#34D399" /><text x="278" y="200" fill="#475569" font-size="13" text-anchor="middle">o₄·✓</text>
				<rect x="332" y="176" width="48" height="4" fill="#F87171"/><text x="356" y="200" fill="#475569" font-size="13" text-anchor="middle">o₅·✗</text>
				<rect x="410" y="176" width="48" height="4" fill="#F87171"/><text x="434" y="200" fill="#475569" font-size="13" text-anchor="middle">o₆·✗</text>
			</g>
		</g>

		<!-- 中：公式 -->
		<g transform="translate(600,220)">
			<rect x="0" y="-40" width="230" height="120" rx="12" fill="#EFF6FF" stroke="#BFDBFE" />
			<text x="115" y="-10" fill="#1D4ED8" font-size="15" font-weight="700" text-anchor="middle">② 组内归一化</text>
			<text x="115" y="26" fill="#0F172A" font-size="18" font-weight="700" text-anchor="middle">A = (r − μ) / σ</text>
			<text x="115" y="56" fill="#475569" font-size="13" text-anchor="middle">μ,σ = 这一组的均值/标准差</text>
		</g>
		<path d="M840 240 L 892 240" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ab)" fill="none" />

		<!-- 右：优势结果 -->
		<g transform="translate(900,170)">
			<text x="0" y="-8" fill="#334155" font-size="15" font-weight="700">③ 相对优势 A</text>
			<line x1="0" y1="100" x2="210" y2="100" stroke="#CBD5E1" stroke-width="2" />
			<text x="214" y="104" fill="#94A3B8" font-size="12">0</text>
			<!-- 正优势 (对) -->
			<rect x="14" y="40" width="40" height="60" rx="5" fill="#22C55E" /><text x="34" y="122" fill="#15803D" font-size="12" text-anchor="middle">对 +</text>
			<!-- 负优势 (错) -->
			<rect x="120" y="100" width="40" height="55" rx="5" fill="#EF4444" /><text x="140" y="176" fill="#B91C1C" font-size="12" text-anchor="middle">错 −</text>
			<text x="0" y="205" fill="#475569" font-size="12.5">对的被鼓励，错的被抑制</text>
		</g>
	</g>
	<defs>
		<marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#2563EB" /></marker>
	</defs>
</svg>
