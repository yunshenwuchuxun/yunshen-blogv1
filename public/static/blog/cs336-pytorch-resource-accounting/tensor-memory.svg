<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" fill="none" role="img" aria-labelledby="mtitle mdesc">
	<title id="mtitle">张量的行优先内存布局与步长</title>
	<desc id="mdesc">4x4 张量在内存中按行优先连续存储，步长 stride 描述每个维度移动一格在底层数组上跨越的元素数。</desc>
	<rect width="1200" height="600" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="552" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />

	<text x="56" y="80" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">张量在内存里是一维的，stride 负责"翻译"坐标</text>
	<text x="56" y="114" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="19">view / transpose / slice 只改 stride、不复制数据，这正是它们近乎零成本的原因。</text>

	<!-- 逻辑视图 4x4 -->
	<text x="56" y="168" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">逻辑视图 (4 × 4)</text>
	<g font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="700" text-anchor="middle">
		<!-- 第0行高亮 r=1 行用浅蓝, 元素6高亮 -->
		<g>
			<rect x="56" y="186" width="64" height="56" rx="8" fill="#EEF4FF" stroke="#84ADFF" /><text x="88" y="222" fill="#1D4ED8">0</text>
			<rect x="124" y="186" width="64" height="56" rx="8" fill="#EEF4FF" stroke="#84ADFF" /><text x="156" y="222" fill="#1D4ED8">1</text>
			<rect x="192" y="186" width="64" height="56" rx="8" fill="#EEF4FF" stroke="#84ADFF" /><text x="224" y="222" fill="#1D4ED8">2</text>
			<rect x="260" y="186" width="64" height="56" rx="8" fill="#EEF4FF" stroke="#84ADFF" /><text x="292" y="222" fill="#1D4ED8">3</text>
		</g>
		<g>
			<rect x="56" y="246" width="64" height="56" rx="8" fill="#FFF7ED" stroke="#FDBA74" /><text x="88" y="282" fill="#C2410C">4</text>
			<rect x="124" y="246" width="64" height="56" rx="8" fill="#FFF7ED" stroke="#FDBA74" /><text x="156" y="282" fill="#C2410C">5</text>
			<rect x="192" y="246" width="64" height="56" rx="8" fill="#FB923C" stroke="#EA580C" /><text x="224" y="282" fill="#fff">6</text>
			<rect x="260" y="246" width="64" height="56" rx="8" fill="#FFF7ED" stroke="#FDBA74" /><text x="292" y="282" fill="#C2410C">7</text>
		</g>
		<g fill="#475467">
			<rect x="56" y="306" width="64" height="56" rx="8" fill="#F2F4F7" stroke="#D0D5DD" /><text x="88" y="342">8</text>
			<rect x="124" y="306" width="64" height="56" rx="8" fill="#F2F4F7" stroke="#D0D5DD" /><text x="156" y="342">9</text>
			<rect x="192" y="306" width="64" height="56" rx="8" fill="#F2F4F7" stroke="#D0D5DD" /><text x="224" y="342">10</text>
			<rect x="260" y="306" width="64" height="56" rx="8" fill="#F2F4F7" stroke="#D0D5DD" /><text x="292" y="342">11</text>
		</g>
		<g fill="#475467">
			<rect x="56" y="366" width="64" height="56" rx="8" fill="#F2F4F7" stroke="#D0D5DD" /><text x="88" y="402">12</text>
			<rect x="124" y="366" width="64" height="56" rx="8" fill="#F2F4F7" stroke="#D0D5DD" /><text x="156" y="402">13</text>
			<rect x="192" y="366" width="64" height="56" rx="8" fill="#F2F4F7" stroke="#D0D5DD" /><text x="224" y="402">14</text>
			<rect x="260" y="366" width="64" height="56" rx="8" fill="#F2F4F7" stroke="#D0D5DD" /><text x="292" y="402">15</text>
		</g>
	</g>
	<text x="36" y="222" text-anchor="end" fill="#98A2B3" font-family="ui-monospace, monospace" font-size="15">r=0</text>
	<text x="36" y="282" text-anchor="end" fill="#EA580C" font-family="ui-monospace, monospace" font-size="15" font-weight="700">r=1</text>

	<!-- 物理内存一维 -->
	<text x="420" y="168" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">物理内存 (行优先连续存储)</text>
	<g font-family="ui-monospace, Menlo, monospace" font-size="17" font-weight="700" text-anchor="middle">
		<!-- 16格横排 -->
		<g>
			<rect x="420" y="186" width="44" height="48" rx="6" fill="#EEF4FF" stroke="#84ADFF"/><text x="442" y="216" fill="#1D4ED8">0</text>
			<rect x="466" y="186" width="44" height="48" rx="6" fill="#EEF4FF" stroke="#84ADFF"/><text x="488" y="216" fill="#1D4ED8">1</text>
			<rect x="512" y="186" width="44" height="48" rx="6" fill="#EEF4FF" stroke="#84ADFF"/><text x="534" y="216" fill="#1D4ED8">2</text>
			<rect x="558" y="186" width="44" height="48" rx="6" fill="#EEF4FF" stroke="#84ADFF"/><text x="580" y="216" fill="#1D4ED8">3</text>
			<rect x="604" y="186" width="44" height="48" rx="6" fill="#FFF7ED" stroke="#FDBA74"/><text x="626" y="216" fill="#C2410C">4</text>
			<rect x="650" y="186" width="44" height="48" rx="6" fill="#FFF7ED" stroke="#FDBA74"/><text x="672" y="216" fill="#C2410C">5</text>
			<rect x="696" y="186" width="44" height="48" rx="6" fill="#FB923C" stroke="#EA580C"/><text x="718" y="216" fill="#fff">6</text>
			<rect x="742" y="186" width="44" height="48" rx="6" fill="#FFF7ED" stroke="#FDBA74"/><text x="764" y="216" fill="#C2410C">7</text>
		</g>
		<g fill="#475467">
			<rect x="420" y="240" width="44" height="48" rx="6" fill="#F2F4F7" stroke="#D0D5DD"/><text x="442" y="270">8</text>
			<rect x="466" y="240" width="44" height="48" rx="6" fill="#F2F4F7" stroke="#D0D5DD"/><text x="488" y="270">9</text>
			<rect x="512" y="240" width="44" height="48" rx="6" fill="#F2F4F7" stroke="#D0D5DD"/><text x="534" y="270">10</text>
			<rect x="558" y="240" width="44" height="48" rx="6" fill="#F2F4F7" stroke="#D0D5DD"/><text x="580" y="270">11</text>
			<rect x="604" y="240" width="44" height="48" rx="6" fill="#F2F4F7" stroke="#D0D5DD"/><text x="626" y="270">12</text>
			<rect x="650" y="240" width="44" height="48" rx="6" fill="#F2F4F7" stroke="#D0D5DD"/><text x="672" y="270">13</text>
			<rect x="696" y="240" width="44" height="48" rx="6" fill="#F2F4F7" stroke="#D0D5DD"/><text x="718" y="270">14</text>
			<rect x="742" y="240" width="44" height="48" rx="6" fill="#F2F4F7" stroke="#D0D5DD"/><text x="764" y="270">15</text>
		</g>
	</g>
	<text x="420" y="312" fill="#98A2B3" font-family="ui-monospace, monospace" font-size="14">索引 →　0　1　2　3　4　5 ……</text>

	<!-- stride 公式块 -->
	<g transform="translate(420,344)">
		<rect x="0" y="0" width="700" height="200" rx="16" fill="#111827" />
		<text x="32" y="48" fill="#7DD3FC" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="700">stride(0) = 4　（行：跳一整行 = 4 个元素）</text>
		<text x="32" y="84" fill="#FDBA74" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="700">stride(1) = 1　（列：相邻元素紧挨着）</text>
		<line x1="32" y1="104" x2="668" y2="104" stroke="#334155" />
		<text x="32" y="144" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">取 x[1, 2] 的物理地址：</text>
		<text x="32" y="182" fill="#F9FAFB" font-family="ui-monospace, Menlo, monospace" font-size="24" font-weight="800">1 × stride(0) + 2 × stride(1) = 4 + 2 = 6</text>
	</g>
</svg>
