<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none" role="img" aria-labelledby="mtitle mdesc">
	<title id="mtitle">矩阵乘法的 FLOPs 推导</title>
	<desc id="mdesc">矩阵乘法 X(B×D) 乘 W(D×K) 得到 Y(B×K)，每个输出元素需约 2D 次浮点运算，总计约 2BDK。</desc>
	<rect width="1200" height="520" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="472" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />

	<text x="56" y="80" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">矩阵乘法的计算量：每个输出元素约 2D 次运算</text>
	<text x="56" y="114" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="19">一次点积 = D 次乘法 + (D−1) 次加法 ≈ 2D FLOPs，共 B×K 个输出元素。</text>

	<g font-family="Inter, Arial, sans-serif" text-anchor="middle">
		<!-- X -->
		<rect x="120" y="200" width="120" height="160" rx="10" fill="#60A5FA" fill-opacity="0.2" stroke="#2563EB" />
		<text x="180" y="285" fill="#1D4ED8" font-size="30" font-weight="800">X</text>
		<text x="180" y="392" fill="#475467" font-size="17">B × D</text>

		<text x="290" y="290" fill="#98A2B3" font-size="40" font-weight="700">×</text>

		<!-- W -->
		<rect x="340" y="200" width="160" height="120" rx="10" fill="#34D399" fill-opacity="0.25" stroke="#059669" />
		<text x="420" y="270" fill="#047857" font-size="30" font-weight="800">W</text>
		<text x="420" y="352" fill="#475467" font-size="17">D × K</text>

		<text x="550" y="290" fill="#98A2B3" font-size="40" font-weight="700">=</text>

		<!-- Y -->
		<rect x="600" y="200" width="160" height="160" rx="10" fill="#FB923C" fill-opacity="0.22" stroke="#EA580C" />
		<text x="680" y="285" fill="#C2410C" font-size="30" font-weight="800">Y</text>
		<text x="680" y="392" fill="#475467" font-size="17">B × K</text>
		<!-- 高亮一个元素 -->
		<rect x="690" y="210" width="28" height="28" rx="5" fill="#EA580C" />
	</g>

	<!-- 单元素说明 -->
	<g transform="translate(830,180)" font-family="Inter, Arial, sans-serif">
		<rect x="0" y="0" width="290" height="200" rx="14" fill="#FFF7ED" stroke="#FDBA74" />
		<text x="24" y="40" fill="#C2410C" font-size="18" font-weight="700">单个 Y[i,k]：</text>
		<text x="24" y="78" fill="#7C2D12" font-family="ui-monospace, monospace" font-size="16">Σ X[i,j]·W[j,k]</text>
		<text x="24" y="112" fill="#7C2D12" font-size="16">= D 次乘 + (D−1) 次加</text>
		<text x="24" y="150" fill="#9A3412" font-size="20" font-weight="800" font-family="ui-monospace, monospace">≈ 2D FLOPs</text>
	</g>

	<!-- 汇总 -->
	<g transform="translate(56,408)">
		<rect x="0" y="0" width="1064" height="72" rx="16" fill="#111827" />
		<text x="36" y="46" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="20">总计算量 = (B × K 个元素) × 2D =</text>
		<text x="1028" y="48" text-anchor="end" fill="#F9FAFB" font-family="ui-monospace, Menlo, monospace" font-size="30" font-weight="800">2 · B · D · K</text>
	</g>
</svg>
