<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">PPO clipped policy update</title>
  <desc id="desc">A policy optimization diagram showing a safe update region controlled by clipping.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="0.52" stop-color="#1e1b4b" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="clip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#a78bfa" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1020" cy="110" r="210" fill="#7c3aed" opacity="0.16" />
  <circle cx="160" cy="520" r="260" fill="#0ea5e9" opacity="0.14" />

  <g transform="translate(90 90)" filter="url(#shadow)">
    <rect width="1020" height="450" rx="36" fill="#020617" opacity="0.86" stroke="#334155" />
    <text x="60" y="88" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="700">Proximal Policy Optimization</text>
    <text x="62" y="135" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="24">Policy Gradient → Trust Region → Clipped Objective</text>

    <line x1="92" y1="340" x2="920" y2="340" stroke="#64748b" stroke-width="3" />
    <line x1="150" y1="392" x2="150" y2="190" stroke="#64748b" stroke-width="3" />
    <text x="908" y="374" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">ratio r(θ)</text>
    <text x="78" y="202" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18" transform="rotate(-90 78 202)">surrogate gain</text>

    <rect x="430" y="190" width="180" height="200" fill="#38bdf8" opacity="0.12" stroke="#38bdf8" stroke-dasharray="8 8" />
    <text x="455" y="215" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="18">clipping region</text>
    <text x="437" y="412" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="18">1 - ε</text>
    <text x="580" y="412" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="18">1 + ε</text>

    <path d="M150 330 C245 310 320 255 420 230 C515 206 600 225 690 250 C770 272 835 265 920 235" fill="none" stroke="#f59e0b" stroke-width="9" stroke-linecap="round" />
    <path d="M150 330 C250 305 335 250 430 226 L610 226 C690 250 770 272 920 235" fill="none" stroke="url(#clip)" stroke-width="9" stroke-linecap="round" />

    <circle cx="520" cy="226" r="11" fill="#f8fafc" />
    <text x="482" y="178" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">safe step</text>

    <g transform="translate(62 260)">
      <rect width="245" height="126" rx="20" fill="#0f172a" stroke="#334155" />
      <text x="24" y="42" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">Core idea</text>
      <text x="24" y="76" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18">Reuse on-policy data,</text>
      <text x="24" y="104" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18">but cap policy drift.</text>
    </g>
  </g>
</svg>
