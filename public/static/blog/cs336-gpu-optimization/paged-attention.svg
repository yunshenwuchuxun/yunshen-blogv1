<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" fill="none" role="img" aria-labelledby="patitle padesc">
	<title id="patitle">PagedAttention 原理</title>
	<desc id="padesc">传统静态预分配按最大长度预留连续显存，造成大量内部碎片与外部碎片；PagedAttention 借鉴虚拟内存分页，把 KV Cache 切成固定大小页，逻辑连续、物理分散，靠块表映射，浪费仅一页大小。</desc>
	<defs>
		<marker id="apa" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
			<path d="M0 0 L9 5 L0 10 z" fill="#64748B" />
		</marker>
		<pattern id="waste" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
			<rect width="10" height="10" fill="#E5E7EB" />
			<line x1="0" y1="0" x2="0" y2="10" stroke="#9CA3AF" stroke-width="2" />
		</pattern>
	</defs>
	<rect width="1200" height="540" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="492" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />

	<text x="56" y="80" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">PagedAttention：给 KV Cache 装上虚拟内存</text>
	<text x="56" y="114" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="19">静态预分配浪费 O(L_max)；分页让逻辑连续、物理分散，浪费只剩一页大小。</text>

	<!-- 左：传统 -->
	<rect x="56" y="148" width="540" height="360" rx="18" fill="#FEF2F2" stroke="#FCA5A5" />
	<text x="80" y="188" fill="#B91C1C" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">传统：静态预分配连续显存</text>

	<rect x="80" y="222" width="66" height="50" rx="6" fill="#34D399" fill-opacity="0.6" stroke="#059669" />
	<text x="113" y="252" text-anchor="middle" fill="#065F46" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">用 300</text>
	<rect x="146" y="222" width="414" height="50" rx="6" fill="url(#waste)" stroke="#9CA3AF" />
	<text x="353" y="252" text-anchor="middle" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">预留但闲置 ≈ 1748 tokens</text>
	<text x="80" y="298" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="14">内部碎片：按最大长度 2048 预留，实际只生成 300。</text>

	<text x="80" y="346" fill="#B91C1C" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">外部碎片：</text>
	<g>
		<rect x="170" y="330" width="96" height="32" rx="5" fill="#60A5FA" fill-opacity="0.45" stroke="#2563EB" />
		<rect x="282" y="330" width="40" height="32" rx="5" fill="url(#waste)" stroke="#9CA3AF" />
		<rect x="338" y="330" width="120" height="32" rx="5" fill="#A78BFA" fill-opacity="0.45" stroke="#7C3AED" />
		<rect x="474" y="330" width="30" height="32" rx="5" fill="url(#waste)" stroke="#9CA3AF" />
		<rect x="520" y="330" width="40" height="32" rx="5" fill="#34D399" fill-opacity="0.45" stroke="#059669" />
	</g>
	<text x="80" y="396" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="14">请求结束后留下大小不一的空洞，散落各处无法合并。</text>

	<rect x="80" y="458" width="480" height="34" rx="17" fill="#B91C1C" />
	<text x="320" y="481" text-anchor="middle" fill="#FFFFFF" font-family="ui-monospace, monospace" font-size="15" font-weight="700">浪费 ∝ O(L_max)　可达上千 tokens</text>

	<!-- 右：PagedAttention -->
	<rect x="604" y="148" width="540" height="360" rx="18" fill="#ECFDF5" stroke="#6EE7B7" />
	<text x="628" y="188" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">PagedAttention：固定大小分页</text>

	<rect x="628" y="210" width="488" height="26" rx="6" fill="#34D399" fill-opacity="0.3" stroke="#059669" />
	<g stroke="#059669" stroke-opacity="0.5" stroke-width="1">
		<line x1="691" y1="210" x2="691" y2="236" /><line x1="754" y1="210" x2="754" y2="236" />
		<line x1="817" y1="210" x2="817" y2="236" /><line x1="880" y1="210" x2="880" y2="236" />
		<line x1="943" y1="210" x2="943" y2="236" /><line x1="1006" y1="210" x2="1006" y2="236" />
		<line x1="1069" y1="210" x2="1069" y2="236" />
	</g>
	<text x="872" y="258" text-anchor="middle" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="14">逻辑序列：连续 300 tokens，每页 16 个 → 共 19 页</text>

	<!-- 块表 -->
	<rect x="628" y="280" width="178" height="166" rx="10" fill="#F9FAFB" stroke="#D0D5DD" />
	<text x="717" y="304" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">块表 Block Table</text>
	<g font-family="ui-monospace, monospace" font-size="13" fill="#374151">
		<text x="648" y="332">页 0  →  物理 #5</text>
		<text x="648" y="356">页 1  →  物理 #2</text>
		<text x="648" y="380">页 2  →  物理 #11</text>
		<text x="648" y="404">⋮</text>
		<text x="648" y="430">页 18 → #7（4/16）</text>
	</g>

	<!-- 物理页池 -->
	<text x="980" y="304" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">物理页池（可不连续）</text>
	<g font-family="Inter, Arial, sans-serif" text-anchor="middle">
		<rect x="844" y="316" width="46" height="38" rx="5" fill="#34D399" fill-opacity="0.55" stroke="#059669" />
		<rect x="898" y="316" width="46" height="38" rx="5" fill="#E5E7EB" stroke="#9CA3AF" />
		<rect x="952" y="316" width="46" height="38" rx="5" fill="#34D399" fill-opacity="0.55" stroke="#059669" />
		<rect x="1006" y="316" width="46" height="38" rx="5" fill="#E5E7EB" stroke="#9CA3AF" />
		<rect x="1060" y="316" width="46" height="38" rx="5" fill="#34D399" fill-opacity="0.55" stroke="#059669" />

		<rect x="844" y="362" width="46" height="38" rx="5" fill="#E5E7EB" stroke="#9CA3AF" />
		<rect x="898" y="362" width="46" height="38" rx="5" fill="#34D399" fill-opacity="0.55" stroke="#059669" />
		<rect x="952" y="362" width="46" height="38" rx="5" fill="#E5E7EB" stroke="#9CA3AF" />
		<rect x="1006" y="362" width="46" height="38" rx="5" fill="#34D399" fill-opacity="0.55" stroke="#059669" />
		<!-- 末页 4/16 -->
		<rect x="1060" y="362" width="46" height="38" rx="5" fill="#E5E7EB" stroke="#059669" />
		<rect x="1060" y="362" width="12" height="38" rx="3" fill="#34D399" fill-opacity="0.7" stroke="#059669" />
		<text x="1083" y="416" fill="#047857" font-size="11">末页 4/16</text>
	</g>
	<g stroke="#64748B" stroke-width="1.6" marker-end="url(#apa)">
		<line x1="806" y1="328" x2="842" y2="332" /><line x1="806" y1="352" x2="894" y2="378" />
	</g>

	<!-- 图例 -->
	<rect x="828" y="424" width="14" height="14" rx="3" fill="#34D399" fill-opacity="0.55" stroke="#059669" />
	<text x="848" y="436" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="12">本请求页</text>
	<rect x="930" y="424" width="14" height="14" rx="3" fill="#E5E7EB" stroke="#9CA3AF" />
	<text x="950" y="436" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="12">其他请求 / 空闲</text>

	<rect x="628" y="458" width="488" height="34" rx="17" fill="#047857" />
	<text x="872" y="481" text-anchor="middle" fill="#FFFFFF" font-family="ui-monospace, monospace" font-size="15" font-weight="700">浪费 ∝ O(页大小)　仅 4 tokens</text>
</svg>
