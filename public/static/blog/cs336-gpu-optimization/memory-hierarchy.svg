<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" fill="none" role="img" aria-labelledby="mhtitle mhdesc">
	<title id="mhtitle">GPU 的分层内存与延迟金字塔</title>
	<desc id="mhdesc">从寄存器到全局显存逐层变慢、变大、变便宜：寄存器约 1 周期、L1/共享约 30 周期、L2 约 200 周期、全局显存约 500 周期，延迟相差约两个数量级。</desc>
	<rect width="1200" height="560" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="512" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />

	<text x="56" y="80" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">GPU 的内存：一座延迟金字塔</text>
	<text x="56" y="114" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="19">越靠近计算单元越快、越小、越贵；越远离越慢、越大、越便宜。</text>

	<!-- 左侧方向箭头 -->
	<g font-family="Inter, Arial, sans-serif">
		<line x1="78" y1="170" x2="78" y2="430" stroke="#94A3B8" stroke-width="3" />
		<path d="M78 442 l-8 -16 l16 0 z" fill="#94A3B8" />
		<text x="52" y="305" fill="#64748B" font-size="16" font-weight="600" transform="rotate(-90 52 305)" text-anchor="middle">更慢 · 更大 · 更便宜　▼</text>
	</g>

	<!-- 金字塔各层 -->
	<g font-family="Inter, Arial, sans-serif" text-anchor="middle">
		<rect x="330" y="168" width="280" height="58" rx="10" fill="#34D399" fill-opacity="0.28" stroke="#059669" />
		<text x="470" y="194" fill="#047857" font-size="18" font-weight="700">寄存器 Register</text>
		<text x="470" y="216" fill="#475467" font-size="14">~256 KB / SM · 线程私有</text>

		<rect x="270" y="238" width="400" height="58" rx="10" fill="#60A5FA" fill-opacity="0.25" stroke="#2563EB" />
		<text x="470" y="264" fill="#1D4ED8" font-size="18" font-weight="700">L1 / 共享内存 Shared</text>
		<text x="470" y="286" fill="#475467" font-size="14">~192 KB / SM · Block 内共享</text>

		<rect x="200" y="308" width="540" height="58" rx="10" fill="#A78BFA" fill-opacity="0.25" stroke="#7C3AED" />
		<text x="470" y="334" fill="#6D28D9" font-size="18" font-weight="700">L2 缓存</text>
		<text x="470" y="356" fill="#475467" font-size="14">~40 MB · 所有 SM 共享</text>

		<rect x="120" y="378" width="700" height="58" rx="10" fill="#FB923C" fill-opacity="0.25" stroke="#EA580C" />
		<text x="470" y="404" fill="#C2410C" font-size="18" font-weight="700">全局显存 HBM（片外）</text>
		<text x="470" y="426" fill="#475467" font-size="14">40–80 GB · 所有线程可见 · 又慢又便宜</text>
	</g>

	<!-- 右侧延迟条 -->
	<g font-family="Inter, Arial, sans-serif">
		<text x="860" y="150" fill="#111827" font-size="17" font-weight="700">访问延迟（周期）</text>

		<rect x="860" y="183" width="4" height="28" rx="2" fill="#059669" />
		<text x="876" y="203" fill="#047857" font-family="ui-monospace, monospace" font-size="16" font-weight="700">≈ 1</text>

		<rect x="860" y="253" width="20" height="28" rx="3" fill="#2563EB" />
		<text x="892" y="273" fill="#1D4ED8" font-family="ui-monospace, monospace" font-size="16" font-weight="700">~30</text>

		<rect x="860" y="323" width="116" height="28" rx="3" fill="#7C3AED" />
		<text x="988" y="343" fill="#6D28D9" font-family="ui-monospace, monospace" font-size="16" font-weight="700">~200</text>

		<rect x="860" y="393" width="280" height="28" rx="3" fill="#EA580C" />
		<text x="1130" y="413" text-anchor="end" fill="#FFFFFF" font-family="ui-monospace, monospace" font-size="16" font-weight="700">~500</text>
	</g>

	<!-- 核心结论 -->
	<g transform="translate(56,458)">
		<rect x="0" y="0" width="1088" height="54" rx="14" fill="#111827" />
		<text x="28" y="34" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="18">寄存器 1 周期 vs 全局显存 ~500 周期：差两个数量级 —— 这道鸿沟就是所有优化要对抗的敌人。</text>
	</g>
</svg>
