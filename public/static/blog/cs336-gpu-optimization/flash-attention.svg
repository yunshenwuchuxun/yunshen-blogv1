<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" fill="none" role="img" aria-labelledby="fatitle fadesc">
	<title id="fatitle">FlashAttention 原理</title>
	<desc id="fadesc">标准注意力把 N×N 的分数矩阵写回 HBM 再读出，访存为 O(N²)；FlashAttention 把 Q、K、V 分块载入片上 SRAM，用 Online Softmax 增量计算，完整的 N×N 矩阵永不落盘，显存降到 O(N·d)。</desc>
	<defs>
		<marker id="afa" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
			<path d="M0 0 L9 5 L0 10 z" fill="#64748B" />
		</marker>
		<pattern id="smat" width="20" height="19" patternUnits="userSpaceOnUse">
			<rect x="0" y="0" width="20" height="19" fill="none" stroke="#DC2626" stroke-opacity="0.35" stroke-width="1" />
		</pattern>
	</defs>
	<rect width="1200" height="560" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="512" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />

	<text x="56" y="80" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">FlashAttention：把注意力搬进 SRAM</text>
	<text x="56" y="114" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="19">标准实现把 N×N 分数矩阵写回 HBM；FlashAttention 分块 + Online Softmax，全程在片上完成。</text>

	<!-- 左：标准注意力 -->
	<rect x="56" y="148" width="540" height="380" rx="18" fill="#FEF2F2" stroke="#FCA5A5" />
	<text x="80" y="188" fill="#B91C1C" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">标准注意力</text>
	<g font-family="Inter, Arial, sans-serif" text-anchor="middle">
		<rect x="130" y="210" width="96" height="42" rx="8" fill="#60A5FA" fill-opacity="0.4" stroke="#2563EB" /><text x="178" y="237" fill="#1D4ED8" font-size="17" font-weight="700">Q</text>
		<rect x="300" y="210" width="96" height="42" rx="8" fill="#34D399" fill-opacity="0.45" stroke="#059669" /><text x="348" y="237" fill="#047857" font-size="17" font-weight="700">K</text>
		<g stroke="#64748B" stroke-width="2" marker-end="url(#afa)">
			<line x1="178" y1="254" x2="240" y2="282" /><line x1="348" y1="254" x2="290" y2="282" />
		</g>
		<rect x="160" y="286" width="200" height="116" rx="8" fill="#FCA5A5" fill-opacity="0.3" stroke="#DC2626" />
		<rect x="160" y="286" width="200" height="116" rx="8" fill="url(#smat)" />
		<text x="260" y="332" fill="#991B1B" font-size="19" font-weight="800">S = Q·Kᵀ</text>
		<text x="260" y="360" fill="#B91C1C" font-size="15">N × N 矩阵</text>
		<rect x="396" y="306" width="150" height="78" rx="12" fill="#FEE2E2" stroke="#DC2626" />
		<text x="471" y="338" fill="#B91C1C" font-size="16" font-weight="700">✗ 写回 HBM</text>
		<text x="471" y="362" fill="#991B1B" font-size="14">整块 N×N</text>
		<line x1="260" y1="402" x2="260" y2="426" stroke="#64748B" stroke-width="2" marker-end="url(#afa)" />
		<rect x="120" y="430" width="300" height="42" rx="8" fill="#FCD34D" fill-opacity="0.5" stroke="#D97706" />
		<text x="270" y="457" fill="#92400E" font-size="15" font-weight="600">softmax → 乘 V（再过一遍 HBM）</text>
	</g>
	<rect x="80" y="486" width="440" height="32" rx="16" fill="#B91C1C" />
	<text x="300" y="508" text-anchor="middle" fill="#FFFFFF" font-family="ui-monospace, monospace" font-size="15" font-weight="700">访存 ∝ O(N²)　显存爆炸</text>

	<!-- 右：FlashAttention -->
	<rect x="604" y="148" width="540" height="380" rx="18" fill="#ECFDF5" stroke="#6EE7B7" />
	<text x="628" y="188" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">FlashAttention</text>
	<g font-family="Inter, Arial, sans-serif" text-anchor="middle">
		<text x="884" y="206" fill="#475467" font-size="13">Q / K / V 各自分块加载</text>
		<g>
			<rect x="660" y="214" width="72" height="14" rx="3" fill="#60A5FA" fill-opacity="0.45" stroke="#2563EB" />
			<rect x="660" y="230" width="72" height="14" rx="3" fill="#60A5FA" fill-opacity="0.45" stroke="#2563EB" />
			<rect x="660" y="246" width="72" height="14" rx="3" fill="#60A5FA" fill-opacity="0.45" stroke="#2563EB" />
			<text x="696" y="244" fill="#1D4ED8" font-size="13" font-weight="700">Q</text>
		</g>
		<g>
			<rect x="848" y="214" width="72" height="14" rx="3" fill="#34D399" fill-opacity="0.5" stroke="#059669" />
			<rect x="848" y="230" width="72" height="14" rx="3" fill="#34D399" fill-opacity="0.5" stroke="#059669" />
			<rect x="848" y="246" width="72" height="14" rx="3" fill="#34D399" fill-opacity="0.5" stroke="#059669" />
			<text x="884" y="244" fill="#047857" font-size="13" font-weight="700">K</text>
		</g>
		<g>
			<rect x="1004" y="214" width="72" height="14" rx="3" fill="#FB923C" fill-opacity="0.5" stroke="#EA580C" />
			<rect x="1004" y="230" width="72" height="14" rx="3" fill="#FB923C" fill-opacity="0.5" stroke="#EA580C" />
			<rect x="1004" y="246" width="72" height="14" rx="3" fill="#FB923C" fill-opacity="0.5" stroke="#EA580C" />
			<text x="1040" y="244" fill="#C2410C" font-size="13" font-weight="700">V</text>
		</g>
		<g stroke="#64748B" stroke-width="2" marker-end="url(#afa)">
			<line x1="696" y1="262" x2="720" y2="294" /><line x1="884" y1="262" x2="884" y2="294" /><line x1="1040" y1="262" x2="1016" y2="294" />
		</g>

		<rect x="628" y="298" width="492" height="150" rx="14" fill="#FFFFFF" stroke="#059669" stroke-dasharray="7 6" />
		<text x="650" y="324" text-anchor="start" fill="#047857" font-size="15" font-weight="700">片上 SRAM（快）· 循环遍历 K,V 块</text>
		<rect x="646" y="360" width="138" height="62" rx="10" fill="#60A5FA" fill-opacity="0.22" stroke="#2563EB" />
		<text x="715" y="388" fill="#1D4ED8" font-size="14" font-weight="600">Sij = Qi·Kjᵀ</text>
		<text x="715" y="408" fill="#475467" font-size="12">片上分块乘</text>
		<rect x="806" y="360" width="138" height="62" rx="10" fill="#FCD34D" fill-opacity="0.35" stroke="#D97706" />
		<text x="875" y="388" fill="#92400E" font-size="14" font-weight="600">online softmax</text>
		<text x="875" y="408" fill="#475467" font-size="12">增量更新 m, l</text>
		<rect x="966" y="360" width="138" height="62" rx="10" fill="#FB923C" fill-opacity="0.22" stroke="#EA580C" />
		<text x="1035" y="388" fill="#C2410C" font-size="14" font-weight="600">Oi += Pij·Vj</text>
		<text x="1035" y="408" fill="#475467" font-size="12">累加输出</text>
		<g stroke="#059669" stroke-width="2" marker-end="url(#afa)">
			<line x1="784" y1="391" x2="804" y2="391" /><line x1="944" y1="391" x2="964" y2="391" />
		</g>

		<line x1="884" y1="448" x2="884" y2="470" stroke="#64748B" stroke-width="2" marker-end="url(#afa)" />
	</g>
	<rect x="628" y="478" width="262" height="40" rx="14" fill="#047857" />
	<text x="759" y="503" text-anchor="middle" fill="#FFFFFF" font-family="ui-monospace, monospace" font-size="14" font-weight="700">N×N 永不落盘 · O(N·d)</text>
	<rect x="906" y="478" width="214" height="40" rx="14" fill="#E5E7EB" stroke="#9CA3AF" />
	<text x="1013" y="503" text-anchor="middle" fill="#374151" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">仅把 Oi 写回 HBM</text>
</svg>
