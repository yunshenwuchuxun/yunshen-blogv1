<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">优化器演进封面</title>
	<desc id="desc">从 SGD 出发，经过动量、RMSProp、Adam 到 AdamW 的优化器演进示意。</desc>
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#0b1120" />
			<stop offset="0.5" stop-color="#0f172a" />
			<stop offset="1" stop-color="#1e293b" />
		</linearGradient>
		<linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#22d3ee" />
			<stop offset="1" stop-color="#a78bfa" />
		</linearGradient>
		<linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#f472b6" />
			<stop offset="1" stop-color="#fb923c" />
		</linearGradient>
		<filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
			<feGaussianBlur stdDeviation="6" result="blur" />
			<feMerge>
				<feMergeNode in="blur" />
				<feMergeNode in="SourceGraphic" />
			</feMerge>
		</filter>
		<radialGradient id="bowl" cx="0.5" cy="0.5" r="0.5">
			<stop offset="0" stop-color="#0ea5e9" stop-opacity="0.45" />
			<stop offset="1" stop-color="#0ea5e9" stop-opacity="0" />
		</radialGradient>
	</defs>
	<rect width="1200" height="630" fill="url(#bg)" />
	<circle cx="940" cy="160" r="240" fill="#22d3ee" opacity="0.07" />
	<circle cx="220" cy="540" r="260" fill="#a78bfa" opacity="0.07" />

	<g transform="translate(720 330)">
		<ellipse cx="0" cy="0" rx="320" ry="200" fill="url(#bowl)" />
		<g fill="none" stroke="#475569" stroke-width="1.5" opacity="0.55">
			<ellipse cx="0" cy="0" rx="60" ry="38" />
			<ellipse cx="0" cy="0" rx="120" ry="76" />
			<ellipse cx="0" cy="0" rx="180" ry="114" />
			<ellipse cx="0" cy="0" rx="240" ry="152" />
			<ellipse cx="0" cy="0" rx="300" ry="190" />
		</g>
		<path d="M -260 -150 Q -180 -40 -120 -90 Q -40 -150 -10 -40 Q 20 70 -20 10 Q -10 -10 0 0" fill="none" stroke="url(#accent1)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
		<path d="M -260 -150 C -200 -120 -160 -90 -110 -60 C -60 -30 -20 -10 0 0" fill="none" stroke="url(#accent2)" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 8" filter="url(#glow)" />
		<circle cx="0" cy="0" r="10" fill="#fbbf24" />
		<circle cx="-260" cy="-150" r="10" fill="#22d3ee" />
	</g>

	<g fill="#e5e7eb">
		<text x="96" y="180" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="800" letter-spacing="-2">Optimizer</text>
		<text x="96" y="245" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600" fill="#cbd5e1">Momentum · RMSProp · Adam · AdamW</text>
		<text x="96" y="320" font-family="Inter, Arial, sans-serif" font-size="28" fill="#94a3b8">从抑制震荡到自适应步长</text>
		<text x="96" y="362" font-family="Inter, Arial, sans-serif" font-size="28" fill="#94a3b8">再到解耦权重衰减的演进路径</text>
	</g>

	<g transform="translate(96 450)">
		<rect width="500" height="80" rx="18" fill="rgba(15,23,42,0.55)" stroke="rgba(148,163,184,0.35)" />
		<text x="28" y="50" font-family="JetBrains Mono, Consolas, monospace" font-size="22" fill="#bae6fd">θ ← (1 − ηλ)θ − η · m̂ / (√v̂ + ε)</text>
	</g>
</svg>
