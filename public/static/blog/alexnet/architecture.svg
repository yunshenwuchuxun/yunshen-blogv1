<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#a0aec0"/>
    </marker>
  </defs>
  <rect width="880" height="300" rx="10" fill="#f7fafc" stroke="#e2e8f0"/>

  <!-- Title -->
  <text x="440" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#2d3748">AlexNet 网络架构（5 卷积层 + 3 全连接层）</text>

  <!-- Section: Feature Extractor -->
  <rect x="28" y="44" width="544" height="108" rx="8" fill="none" stroke="#bee3f8" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="300" y="60" text-anchor="middle" font-size="11" font-weight="600" fill="#4299e1">特征提取器 (Feature Extractor)</text>

  <!-- Input -->
  <rect x="40" y="72" width="72" height="68" rx="6" fill="#fffaf0" stroke="#ed8936" stroke-width="1.3"/>
  <text x="76" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#c05621">Input</text>
  <text x="76" y="114" text-anchor="middle" font-size="9" fill="#c05621">224x224x3</text>
  <text x="76" y="128" text-anchor="middle" font-size="8" fill="#a0aec0">(RGB)</text>

  <!-- Arrow -->
  <line x1="112" y1="106" x2="130" y2="106" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Conv1+Pool -->
  <rect x="132" y="72" width="82" height="68" rx="6" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.3"/>
  <text x="173" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#2b6cb0">Conv1+Pool</text>
  <text x="173" y="106" text-anchor="middle" font-size="9" fill="#4a5568">k=11, s=4</text>
  <text x="173" y="120" text-anchor="middle" font-size="9" fill="#718096">27x27x64</text>
  <text x="173" y="132" text-anchor="middle" font-size="8" fill="#38a169">ReLU</text>

  <!-- Arrow -->
  <line x1="214" y1="106" x2="232" y2="106" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Conv2+Pool -->
  <rect x="234" y="72" width="82" height="68" rx="6" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.3"/>
  <text x="275" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#2b6cb0">Conv2+Pool</text>
  <text x="275" y="106" text-anchor="middle" font-size="9" fill="#4a5568">k=5, s=1</text>
  <text x="275" y="120" text-anchor="middle" font-size="9" fill="#718096">13x13x192</text>
  <text x="275" y="132" text-anchor="middle" font-size="8" fill="#38a169">ReLU</text>

  <!-- Arrow -->
  <line x1="316" y1="106" x2="334" y2="106" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Conv3 -->
  <rect x="336" y="72" width="70" height="68" rx="6" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.3"/>
  <text x="371" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#2b6cb0">Conv3</text>
  <text x="371" y="106" text-anchor="middle" font-size="9" fill="#4a5568">k=3, s=1</text>
  <text x="371" y="120" text-anchor="middle" font-size="9" fill="#718096">13x13x384</text>
  <text x="371" y="132" text-anchor="middle" font-size="8" fill="#38a169">ReLU</text>

  <!-- Arrow -->
  <line x1="406" y1="106" x2="418" y2="106" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Conv4 -->
  <rect x="420" y="72" width="70" height="68" rx="6" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.3"/>
  <text x="455" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#2b6cb0">Conv4</text>
  <text x="455" y="106" text-anchor="middle" font-size="9" fill="#4a5568">k=3, s=1</text>
  <text x="455" y="120" text-anchor="middle" font-size="9" fill="#718096">13x13x256</text>
  <text x="455" y="132" text-anchor="middle" font-size="8" fill="#38a169">ReLU</text>

  <!-- Arrow -->
  <line x1="490" y1="106" x2="502" y2="106" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Conv5+Pool -->
  <rect x="504" y="72" width="80" height="68" rx="6" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.3"/>
  <text x="544" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#2b6cb0">Conv5+Pool</text>
  <text x="544" y="106" text-anchor="middle" font-size="9" fill="#4a5568">k=3, s=1</text>
  <text x="544" y="120" text-anchor="middle" font-size="9" fill="#718096">6x6x256</text>
  <text x="544" y="132" text-anchor="middle" font-size="8" fill="#38a169">ReLU</text>

  <!-- Connector from row 1 to row 2 -->
  <line x1="544" y1="140" x2="544" y2="164" stroke="#a0aec0" stroke-width="1.3"/>
  <line x1="544" y1="164" x2="440" y2="164" stroke="#a0aec0" stroke-width="1.3"/>
  <line x1="440" y1="164" x2="440" y2="180" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="500" y="174" text-anchor="middle" font-size="9" font-weight="600" fill="#718096">Flatten: 9216</text>

  <!-- Section: Classifier -->
  <rect x="330" y="178" width="530" height="90" rx="8" fill="none" stroke="#c6f6d5" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="595" y="192" text-anchor="middle" font-size="11" font-weight="600" fill="#38a169">分类器 (Classifier)</text>

  <!-- FC1 -->
  <rect x="384" y="200" width="100" height="56" rx="6" fill="#f0fff4" stroke="#38a169" stroke-width="1.3"/>
  <text x="434" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">FC1 + Dropout</text>
  <text x="434" y="236" text-anchor="middle" font-size="9" fill="#718096">4096</text>
  <text x="434" y="248" text-anchor="middle" font-size="8" fill="#38a169">ReLU</text>

  <!-- Arrow -->
  <line x1="484" y1="228" x2="508" y2="228" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- FC2 -->
  <rect x="510" y="200" width="100" height="56" rx="6" fill="#f0fff4" stroke="#38a169" stroke-width="1.3"/>
  <text x="560" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">FC2 + Dropout</text>
  <text x="560" y="236" text-anchor="middle" font-size="9" fill="#718096">4096</text>
  <text x="560" y="248" text-anchor="middle" font-size="8" fill="#38a169">ReLU</text>

  <!-- Arrow -->
  <line x1="610" y1="228" x2="634" y2="228" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- FC3 -->
  <rect x="636" y="200" width="100" height="56" rx="6" fill="#f0fff4" stroke="#38a169" stroke-width="1.3"/>
  <text x="686" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">FC3</text>
  <text x="686" y="236" text-anchor="middle" font-size="9" fill="#718096">1000</text>
  <text x="686" y="248" text-anchor="middle" font-size="8" fill="#805ad5">Softmax</text>

  <!-- Arrow -->
  <line x1="736" y1="228" x2="762" y2="228" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="764" y="204" width="80" height="48" rx="6" fill="#fed7d7" stroke="#fc8181" stroke-width="1.3"/>
  <text x="804" y="224" text-anchor="middle" font-size="10" font-weight="600" fill="#9b2c2c">1000 类</text>
  <text x="804" y="240" text-anchor="middle" font-size="9" fill="#9b2c2c">预测</text>
</svg>