  <rect x="170" y="470" width="250" height="150" rx="24" fill="url(#card1)"/>
  <text x="295" y="525" text-anchor="middle" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">
