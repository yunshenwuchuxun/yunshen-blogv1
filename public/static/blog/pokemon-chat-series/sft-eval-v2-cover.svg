  </text>

  <rect x="485" y="470" width="250" height="150" rx="24" fill="url(#card2)"/>
  <text x="610" y="525" text-anchor="middle" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">
