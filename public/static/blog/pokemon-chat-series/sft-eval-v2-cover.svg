  <path d="M420 545H475" stroke="#475569" stroke-width="8" stroke-linecap="round"/>
  <path d="M735 545H790" stroke="#475569" stroke-width="8" stroke-linecap="round"/>
  <path d="M1050 545H1105" stroke="#475569" stroke-width="8" stroke-linecap="round"/>

  <path d="M468 530L488 545L468 560" stroke="#475569" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M783 530L803 545L783 560" stroke="#475569" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1098 530L1118 545L1098 560" stroke="#475569" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="120" y="800" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">
