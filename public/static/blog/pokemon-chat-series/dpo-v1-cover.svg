<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DCFCE7"/>
      <stop offset="1" stop-color="#86EFAC"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FEE2E2"/>
      <stop offset="1" stop-color="#FCA5A5"/>
    </linearGradient>
    <linearGradient id="policy" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#A5B4FC"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#CBD5E1"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="140" r="230" fill="#6366F1" opacity="0.24"/>
  <circle cx="250" cy="760" r="280" fill="#22D3EE" opacity="0.12"/>
  <circle cx="780" cy="450" r="330" fill="#A855F7" opacity="0.10"/>

  <text x="120" y="162" fill="#A5F3FC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">pokemon qwen 微调系列（四）</text>
  <text x="120" y="250" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="850">DPO 偏好优化实战</text>
  <text x="120" y="326" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="500">技术链路跑通了，为什么 v1 没有比 SFT v2 更强？</text>

  <g filter="url(#shadow)">
    <rect x="130" y="425" width="360" height="190" rx="28" fill="url(#good)"/>
    <text x="310" y="492" text-anchor="middle" fill="#14532D" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850">chosen</text>
    <text x="310" y="542" text-anchor="middle" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">Ground weakness</text>
    <text x="310" y="580" text-anchor="middle" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500">factual / concise</text>

    <rect x="620" y="425" width="360" height="190" rx="28" fill="url(#bad)"/>
    <text x="800" y="492" text-anchor="middle" fill="#7F1D1D" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850">rejected</text>
    <text x="800" y="542" text-anchor="middle" fill="#991B1B" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">Flying / Water / Grass</text>
    <text x="800" y="580" text-anchor="middle" fill="#991B1B" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500">false preference target</text>

    <rect x="1110" y="425" width="360" height="190" rx="28" fill="url(#policy)"/>
    <text x="1290" y="492" text-anchor="middle" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850">policy</text>
    <text x="1290" y="542" text-anchor="middle" fill="#3730A3" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">vs reference</text>
    <text x="1290" y="580" text-anchor="middle" fill="#3730A3" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500">DPO loss ≈ 0.6931</text>
  </g>

  <line x1="490" y1="520" x2="615" y2="520" stroke="#CBD5E1" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="980" y1="520" x2="1105" y2="520" stroke="#CBD5E1" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="120" y="710" width="1360" height="72" rx="22" fill="#020617" opacity="0.42"/>
  <text x="160" y="756" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600">146 preference pairs · 19 optimizer steps · Accuracy 63.3% → 63.3% · 下一步：overfit sanity test</text>
</svg>
