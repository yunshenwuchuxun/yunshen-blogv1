<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">BPE 与 BBPE 封面</title>
	<desc id="desc">从单词级、字符级到 BPE、BBPE，分词粒度在词表大小与序列长度之间的演进。</desc>
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#0b1120" />
			<stop offset="0.5" stop-color="#0f172a" />
			<stop offset="1" stop-color="#1e293b" />
		</linearGradient>
		<linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#fb7185" />
			<stop offset="1" stop-color="#fb923c" />
		</linearGradient>
		<linearGradient id="char" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#fbbf24" />
			<stop offset="1" stop-color="#facc15" />
		</linearGradient>
		<linearGradient id="bpe" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#22d3ee" />
			<stop offset="1" stop-color="#38bdf8" />
		</linearGradient>
		<linearGradient id="bbpe" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#a78bfa" />
			<stop offset="1" stop-color="#34d399" />
		</linearGradient>
		<filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
			<feGaussianBlur stdDeviation="6" result="blur" />
			<feMerge>
				<feMergeNode in="blur" />
				<feMergeNode in="SourceGraphic" />
			</feMerge>
		</filter>
	</defs>
	<rect width="1200" height="630" fill="url(#bg)" />
	<circle cx="940" cy="160" r="240" fill="#a78bfa" opacity="0.07" />
	<circle cx="220" cy="540" r="260" fill="#22d3ee" opacity="0.07" />

	<g fill="#e5e7eb">
		<text x="96" y="160" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="800" letter-spacing="-2">Tokenization</text>
		<text x="96" y="220" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600" fill="#cbd5e1">Word · Char · BPE · BBPE</text>
		<text x="96" y="282" font-family="Inter, Arial, sans-serif" font-size="24" fill="#94a3b8">在词表大小与序列长度之间的权衡</text>
	</g>

	<g transform="translate(640 360)">
		<line x1="-60" y1="180" x2="520" y2="180" stroke="#475569" stroke-width="2" />
		<line x1="-60" y1="180" x2="-60" y2="-100" stroke="#475569" stroke-width="2" />
		<text x="240" y="222" font-family="Inter, Arial, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">序列长度</text>
		<text x="-86" y="40" font-family="Inter, Arial, sans-serif" font-size="20" fill="#94a3b8" transform="rotate(-90 -86 40)">词表大小</text>

		<g filter="url(#glow)">
			<circle cx="20" cy="-60" r="22" fill="url(#word)" />
			<circle cx="440" cy="160" r="22" fill="url(#char)" />
			<circle cx="220" cy="80" r="22" fill="url(#bpe)" />
			<circle cx="280" cy="40" r="22" fill="url(#bbpe)" />
		</g>

		<g font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#f8fafc">
			<text x="50" y="-54">Word</text>
			<text x="362" y="166" text-anchor="end">Char</text>
			<text x="246" y="86">BPE</text>
			<text x="306" y="46">BBPE</text>
		</g>

		<g font-family="Inter, Arial, sans-serif" font-size="14" fill="#94a3b8">
			<text x="50" y="-32">大词表 / 短序列 / 重 OOV</text>
			<text x="362" y="184" text-anchor="end">小词表 / 长序列 / 弱语义</text>
		</g>
	</g>

	<g transform="translate(96 470)">
		<rect width="460" height="80" rx="18" fill="rgba(15,23,42,0.55)" stroke="rgba(148,163,184,0.35)" />
		<text x="24" y="36" font-family="Inter, Arial, sans-serif" font-size="18" fill="#bae6fd">最小单元下沉路径</text>
		<text x="24" y="64" font-family="JetBrains Mono, Consolas, monospace" font-size="20" fill="#e2e8f0">word → char → subword → byte</text>
	</g>
</svg>
