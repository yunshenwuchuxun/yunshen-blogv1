<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">混合专家模型 MoE 封面</title>
	<desc id="desc">CS336 第四讲：混合专家模型，用稀疏路由把单个前馈网络替换为多个专家，实现容量大但计算稀疏的架构。</desc>
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#0b1120" />
			<stop offset="0.5" stop-color="#111a2e" />
			<stop offset="1" stop-color="#1e293b" />
		</linearGradient>
		<linearGradient id="accentA" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#22d3ee" />
			<stop offset="1" stop-color="#a78bfa" />
		</linearGradient>
		<filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
			<feGaussianBlur stdDeviation="5" result="blur" />
			<feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
		</filter>
	</defs>
	<rect width="1200" height="630" fill="url(#bg)" />

	<text x="80" y="116" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="3">CS336 · LECTURE 4</text>
	<text x="80" y="200" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800">混合专家模型 MoE</text>
	<text x="80" y="262" fill="url(#accentA)" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">容量大，但计算稀疏</text>

	<text x="80" y="330" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="23">把单个前馈网络换成一组专家，每个 token 只激活其中少数几个。</text>
	<text x="80" y="366" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="23">参数规模与计算开销由此解耦——这正是万亿参数大模型的底层骨架。</text>

	<!-- 路由示意：input -> router -> 选中部分专家 -->
	<g font-family="Inter, Arial, sans-serif">
		<!-- input token -->
		<rect x="120" y="470" width="90" height="48" rx="10" fill="#1e293b" stroke="#475569" />
		<text x="165" y="500" fill="#e2e8f0" font-size="18" text-anchor="middle">token</text>

		<!-- router -->
		<rect x="280" y="466" width="110" height="56" rx="12" fill="#7c2d12" stroke="#fb923c" />
		<text x="335" y="500" fill="#fed7aa" font-size="19" font-weight="700" text-anchor="middle">Router</text>
		<line x1="210" y1="494" x2="280" y2="494" stroke="#64748b" stroke-width="2.5" marker-end="url(#none)" />

		<!-- experts grid -->
		<g>
			<rect x="470" y="430" width="120" height="40" rx="9" fill="#0e7490" stroke="#22d3ee" filter="url(#glow)" />
			<text x="530" y="456" fill="#cffafe" font-size="16" text-anchor="middle" font-weight="700">Expert 1 ✓</text>
			<rect x="470" y="478" width="120" height="40" rx="9" fill="#1e293b" stroke="#475569" />
			<text x="530" y="504" fill="#64748b" font-size="16" text-anchor="middle">Expert 2</text>
			<rect x="470" y="526" width="120" height="40" rx="9" fill="#1e293b" stroke="#475569" />
			<text x="530" y="552" fill="#64748b" font-size="16" text-anchor="middle">Expert 3</text>
			<rect x="620" y="430" width="120" height="40" rx="9" fill="#1e293b" stroke="#475569" />
			<text x="680" y="456" fill="#64748b" font-size="16" text-anchor="middle">Expert 4</text>
			<rect x="620" y="478" width="120" height="40" rx="9" fill="#6d28d9" stroke="#a78bfa" filter="url(#glow)" />
			<text x="680" y="504" fill="#ede9fe" font-size="16" text-anchor="middle" font-weight="700">Expert 5 ✓</text>
			<rect x="620" y="526" width="120" height="40" rx="9" fill="#1e293b" stroke="#475569" />
			<text x="680" y="552" fill="#64748b" font-size="16" text-anchor="middle">Expert N</text>
		</g>
		<line x1="390" y1="486" x2="470" y2="450" stroke="#22d3ee" stroke-width="2.5" />
		<line x1="390" y1="502" x2="620" y2="498" stroke="#a78bfa" stroke-width="2.5" />

		<text x="800" y="486" fill="#7dd3fc" font-size="20" font-weight="700">Top-K 稀疏激活</text>
		<text x="800" y="516" fill="#64748b" font-size="16">N 个专家中只点亮 K 个</text>
	</g>
</svg>
