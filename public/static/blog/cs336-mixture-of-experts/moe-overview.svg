<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none" role="img" aria-labelledby="otitle odesc">
	<title id="otitle">稠密 FFN 与稀疏 MoE 层对比</title>
	<desc id="odesc">稠密层中每个 token 都流经同一个大 FFN；MoE 层把 FFN 拆成多个专家，路由器为每个 token 只挑选 K 个专家激活。</desc>
	<rect width="1200" height="520" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="472" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />
	<text x="56" y="74" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">从"一个大 FFN"到"一组专家 + 路由"</text>
	<text x="56" y="108" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="18">MoE 把 Transformer 层中的前馈网络替换为多个并行专家，每个 token 仅激活其中少数几个。</text>

	<g font-family="Inter, Arial, sans-serif">
		<!-- 左：Dense -->
		<rect x="64" y="150" width="470" height="316" rx="16" fill="#FFFFFF" stroke="#D0D5DD" />
		<text x="88" y="190" fill="#111827" font-size="22" font-weight="700">稠密层（Dense FFN）</text>

		<rect x="240" y="216" width="120" height="40" rx="9" fill="#E0E7FF" stroke="#6366F1" />
		<text x="300" y="242" fill="#3730A3" font-size="16" text-anchor="middle">3 个 token</text>

		<rect x="200" y="300" width="200" height="64" rx="12" fill="#EEF2FF" stroke="#6366F1" />
		<text x="300" y="330" fill="#3730A3" font-size="18" font-weight="700" text-anchor="middle">同一个大 FFN</text>
		<text x="300" y="352" fill="#6366F1" font-size="14" text-anchor="middle">全部参数都参与计算</text>

		<line x1="300" y1="256" x2="300" y2="300" stroke="#6366F1" stroke-width="2.5" />
		<line x1="264" y1="256" x2="240" y2="300" stroke="#6366F1" stroke-width="2.5" />
		<line x1="336" y1="256" x2="360" y2="300" stroke="#6366F1" stroke-width="2.5" />

		<text x="300" y="420" fill="#B91C1C" font-size="16" text-anchor="middle" font-weight="600">计算量 ∝ 参数量</text>
		<text x="300" y="444" fill="#98A2B3" font-size="14" text-anchor="middle">想变强只能整体变大</text>

		<!-- 箭头 -->
		<text x="588" y="316" text-anchor="middle" fill="#94A3B8" font-size="44" font-weight="700">→</text>

		<!-- 右：MoE -->
		<rect x="642" y="150" width="494" height="316" rx="16" fill="#F0FDFA" stroke="#5EEAD4" />
		<text x="666" y="190" fill="#0F766E" font-size="22" font-weight="700">MoE 层（稀疏激活）</text>

		<rect x="800" y="210" width="120" height="38" rx="9" fill="#CCFBF1" stroke="#14B8A6" />
		<text x="860" y="235" fill="#115E59" font-size="16" text-anchor="middle">3 个 token</text>

		<rect x="812" y="272" width="96" height="40" rx="10" fill="#FEF3C7" stroke="#F59E0B" />
		<text x="860" y="298" fill="#92400E" font-size="16" font-weight="700" text-anchor="middle">Router</text>
		<line x1="860" y1="248" x2="860" y2="272" stroke="#14B8A6" stroke-width="2.5" />

		<!-- experts -->
		<g font-size="14" text-anchor="middle">
			<rect x="672" y="360" width="80" height="40" rx="9" fill="#99F6E4" stroke="#0D9488" />
			<text x="712" y="385" fill="#115E59" font-weight="700">E1 ✓</text>
			<rect x="762" y="360" width="80" height="40" rx="9" fill="#F1F5F9" stroke="#CBD5E1" />
			<text x="802" y="385" fill="#94A3B8">E2</text>
			<rect x="852" y="360" width="80" height="40" rx="9" fill="#F1F5F9" stroke="#CBD5E1" />
			<text x="892" y="385" fill="#94A3B8">E3</text>
			<rect x="942" y="360" width="80" height="40" rx="9" fill="#99F6E4" stroke="#0D9488" />
			<text x="982" y="385" fill="#115E59" font-weight="700">E4 ✓</text>
			<rect x="1032" y="360" width="80" height="40" rx="9" fill="#F1F5F9" stroke="#CBD5E1" />
			<text x="1072" y="385" fill="#94A3B8">EN</text>
		</g>
		<line x1="845" y1="312" x2="712" y2="360" stroke="#0D9488" stroke-width="2.5" />
		<line x1="875" y1="312" x2="982" y2="360" stroke="#0D9488" stroke-width="2.5" />

		<text x="890" y="440" fill="#0F766E" font-size="16" text-anchor="middle" font-weight="600">总参数可以很大，但每个 token 只过 K 个专家</text>
	</g>
</svg>
