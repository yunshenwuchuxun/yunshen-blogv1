<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" fill="none" role="img" aria-labelledby="rtitle rdesc">
	<title id="rtitle">Token 选择专家（TC）与专家选择 Token（EC）对比</title>
	<desc id="rdesc">TC 模式下每个 token 主动挑 Top-K 专家，语义完整但负载易失衡；EC 模式下每个专家主动挑 Top-K token，负载天然均衡但部分 token 可能被丢弃。</desc>
	<rect width="1200" height="560" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="512" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />
	<text x="56" y="72" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">两种路由方向：谁来选谁？</text>
	<text x="56" y="106" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="18">同样是 Top-K，方向相反，导致截然不同的负载特性与失败模式。</text>

	<g font-family="Inter, Arial, sans-serif">
		<!-- 左：TC -->
		<rect x="56" y="140" width="528" height="372" rx="16" fill="#EFF6FF" stroke="#93C5FD" />
		<text x="80" y="180" fill="#1D4ED8" font-size="22" font-weight="700">TC · Token 选择专家</text>
		<text x="80" y="208" fill="#3B82F6" font-size="15">"学生找导师"：每个 token 挑分数最高的 K 个专家</text>

		<!-- tokens -->
		<g font-size="15" text-anchor="middle">
			<rect x="92" y="240" width="64" height="34" rx="8" fill="#DBEAFE" stroke="#3B82F6" /><text x="124" y="263" fill="#1E3A8A">t1</text>
			<rect x="92" y="290" width="64" height="34" rx="8" fill="#DBEAFE" stroke="#3B82F6" /><text x="124" y="313" fill="#1E3A8A">t2</text>
			<rect x="92" y="340" width="64" height="34" rx="8" fill="#DBEAFE" stroke="#3B82F6" /><text x="124" y="363" fill="#1E3A8A">t3</text>
			<rect x="92" y="390" width="64" height="34" rx="8" fill="#DBEAFE" stroke="#3B82F6" /><text x="124" y="413" fill="#1E3A8A">t4</text>
		</g>
		<!-- experts -->
		<g font-size="15" text-anchor="middle">
			<rect x="440" y="250" width="100" height="40" rx="9" fill="#FCA5A5" stroke="#DC2626" /><text x="490" y="275" fill="#7F1D1D" font-weight="700">E1 🔥</text>
			<rect x="440" y="320" width="100" height="40" rx="9" fill="#FECACA" stroke="#EF4444" /><text x="490" y="345" fill="#991B1B">E2</text>
			<rect x="440" y="390" width="100" height="40" rx="9" fill="#F1F5F9" stroke="#CBD5E1" /><text x="490" y="415" fill="#94A3B8">E3 (冷)</text>
		</g>
		<!-- 大量箭头汇聚到 E1 -->
		<g stroke-width="2">
			<line x1="156" y1="257" x2="440" y2="266" stroke="#DC2626" />
			<line x1="156" y1="307" x2="440" y2="272" stroke="#DC2626" />
			<line x1="156" y1="357" x2="440" y2="278" stroke="#DC2626" />
			<line x1="156" y1="407" x2="440" y2="338" stroke="#3B82F6" />
			<line x1="156" y1="257" x2="440" y2="332" stroke="#3B82F6" stroke-dasharray="3 3" />
		</g>
		<text x="320" y="470" fill="#B91C1C" font-size="15" text-anchor="middle" font-weight="600">✓ 语义完整　✗ 热门专家过载、冷门专家闲置</text>
		<text x="320" y="494" fill="#94A3B8" font-size="14" text-anchor="middle">需要辅助损失/容量约束来"掰正"负载</text>

		<!-- 右：EC -->
		<rect x="616" y="140" width="528" height="372" rx="16" fill="#F0FDF4" stroke="#86EFAC" />
		<text x="640" y="180" fill="#15803D" font-size="22" font-weight="700">EC · 专家选择 Token</text>
		<text x="640" y="208" fill="#16A34A" font-size="15">"导师挑学生"：每个专家固定挑 Top-K 个 token</text>

		<!-- experts -->
		<g font-size="15" text-anchor="middle">
			<rect x="652" y="250" width="100" height="40" rx="9" fill="#BBF7D0" stroke="#16A34A" /><text x="702" y="275" fill="#14532D" font-weight="700">E1</text>
			<rect x="652" y="320" width="100" height="40" rx="9" fill="#BBF7D0" stroke="#16A34A" /><text x="702" y="345" fill="#14532D" font-weight="700">E2</text>
			<rect x="652" y="390" width="100" height="40" rx="9" fill="#BBF7D0" stroke="#16A34A" /><text x="702" y="415" fill="#14532D" font-weight="700">E3</text>
		</g>
		<!-- tokens -->
		<g font-size="15" text-anchor="middle">
			<rect x="1010" y="240" width="64" height="34" rx="8" fill="#DCFCE7" stroke="#22C55E" /><text x="1042" y="263" fill="#14532D">t1</text>
			<rect x="1010" y="290" width="64" height="34" rx="8" fill="#DCFCE7" stroke="#22C55E" /><text x="1042" y="313" fill="#14532D">t2</text>
			<rect x="1010" y="340" width="64" height="34" rx="8" fill="#DCFCE7" stroke="#22C55E" /><text x="1042" y="363" fill="#14532D">t3</text>
			<rect x="1010" y="390" width="64" height="34" rx="8" fill="#F1F5F9" stroke="#CBD5E1" /><text x="1042" y="411" fill="#94A3B8">t4 ✗</text>
		</g>
		<!-- 每个专家拉走均匀数量 token -->
		<g stroke-width="2">
			<line x1="752" y1="266" x2="1010" y2="257" stroke="#16A34A" />
			<line x1="752" y1="276" x2="1010" y2="307" stroke="#16A34A" />
			<line x1="752" y1="336" x2="1010" y2="307" stroke="#16A34A" />
			<line x1="752" y1="346" x2="1010" y2="357" stroke="#16A34A" />
			<line x1="752" y1="406" x2="1010" y2="257" stroke="#16A34A" />
			<line x1="752" y1="410" x2="1010" y2="357" stroke="#16A34A" />
		</g>
		<text x="880" y="470" fill="#15803D" font-size="15" text-anchor="middle" font-weight="600">✓ 负载天然均衡　✗ 部分 token 无人认领</text>
		<text x="880" y="494" fill="#94A3B8" font-size="14" text-anchor="middle">被丢弃的 token 只能靠残差连接"裸奔"到下一层</text>
	</g>
</svg>
