<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#a0aec0"/>
    </marker>
  </defs>
  <rect width="860" height="340" rx="10" fill="#f7fafc" stroke="#e2e8f0"/>

  <!-- Title -->
  <text x="430" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#2d3748">Swin Transformer 层级架构（4 Stage 金字塔结构）</text>

  <!-- ===== Input ===== -->
  <rect x="20" y="100" width="76" height="140" rx="6" fill="#fffaf0" stroke="#ed8936" stroke-width="1.3"/>
  <text x="58" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#c05621">Input</text>
  <text x="58" y="166" text-anchor="middle" font-size="9" fill="#c05621">224x224</text>
  <text x="58" y="180" text-anchor="middle" font-size="9" fill="#c05621">x3</text>

  <!-- Arrow: Input → Patch Partition -->
  <line x1="96" y1="170" x2="114" y2="170" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Patch Partition -->
  <rect x="116" y="130" width="60" height="80" rx="6" fill="#edf2f7" stroke="#a0aec0" stroke-width="1.2"/>
  <text x="146" y="160" text-anchor="middle" font-size="8" font-weight="600" fill="#4a5568">Patch</text>
  <text x="146" y="172" text-anchor="middle" font-size="8" font-weight="600" fill="#4a5568">Partition</text>
  <text x="146" y="188" text-anchor="middle" font-size="7" fill="#718096">4x4</text>
  <text x="146" y="200" text-anchor="middle" font-size="7" fill="#718096">&#8594; 56x56</text>

  <!-- Arrow -->
  <line x1="176" y1="170" x2="194" y2="170" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- ===== Stage 1 ===== -->
  <rect x="196" y="60" width="110" height="220" rx="8" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.5"/>
  <text x="251" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#2b6cb0">Stage 1</text>
  <text x="251" y="98" text-anchor="middle" font-size="9" fill="#4299e1">56x56x96</text>
  <!-- Swin Blocks -->
  <rect x="210" y="110" width="82" height="32" rx="5" fill="#bee3f8" stroke="#4299e1" stroke-width="0.8"/>
  <text x="251" y="130" text-anchor="middle" font-size="8" font-weight="600" fill="#2b6cb0">W-MSA + MLP</text>
  <rect x="210" y="150" width="82" height="32" rx="5" fill="#bee3f8" stroke="#4299e1" stroke-width="0.8"/>
  <text x="251" y="170" text-anchor="middle" font-size="8" font-weight="600" fill="#2b6cb0">SW-MSA + MLP</text>
  <text x="251" y="210" text-anchor="middle" font-size="9" fill="#718096">x2 Blocks</text>
  <!-- Patch resolution indicator -->
  <rect x="210" y="228" width="82" height="22" rx="4" fill="#fff" stroke="#4299e1" stroke-width="0.6"/>
  <text x="251" y="243" text-anchor="middle" font-size="8" fill="#4299e1">H/4 x W/4</text>

  <!-- Arrow + Patch Merging -->
  <line x1="306" y1="170" x2="334" y2="170" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="320" y="162" text-anchor="middle" font-size="7" font-weight="600" fill="#805ad5">Merge</text>

  <!-- ===== Stage 2 ===== -->
  <rect x="336" y="80" width="110" height="180" rx="8" fill="#f5f0ff" stroke="#805ad5" stroke-width="1.5"/>
  <text x="391" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#6b46c1">Stage 2</text>
  <text x="391" y="116" text-anchor="middle" font-size="9" fill="#805ad5">28x28x192</text>
  <rect x="350" y="128" width="82" height="32" rx="5" fill="#e9d8fd" stroke="#805ad5" stroke-width="0.8"/>
  <text x="391" y="148" text-anchor="middle" font-size="8" font-weight="600" fill="#553c9a">W-MSA + MLP</text>
  <rect x="350" y="168" width="82" height="32" rx="5" fill="#e9d8fd" stroke="#805ad5" stroke-width="0.8"/>
  <text x="391" y="188" text-anchor="middle" font-size="8" font-weight="600" fill="#553c9a">SW-MSA + MLP</text>
  <text x="391" y="222" text-anchor="middle" font-size="9" fill="#718096">x2 Blocks</text>
  <rect x="350" y="234" width="82" height="22" rx="4" fill="#fff" stroke="#805ad5" stroke-width="0.6"/>
  <text x="391" y="249" text-anchor="middle" font-size="8" fill="#805ad5">H/8 x W/8</text>

  <!-- Arrow + Patch Merging -->
  <line x1="446" y1="170" x2="474" y2="170" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="460" y="162" text-anchor="middle" font-size="7" font-weight="600" fill="#805ad5">Merge</text>

  <!-- ===== Stage 3 ===== -->
  <rect x="476" y="100" width="110" height="140" rx="8" fill="#f0fff4" stroke="#38a169" stroke-width="1.5"/>
  <text x="531" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#276749">Stage 3</text>
  <text x="531" y="134" text-anchor="middle" font-size="9" fill="#38a169">14x14x384</text>
  <rect x="490" y="146" width="82" height="26" rx="5" fill="#c6f6d5" stroke="#38a169" stroke-width="0.8"/>
  <text x="531" y="163" text-anchor="middle" font-size="8" font-weight="600" fill="#276749">W-MSA + SW-MSA</text>
  <text x="531" y="196" text-anchor="middle" font-size="9" fill="#718096">x6 Blocks</text>
  <rect x="490" y="210" width="82" height="22" rx="4" fill="#fff" stroke="#38a169" stroke-width="0.6"/>
  <text x="531" y="225" text-anchor="middle" font-size="8" fill="#38a169">H/16 x W/16</text>

  <!-- Arrow + Patch Merging -->
  <line x1="586" y1="170" x2="614" y2="170" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="600" y="162" text-anchor="middle" font-size="7" font-weight="600" fill="#805ad5">Merge</text>

  <!-- ===== Stage 4 ===== -->
  <rect x="616" y="120" width="110" height="100" rx="8" fill="#fefcbf" stroke="#d69e2e" stroke-width="1.5"/>
  <text x="671" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#975a16">Stage 4</text>
  <text x="671" y="156" text-anchor="middle" font-size="9" fill="#d69e2e">7x7x768</text>
  <rect x="630" y="166" width="82" height="26" rx="5" fill="#fefcbf" stroke="#d69e2e" stroke-width="0.8"/>
  <text x="671" y="183" text-anchor="middle" font-size="8" font-weight="600" fill="#975a16">W-MSA + SW-MSA</text>
  <text x="671" y="208" text-anchor="middle" font-size="9" fill="#718096">x2 Blocks</text>

  <!-- Arrow: Stage 4 → Output -->
  <line x1="726" y1="170" x2="754" y2="170" stroke="#a0aec0" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="756" y="130" width="80" height="80" rx="8" fill="#fed7d7" stroke="#fc8181" stroke-width="1.3"/>
  <text x="796" y="158" text-anchor="middle" font-size="10" font-weight="600" fill="#9b2c2c">AvgPool</text>
  <text x="796" y="176" text-anchor="middle" font-size="10" fill="#9b2c2c">+</text>
  <text x="796" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#9b2c2c">Head</text>

  <!-- Bottom annotation: resolution progression -->
  <rect x="140" y="296" width="580" height="30" rx="6" fill="#edf2f7"/>
  <text x="430" y="316" text-anchor="middle" font-size="10" font-weight="600" fill="#2d3748">分辨率递减: 56x56 &#8594; 28x28 &#8594; 14x14 &#8594; 7x7 &#160;&#160;|&#160;&#160; 通道递增: 96 &#8594; 192 &#8594; 384 &#8594; 768</text>
</svg>