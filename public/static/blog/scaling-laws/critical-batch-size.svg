<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" fill="none" role="img" aria-labelledby="t d">
	<title id="t">临界批量大小</title>
	<desc id="d">低于临界批量增大 batch 主要换取训练时间缩短，高于临界批量则边际收益递减、浪费算力。</desc>
	<rect width="1200" height="500" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="452" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />
	<text x="56" y="70" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">临界批量大小：时间与算力的权衡点</text>
	<text x="56" y="100" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="17">达到同一损失，所需训练步数随 batch 增大而下降，但越过临界点后收益迅速枯竭。</text>

	<g font-family="Inter, Arial, sans-serif">
		<line x1="140" y1="150" x2="140" y2="420" stroke="#94A3B8" stroke-width="2.5" />
		<line x1="140" y1="420" x2="1120" y2="420" stroke="#94A3B8" stroke-width="2.5" />
		<text x="120" y="150" fill="#475569" font-size="15" text-anchor="end" transform="rotate(-90 120 285)">达到目标损失所需步数</text>
		<text x="630" y="458" fill="#475569" font-size="15" text-anchor="middle">批量大小 Batch Size（log）</text>

		<!-- 区域 -->
		<rect x="140" y="150" width="480" height="270" fill="#DCFCE7" opacity="0.5" />
		<rect x="620" y="150" width="500" height="270" fill="#FEE2E2" opacity="0.5" />

		<!-- 曲线：陡降 -> 平台 -->
		<path d="M160 180 C 320 230, 500 360, 620 388 C 780 408, 950 412, 1100 414"
			stroke="#6366F1" stroke-width="4.5" fill="none" stroke-linecap="round" />

		<!-- 临界点 -->
		<line x1="620" y1="150" x2="620" y2="420" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6 6" />
		<circle cx="620" cy="388" r="8" fill="#7C3AED" />
		<text x="620" y="138" fill="#5B21B6" font-size="16" font-weight="700" text-anchor="middle">临界批量大小 B*</text>

		<text x="380" y="300" fill="#15803D" font-size="18" font-weight="700" text-anchor="middle">高效区</text>
		<text x="380" y="326" fill="#166534" font-size="14" text-anchor="middle">加 batch ≈ 等比例省时间</text>

		<text x="870" y="240" fill="#B91C1C" font-size="18" font-weight="700" text-anchor="middle">浪费区</text>
		<text x="870" y="266" fill="#991B1B" font-size="14" text-anchor="middle">时间几乎不再缩短，纯烧算力</text>
	</g>
</svg>
