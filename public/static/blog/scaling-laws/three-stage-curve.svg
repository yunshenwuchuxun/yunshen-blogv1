<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none" role="img" aria-labelledby="t d">
	<title id="t">Hestness 三阶段学习曲线</title>
	<desc id="d">双对数坐标下，损失随数据量变化分为小数据区、幂律区与不可约误差区三个阶段。</desc>
	<rect width="1200" height="520" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="472" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />
	<text x="56" y="70" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">三阶段学习曲线（双对数坐标）</text>
	<text x="56" y="100" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="17">只有中间的"幂律区"是一条可拟合、可外推的直线——缩放定律就工作在这里。</text>

	<g font-family="Inter, Arial, sans-serif">
		<!-- 坐标轴 -->
		<line x1="140" y1="150" x2="140" y2="430" stroke="#94A3B8" stroke-width="2.5" />
		<line x1="140" y1="430" x2="1120" y2="430" stroke="#94A3B8" stroke-width="2.5" />
		<text x="120" y="150" fill="#475569" font-size="16" text-anchor="end" transform="rotate(-90 120 290)">log（损失 Loss）</text>
		<text x="630" y="466" fill="#475569" font-size="16" text-anchor="middle">log（数据量 Data）</text>

		<!-- 区域底色 -->
		<rect x="140" y="150" width="240" height="280" fill="#FEF3C7" opacity="0.55" />
		<rect x="380" y="150" width="440" height="280" fill="#DBEAFE" opacity="0.6" />
		<rect x="820" y="150" width="300" height="280" fill="#DCFCE7" opacity="0.6" />

		<!-- 曲线：高位抖动 -> 直线下降 -> 平台 -->
		<path d="M150 200 L190 215 L215 195 L250 230 L290 215 L330 245 L380 250"
			stroke="#B45309" stroke-width="4" fill="none" stroke-linecap="round" />
		<path d="M380 250 L820 388" stroke="#2563EB" stroke-width="4.5" fill="none" stroke-linecap="round" />
		<path d="M820 388 L880 400 L960 405 L1060 406 L1110 406"
			stroke="#15803D" stroke-width="4" fill="none" stroke-linecap="round" />

		<!-- 阶段标签 -->
		<text x="260" y="186" fill="#B45309" font-size="19" font-weight="700" text-anchor="middle">小数据区</text>
		<text x="260" y="412" fill="#92400E" font-size="14" text-anchor="middle">接近随机猜测</text>

		<text x="600" y="186" fill="#1D4ED8" font-size="19" font-weight="700" text-anchor="middle">幂律区</text>
		<text x="600" y="210" fill="#1E40AF" font-size="14" text-anchor="middle">log-log 下是直线 → 可拟合、可外推</text>

		<text x="970" y="186" fill="#15803D" font-size="19" font-weight="700" text-anchor="middle">不可约误差区</text>
		<text x="970" y="210" fill="#166534" font-size="14" text-anchor="middle">撞上容量 / 噪声天花板</text>
	</g>
</svg>
