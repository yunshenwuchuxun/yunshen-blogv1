<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">缩放定律 Scaling Laws 封面</title>
	<desc id="desc">缩放定律：在小规模实验上拟合幂律，再外推到大规模，从而在烧掉算力之前就预测大模型的性能。</desc>
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#0b1120" />
			<stop offset="0.5" stop-color="#111a2e" />
			<stop offset="1" stop-color="#1e293b" />
		</linearGradient>
		<linearGradient id="accentA" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#22d3ee" />
			<stop offset="1" stop-color="#a78bfa" />
		</linearGradient>
		<filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
			<feGaussianBlur stdDeviation="5" result="blur" />
			<feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
		</filter>
	</defs>
	<rect width="1200" height="630" fill="url(#bg)" />

	<text x="80" y="116" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="3">DATAWHALE diy-llm · CH.9</text>
	<text x="80" y="200" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800">缩放定律 Scaling Laws</text>
	<text x="80" y="262" fill="url(#accentA)" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">在炼丹之前，先把性能"算"出来</text>

	<text x="80" y="330" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="23">在便宜的小规模上拟合"投入 → 损失"的幂律曲线，</text>
	<text x="80" y="366" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="23">再外推到那个你还训练不起的大模型——预测先于烧钱。</text>

	<!-- 右下：log-log 幂律外推示意 -->
	<g transform="translate(720,360)" font-family="Inter, Arial, sans-serif">
		<line x1="0" y1="0" x2="0" y2="200" stroke="#475569" stroke-width="2" />
		<line x1="0" y1="200" x2="400" y2="200" stroke="#475569" stroke-width="2" />
		<text x="-8" y="-6" fill="#64748b" font-size="16" text-anchor="end">log L</text>
		<text x="400" y="224" fill="#64748b" font-size="16" text-anchor="end">log（参数 / 数据 / 算力）</text>

		<!-- 已拟合段（实线）+ 外推段（虚线） -->
		<line x1="20" y1="40" x2="240" y2="150" stroke="url(#accentA)" stroke-width="4" filter="url(#glow)" />
		<line x1="240" y1="150" x2="390" y2="225" stroke="#a78bfa" stroke-width="4" stroke-dasharray="9 8" opacity="0.85" />

		<!-- 数据点 -->
		<circle cx="40" cy="50" r="6" fill="#22d3ee" />
		<circle cx="100" cy="80" r="6" fill="#22d3ee" />
		<circle cx="160" cy="110" r="6" fill="#22d3ee" />
		<circle cx="220" cy="140" r="6" fill="#22d3ee" />
		<circle cx="340" cy="200" r="7" fill="#f472b6" />
		<text x="352" y="196" fill="#f9a8d4" font-size="15">外推预测</text>
		<text x="40" y="34" fill="#7dd3fc" font-size="15">小规模实验</text>
	</g>
</svg>
