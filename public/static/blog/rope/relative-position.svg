<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
	<title id="title">RoPE 相对位置来源</title>
	<desc id="desc">位置 m 和 n 的旋转矩阵在点积中合并为只依赖 n 减 m 的旋转矩阵。</desc>
	<rect width="960" height="420" rx="28" fill="#111827" />
	<text x="48" y="72" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#f9fafb">点积里只留下相对位移</text>
	<g font-family="JetBrains Mono, Consolas, monospace" font-size="28" fill="#e5e7eb">
		<text x="74" y="164">(R_m q)^T (R_n k)</text>
		<text x="378" y="164" fill="#94a3b8">=</text>
		<text x="424" y="164">q^T R_m^T R_n k</text>
		<text x="286" y="270" fill="#94a3b8">=</text>
		<text x="334" y="270">q^T R_{n-m} k</text>
	</g>
	<path d="M 615 182 C 610 224 536 236 480 247" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />
	<defs>
		<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
			<path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" />
		</marker>
	</defs>
	<rect x="132" y="318" width="696" height="56" rx="16" fill="#1f2937" stroke="#374151" />
	<text x="166" y="354" font-family="Inter, Arial, sans-serif" font-size="22" fill="#cbd5e1">绝对位置 m、n 进入旋转；注意力分数最终只依赖 n − m。</text>
</svg>
