<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
	<title id="title">二维旋转示意图</title>
	<desc id="desc">二维向量经过旋转矩阵后，模长保持不变，方向随位置改变。</desc>
	<rect width="960" height="520" rx="28" fill="#0f172a" />
	<g transform="translate(470 270)">
		<circle r="165" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="7 9" />
		<line x1="-220" y1="0" x2="220" y2="0" stroke="#64748b" stroke-width="2" />
		<line x1="0" y1="190" x2="0" y2="-190" stroke="#64748b" stroke-width="2" />
		<path d="M 0 0 L 148 -70" stroke="#38bdf8" stroke-width="7" stroke-linecap="round" />
		<path d="M 0 0 L 78 -145" stroke="#a78bfa" stroke-width="7" stroke-linecap="round" />
		<path d="M 108 -51 A 120 120 0 0 1 57 -106" fill="none" stroke="#fbbf24" stroke-width="5" stroke-linecap="round" />
		<circle cx="148" cy="-70" r="8" fill="#38bdf8" />
		<circle cx="78" cy="-145" r="8" fill="#a78bfa" />
		<text x="158" y="-76" font-family="Inter, Arial, sans-serif" font-size="22" fill="#bae6fd">x</text>
		<text x="88" y="-150" font-family="Inter, Arial, sans-serif" font-size="22" fill="#ddd6fe">R(θ)x</text>
		<text x="92" y="-100" font-family="Inter, Arial, sans-serif" font-size="20" fill="#fde68a">θ</text>
	</g>
	<text x="48" y="74" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#f8fafc">二维子空间中的旋转</text>
	<text x="48" y="122" font-family="Inter, Arial, sans-serif" font-size="22" fill="#cbd5e1">RoPE 不把位置向量加到语义向量上，而是按位置角度旋转 query 与 key。</text>
	<text x="48" y="454" font-family="JetBrains Mono, Consolas, monospace" font-size="24" fill="#e2e8f0">R(θ) = [[cosθ, -sinθ], [sinθ, cosθ]]</text>
</svg>
