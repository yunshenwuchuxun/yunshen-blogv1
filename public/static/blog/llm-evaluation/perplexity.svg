<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none" role="img" aria-labelledby="t d">
	<title id="t">困惑度的直觉</title>
	<desc id="d">困惑度衡量模型预测下一个词时的"平均犹豫程度"：分布越尖锐自信，困惑度越低；越平摊犹豫，困惑度越高。</desc>
	<rect width="1200" height="520" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="472" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />
	<text x="56" y="68" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">困惑度：模型预测下一个词时有多"犹豫"</text>
	<text x="56" y="98" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="16">读到"我把水烧__"，好模型几乎笃定是"开"；差模型对一堆词都拿不准——后者的困惑度更高。</text>

	<g font-family="Inter, Arial, sans-serif">
		<!-- 左：低困惑度 -->
		<rect x="64" y="138" width="500" height="320" rx="16" fill="#ECFDF5" stroke="#A7F3D0" />
		<text x="314" y="174" fill="#047857" font-size="19" font-weight="700" text-anchor="middle">好模型：分布尖锐，困惑度低</text>
		<line x1="110" y1="400" x2="520" y2="400" stroke="#94A3B8" stroke-width="2" />
		<rect x="130" y="200" width="58" height="200" rx="4" fill="#059669" />
		<rect x="210" y="370" width="58" height="30" rx="4" fill="#6EE7B7" />
		<rect x="290" y="378" width="58" height="22" rx="4" fill="#6EE7B7" />
		<rect x="370" y="384" width="58" height="16" rx="4" fill="#6EE7B7" />
		<rect x="450" y="388" width="58" height="12" rx="4" fill="#6EE7B7" />
		<text x="159" y="420" fill="#334155" font-size="14" text-anchor="middle">开</text>
		<text x="239" y="420" fill="#94A3B8" font-size="14" text-anchor="middle">了</text>
		<text x="319" y="420" fill="#94A3B8" font-size="14" text-anchor="middle">水</text>
		<text x="399" y="420" fill="#94A3B8" font-size="14" text-anchor="middle">饭</text>
		<text x="479" y="420" fill="#94A3B8" font-size="14" text-anchor="middle">…</text>

		<!-- 右：高困惑度 -->
		<rect x="636" y="138" width="500" height="320" rx="16" fill="#FEF2F2" stroke="#FECACA" />
		<text x="886" y="174" fill="#B91C1C" font-size="19" font-weight="700" text-anchor="middle">差模型：分布平摊，困惑度高</text>
		<line x1="682" y1="400" x2="1092" y2="400" stroke="#94A3B8" stroke-width="2" />
		<rect x="702" y="306" width="58" height="94" rx="4" fill="#DC2626" />
		<rect x="782" y="318" width="58" height="82" rx="4" fill="#F87171" />
		<rect x="862" y="312" width="58" height="88" rx="4" fill="#F87171" />
		<rect x="942" y="328" width="58" height="72" rx="4" fill="#F87171" />
		<rect x="1022" y="322" width="58" height="78" rx="4" fill="#F87171" />
		<text x="731" y="420" fill="#334155" font-size="14" text-anchor="middle">开</text>
		<text x="811" y="420" fill="#94A3B8" font-size="14" text-anchor="middle">了</text>
		<text x="891" y="420" fill="#94A3B8" font-size="14" text-anchor="middle">水</text>
		<text x="971" y="420" fill="#94A3B8" font-size="14" text-anchor="middle">饭</text>
		<text x="1051" y="420" fill="#94A3B8" font-size="14" text-anchor="middle">…</text>
	</g>
</svg>
