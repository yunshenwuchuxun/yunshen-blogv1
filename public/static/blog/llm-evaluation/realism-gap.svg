<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" fill="none" role="img" aria-labelledby="t d">
	<title id="t">考试分数与真实使用之间的鸿沟</title>
	<desc id="d">绝大多数基准是标准化"考试题"，而真实用户更多是模糊的、多轮的"求助"——分数高不等于真实场景好用。</desc>
	<rect width="1200" height="500" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="452" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />
	<text x="56" y="66" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">考试分数 ≠ 真实世界好用</text>
	<text x="56" y="96" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="16">基准多是"测验型"题目，真实用户多是"求助型"诉求——两者之间始终隔着一道鸿沟。</text>

	<g font-family="Inter, Arial, sans-serif">
		<!-- 左：标准化考试 -->
		<rect x="64" y="132" width="468" height="312" rx="16" fill="#EFF6FF" stroke="#BFDBFE" />
		<text x="298" y="172" fill="#1D4ED8" font-size="20" font-weight="700" text-anchor="middle">标准化考试</text>
		<rect x="92" y="198" width="412" height="64" rx="10" fill="#FFFFFF" stroke="#BFDBFE" />
		<text x="108" y="228" fill="#334155" font-size="15">下列哪一项是质数？</text>
		<text x="108" y="252" fill="#64748B" font-size="14">(A) 9  (B) 15  (C) 17  (D) 21</text>
		<text x="92" y="300" fill="#334155" font-size="15">· 有唯一标准答案，易自动打分</text>
		<text x="92" y="332" fill="#334155" font-size="15">· 题型整齐、边界清晰</text>
		<text x="92" y="364" fill="#334155" font-size="15">· 容易被针对性优化、被背题</text>
		<text x="92" y="408" fill="#1D4ED8" font-size="15" font-weight="600">衡量的是"会不会做题"</text>

		<!-- 中间鸿沟 -->
		<path d="M566 150 L566 426" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round" />
		<text x="600" y="292" fill="#94A3B8" font-size="40" font-weight="800" text-anchor="middle">≠</text>

		<!-- 右：真实使用 -->
		<rect x="668" y="132" width="468" height="312" rx="16" fill="#FFF7ED" stroke="#FED7AA" />
		<text x="902" y="172" fill="#C2410C" font-size="20" font-weight="700" text-anchor="middle">真实用户的求助</text>
		<rect x="696" y="198" width="412" height="64" rx="10" fill="#FFFFFF" stroke="#FED7AA" />
		<text x="712" y="228" fill="#334155" font-size="15">"帮我把这段又臭又长的代码</text>
		<text x="712" y="252" fill="#334155" font-size="15">重构一下，顺便解释下为什么…"</text>
		<text x="696" y="300" fill="#334155" font-size="15">· 模糊、开放、常常多轮往返</text>
		<text x="696" y="332" fill="#334155" font-size="15">· 没有唯一正确答案</text>
		<text x="696" y="364" fill="#334155" font-size="15">· 好坏取决于是否真的帮到人</text>
		<text x="696" y="408" fill="#C2410C" font-size="15" font-weight="600">衡量的是"好不好用"</text>
	</g>
</svg>
