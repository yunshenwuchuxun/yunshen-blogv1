<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" fill="none" role="img" aria-labelledby="ztitle zdesc">
	<title id="ztitle">ZeRO 三阶段显存递减</title>
	<desc id="zdesc">以 7.5B 参数、64 张 GPU 为例，单卡显存从基线 120GB，经优化器状态分片降到 31.4GB，再分片梯度降到 16.6GB，最后分片参数（即 FSDP）降到 1.9GB。</desc>
	<defs>
		<marker id="zarr" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#DC2626" /></marker>
	</defs>
	<rect width="1200" height="600" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="552" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />

	<text x="56" y="80" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">ZeRO 三阶段：把重复的状态逐级切片</text>
	<text x="56" y="114" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="19">7.5B 参数、64 张 GPU、混合精度 Adam（16 字节/参数）。每往下一阶段，多切一类状态。</text>

	<!-- 图例 -->
	<g font-family="Inter, Arial, sans-serif" font-size="14" fill="#475467">
		<rect x="640" y="150" width="18" height="14" rx="3" fill="#60A5FA" stroke="#2563EB" /><text x="666" y="162">参数 2B</text>
		<rect x="760" y="150" width="18" height="14" rx="3" fill="#34D399" stroke="#059669" /><text x="786" y="162">梯度 2B</text>
		<rect x="880" y="150" width="18" height="14" rx="3" fill="#FBBF24" stroke="#D97706" /><text x="906" y="162">优化器状态 12B</text>
	</g>

	<!-- 坐标轴与网格 -->
	<g stroke="#E2E8F0" stroke-width="1">
		<line x1="150" y1="200" x2="1090" y2="200" /><line x1="150" y1="280" x2="1090" y2="280" /><line x1="150" y1="360" x2="1090" y2="360" />
	</g>
	<line x1="150" y1="440" x2="1090" y2="440" stroke="#94A3B8" stroke-width="2" />
	<g font-family="Inter, Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="end">
		<text x="140" y="205">120</text><text x="140" y="285">80</text><text x="140" y="365">40</text><text x="140" y="444">0</text>
		<text x="140" y="180" font-size="11">GB/卡</text>
	</g>

	<!-- 基线 DDP：120 GB -->
	<g>
		<rect x="200" y="410" width="100" height="30" fill="#60A5FA" stroke="#2563EB" />
		<rect x="200" y="380" width="100" height="30" fill="#34D399" stroke="#059669" />
		<rect x="200" y="200" width="100" height="180" fill="#FBBF24" stroke="#D97706" />
		<text x="250" y="190" text-anchor="middle" fill="#1E293B" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">120 GB</text>
	</g>

	<!-- Stage 1：31.4 GB -->
	<g>
		<rect x="430" y="410" width="100" height="30" fill="#60A5FA" stroke="#2563EB" />
		<rect x="430" y="380" width="100" height="30" fill="#34D399" stroke="#059669" />
		<rect x="430" y="377" width="100" height="3" fill="#FBBF24" stroke="#D97706" />
		<text x="480" y="368" text-anchor="middle" fill="#1E293B" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">31.4 GB</text>
	</g>

	<!-- Stage 2：16.6 GB -->
	<g>
		<rect x="660" y="410" width="100" height="30" fill="#60A5FA" stroke="#2563EB" />
		<rect x="660" y="407" width="100" height="3" fill="#34D399" stroke="#059669" />
		<rect x="660" y="404" width="100" height="3" fill="#FBBF24" stroke="#D97706" />
		<text x="710" y="396" text-anchor="middle" fill="#1E293B" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">16.6 GB</text>
	</g>

	<!-- Stage 3 = FSDP：1.9 GB -->
	<g>
		<rect x="890" y="436" width="100" height="4" fill="#60A5FA" stroke="#2563EB" />
		<rect x="890" y="433" width="100" height="3" fill="#34D399" stroke="#059669" />
		<rect x="890" y="430" width="100" height="3" fill="#FBBF24" stroke="#D97706" />
		<text x="940" y="422" text-anchor="middle" fill="#DC2626" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">1.9 GB</text>
	</g>

	<!-- 收缩箭头 -->
	<path d="M310 195 C 620 150, 820 360, 935 412" fill="none" stroke="#DC2626" stroke-width="2.5" stroke-dasharray="2 5" marker-end="url(#zarr)" />
	<text x="650" y="250" text-anchor="middle" fill="#DC2626" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">≈ 64× 收缩</text>

	<!-- X 轴标签 -->
	<g font-family="Inter, Arial, sans-serif" text-anchor="middle">
		<text x="250" y="472" fill="#1E293B" font-size="16" font-weight="700">基线 DDP</text>
		<text x="250" y="494" fill="#94A3B8" font-size="13">全量复制，不切</text>

		<text x="480" y="472" fill="#1E293B" font-size="16" font-weight="700">Stage 1 · P_os</text>
		<text x="480" y="494" fill="#94A3B8" font-size="13">切优化器状态</text>

		<text x="710" y="472" fill="#1E293B" font-size="16" font-weight="700">Stage 2 · +g</text>
		<text x="710" y="494" fill="#94A3B8" font-size="13">再切梯度</text>

		<text x="940" y="472" fill="#1E293B" font-size="16" font-weight="700">Stage 3 · +p</text>
		<text x="940" y="494" fill="#059669" font-size="13" font-weight="600">再切参数 = FSDP</text>
	</g>

	<!-- 底部说明 -->
	<g transform="translate(150,512)" font-family="Inter, Arial, sans-serif">
		<rect x="0" y="0" width="940" height="44" rx="10" fill="#F0FDF4" stroke="#BBF7D0" />
		<text x="20" y="29" fill="#166534" font-size="14">代价：Stage 3 用 All-Gather 临时取回参数、用 Reduce-Scatter 同步梯度，通信约 3×；靠「预取重叠」把实际损耗压到 10–20%。</text>
	</g>
</svg>
