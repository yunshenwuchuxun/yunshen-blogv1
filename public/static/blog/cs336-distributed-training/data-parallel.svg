<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" fill="none" role="img" aria-labelledby="dptitle dpdesc">
	<title id="dptitle">数据并行 DDP 流程</title>
	<desc id="dpdesc">三个 GPU 各持完整模型副本，分别处理一个批次分片做前向反向，再用 All-Reduce 取平均同步梯度，最后各自独立更新；痛点是每卡都重复存储参数、梯度与优化器状态。</desc>
	<defs>
		<marker id="dparr" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0 0 L8 5 L0 10 z" fill="#94A3B8" /></marker>
	</defs>
	<rect width="1200" height="600" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="552" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />

	<text x="56" y="80" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">数据并行 DDP：复制模型，切批次，归约梯度</text>
	<text x="56" y="114" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="19">反向传播后一次 All-Reduce 是唯一的同步点；某张卡漏掉它，整个训练就会挂起。</text>

	<!-- 阶段编号 -->
	<g font-family="Inter, Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">
		<circle cx="80" cy="168" r="13" fill="#3B82F6" /><text x="80" y="173">1</text>
		<circle cx="80" cy="250" r="13" fill="#3B82F6" /><text x="80" y="255">2</text>
		<circle cx="80" cy="382" r="13" fill="#3B82F6" /><text x="80" y="387">3</text>
		<circle cx="80" cy="470" r="13" fill="#3B82F6" /><text x="80" y="475">4</text>
	</g>
	<g font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">
		<text x="104" y="173">切分批次</text>
		<text x="104" y="255">各卡前向+反向</text>
		<text x="104" y="387">同步梯度</text>
		<text x="104" y="475">独立更新</text>
	</g>

	<!-- 三个 GPU 列 -->
	<g font-family="Inter, Arial, sans-serif" text-anchor="middle">
		<!-- 批次分片 -->
		<rect x="280" y="152" width="120" height="32" rx="6" fill="#60A5FA" stroke="#2563EB" /><text x="340" y="173" fill="#FFFFFF" font-size="14" font-weight="600">批次分片 0</text>
		<rect x="540" y="152" width="120" height="32" rx="6" fill="#34D399" stroke="#059669" /><text x="600" y="173" fill="#FFFFFF" font-size="14" font-weight="600">批次分片 1</text>
		<rect x="800" y="152" width="120" height="32" rx="6" fill="#FBBF24" stroke="#D97706" /><text x="860" y="173" fill="#FFFFFF" font-size="14" font-weight="600">批次分片 2</text>

		<!-- 模型副本 -->
		<rect x="270" y="218" width="140" height="64" rx="10" fill="#E2E8F0" stroke="#94A3B8" /><text x="340" y="246" fill="#475467" font-size="14" font-weight="600">完整模型 θ</text><text x="340" y="268" fill="#94A3B8" font-size="12">GPU 0</text>
		<rect x="530" y="218" width="140" height="64" rx="10" fill="#E2E8F0" stroke="#94A3B8" /><text x="600" y="246" fill="#475467" font-size="14" font-weight="600">完整模型 θ</text><text x="600" y="268" fill="#94A3B8" font-size="12">GPU 1</text>
		<rect x="790" y="218" width="140" height="64" rx="10" fill="#E2E8F0" stroke="#94A3B8" /><text x="860" y="246" fill="#475467" font-size="14" font-weight="600">完整模型 θ</text><text x="860" y="268" fill="#94A3B8" font-size="12">GPU 2</text>

		<!-- 本地梯度 -->
		<rect x="290" y="318" width="100" height="40" rx="8" fill="#DBEAFE" stroke="#2563EB" /><text x="340" y="343" fill="#1E40AF" font-size="16" font-weight="700">∇₀</text>
		<rect x="550" y="318" width="100" height="40" rx="8" fill="#D1FAE5" stroke="#059669" /><text x="600" y="343" fill="#065F46" font-size="16" font-weight="700">∇₁</text>
		<rect x="810" y="318" width="100" height="40" rx="8" fill="#FEF3C7" stroke="#D97706" /><text x="860" y="343" fill="#92400E" font-size="16" font-weight="700">∇₂</text>
	</g>

	<!-- 下行箭头 -->
	<g stroke="#94A3B8" stroke-width="2" marker-end="url(#dparr)">
		<line x1="340" y1="186" x2="340" y2="214" /><line x1="600" y1="186" x2="600" y2="214" /><line x1="860" y1="186" x2="860" y2="214" />
		<line x1="340" y1="284" x2="340" y2="314" /><line x1="600" y1="284" x2="600" y2="314" /><line x1="860" y1="284" x2="860" y2="314" />
		<line x1="340" y1="360" x2="340" y2="386" /><line x1="600" y1="360" x2="600" y2="386" /><line x1="860" y1="360" x2="860" y2="386" />
	</g>

	<!-- All-Reduce 同步带 -->
	<rect x="270" y="388" width="660" height="48" rx="12" fill="#EDE9FE" stroke="#7C3AED" />
	<text x="600" y="418" text-anchor="middle" fill="#5B21B6" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">All-Reduce 梯度（取平均）→ 每卡得到相同的全局梯度 ∇̄</text>

	<!-- 更新 -->
	<g stroke="#94A3B8" stroke-width="2" marker-end="url(#dparr)">
		<line x1="340" y1="436" x2="340" y2="458" /><line x1="600" y1="436" x2="600" y2="458" /><line x1="860" y1="436" x2="860" y2="458" />
	</g>
	<g font-family="Inter, Arial, sans-serif" text-anchor="middle">
		<rect x="270" y="460" width="140" height="36" rx="8" fill="#F1F5F9" stroke="#CBD5E1" /><text x="340" y="483" fill="#475467" font-size="13">θ ← θ − η∇̄</text>
		<rect x="530" y="460" width="140" height="36" rx="8" fill="#F1F5F9" stroke="#CBD5E1" /><text x="600" y="483" fill="#475467" font-size="13">θ ← θ − η∇̄</text>
		<rect x="790" y="460" width="140" height="36" rx="8" fill="#F1F5F9" stroke="#CBD5E1" /><text x="860" y="483" fill="#475467" font-size="13">θ ← θ − η∇̄</text>
	</g>

	<!-- 痛点 -->
	<g transform="translate(960,200)" font-family="Inter, Arial, sans-serif">
		<rect x="0" y="0" width="186" height="296" rx="14" fill="#FEF2F2" stroke="#FECACA" />
		<text x="18" y="34" fill="#B91C1C" font-size="16" font-weight="700">痛点：重复存储</text>
		<text x="18" y="66" fill="#475467" font-size="13">每卡都存了一份完整的</text>
		<text x="18" y="90" fill="#475467" font-size="13">参数 + 梯度 + 优化器状态</text>
		<text x="18" y="130" fill="#7F1D1D" font-size="13" font-weight="600">混合精度 Adam：</text>
		<text x="18" y="154" fill="#475467" font-size="13">≈ 16 字节 / 参数</text>
		<text x="18" y="194" fill="#7F1D1D" font-size="13" font-weight="600">7.5B 参数：</text>
		<text x="18" y="218" fill="#DC2626" font-size="22" font-weight="800">120 GB / 卡</text>
		<text x="18" y="258" fill="#475467" font-size="13">几乎全是重复——</text>
		<text x="18" y="280" fill="#475467" font-size="13">下一节 ZeRO 来削掉它</text>
	</g>
</svg>
