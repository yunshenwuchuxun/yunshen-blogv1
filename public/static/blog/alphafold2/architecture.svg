<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#a0aec0"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#805ad5"/>
    </marker>
  </defs>
  <rect width="860" height="360" rx="10" fill="#f7fafc" stroke="#e2e8f0"/>

  <!-- Title -->
  <text x="430" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#2d3748">AlphaFold2 整体架构（三大模块 + 回收机制）</text>

  <!-- ===== Module 1: Feature Extraction ===== -->
  <rect x="20" y="50" width="150" height="240" rx="8" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.5"/>
  <text x="95" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#2b6cb0">特征提取</text>

  <!-- MSA -->
  <rect x="34" y="86" width="122" height="48" rx="6" fill="#bee3f8" stroke="#4299e1" stroke-width="1"/>
  <text x="95" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#2b6cb0">MSA 搜索</text>
  <text x="95" y="122" text-anchor="middle" font-size="8" fill="#4a5568">jackhmmer / HHblits</text>

  <!-- Templates -->
  <rect x="34" y="144" width="122" height="48" rx="6" fill="#bee3f8" stroke="#4299e1" stroke-width="1"/>
  <text x="95" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#2b6cb0">结构模板</text>
  <text x="95" y="180" text-anchor="middle" font-size="8" fill="#4a5568">PDB 数据库搜索</text>

  <!-- Output representations -->
  <rect x="34" y="204" width="56" height="36" rx="5" fill="#fff" stroke="#4299e1" stroke-width="0.8"/>
  <text x="62" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#2b6cb0">MSA</text>
  <text x="62" y="232" text-anchor="middle" font-size="7" fill="#718096">(S,L,C)</text>

  <rect x="100" y="204" width="56" height="36" rx="5" fill="#fff" stroke="#4299e1" stroke-width="0.8"/>
  <text x="128" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#2b6cb0">Pair</text>
  <text x="128" y="232" text-anchor="middle" font-size="7" fill="#718096">(L,L,C')</text>

  <!-- Arrow: Features → Evoformer -->
  <line x1="170" y1="170" x2="208" y2="170" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Module 2: Evoformer ===== -->
  <rect x="210" y="50" width="300" height="240" rx="8" fill="#f5f0ff" stroke="#805ad5" stroke-width="1.5"/>
  <text x="360" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#6b46c1">Evoformer 编码器 (x48 Blocks)</text>

  <!-- MSA track -->
  <rect x="224" y="88" width="130" height="180" rx="6" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="289" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#553c9a">MSA 表示</text>
  <rect x="234" y="116" width="110" height="22" rx="4" fill="#fff" stroke="#805ad5" stroke-width="0.6"/>
  <text x="289" y="131" text-anchor="middle" font-size="8" fill="#553c9a">行注意力 + Pair 偏置</text>
  <rect x="234" y="144" width="110" height="22" rx="4" fill="#fff" stroke="#805ad5" stroke-width="0.6"/>
  <text x="289" y="159" text-anchor="middle" font-size="8" fill="#553c9a">列注意力</text>
  <rect x="234" y="172" width="110" height="22" rx="4" fill="#fff" stroke="#805ad5" stroke-width="0.6"/>
  <text x="289" y="187" text-anchor="middle" font-size="8" fill="#553c9a">Transition FFN</text>
  <rect x="234" y="204" width="110" height="26" rx="4" fill="#fefcbf" stroke="#d69e2e" stroke-width="0.8"/>
  <text x="289" y="221" text-anchor="middle" font-size="8" font-weight="600" fill="#975a16">Outer Product Mean</text>

  <!-- Pair track -->
  <rect x="370" y="88" width="130" height="180" rx="6" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="435" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#553c9a">Pair 表示</text>
  <rect x="380" y="116" width="110" height="22" rx="4" fill="#fff" stroke="#805ad5" stroke-width="0.6"/>
  <text x="435" y="131" text-anchor="middle" font-size="8" fill="#553c9a">三角自注意力 (Start)</text>
  <rect x="380" y="144" width="110" height="22" rx="4" fill="#fff" stroke="#805ad5" stroke-width="0.6"/>
  <text x="435" y="159" text-anchor="middle" font-size="8" fill="#553c9a">三角自注意力 (End)</text>
  <rect x="380" y="172" width="110" height="22" rx="4" fill="#fff" stroke="#805ad5" stroke-width="0.6"/>
  <text x="435" y="187" text-anchor="middle" font-size="8" fill="#553c9a">三角更新</text>
  <rect x="380" y="204" width="110" height="22" rx="4" fill="#fff" stroke="#805ad5" stroke-width="0.6"/>
  <text x="435" y="219" text-anchor="middle" font-size="8" fill="#553c9a">Transition FFN</text>

  <!-- Cross arrows between MSA and Pair -->
  <line x1="344" y1="218" x2="370" y2="130" stroke="#d69e2e" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <line x1="370" y1="125" x2="354" y2="125" stroke="#4299e1" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Arrow: Evoformer → Structure Module -->
  <line x1="510" y1="170" x2="548" y2="170" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Module 3: Structure Module ===== -->
  <rect x="550" y="50" width="170" height="240" rx="8" fill="#f0fff4" stroke="#38a169" stroke-width="1.5"/>
  <text x="635" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#276749">结构模块 (x8)</text>
  <text x="635" y="88" text-anchor="middle" font-size="9" fill="#38a169">共享参数</text>

  <!-- IPA -->
  <rect x="564" y="100" width="142" height="46" rx="6" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="635" y="120" text-anchor="middle" font-size="10" font-weight="700" fill="#276749">IPA 注意力</text>
  <text x="635" y="136" text-anchor="middle" font-size="8" fill="#38a169">SE(3) 不变性</text>

  <!-- Backbone Update -->
  <rect x="564" y="156" width="142" height="40" rx="6" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="635" y="172" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">骨架更新</text>
  <text x="635" y="186" text-anchor="middle" font-size="8" fill="#38a169">局部坐标系 &#8594; 全局</text>

  <!-- Torsion Angles -->
  <rect x="564" y="206" width="142" height="34" rx="6" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="635" y="228" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">扭转角预测</text>

  <!-- pLDDT -->
  <rect x="564" y="250" width="142" height="30" rx="6" fill="#fff" stroke="#38a169" stroke-width="0.8"/>
  <text x="635" y="270" text-anchor="middle" font-size="9" fill="#38a169">pLDDT 置信度 (0-100)</text>

  <!-- Arrow: Structure → Output -->
  <line x1="720" y1="170" x2="748" y2="170" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="750" y="110" width="90" height="120" rx="8" fill="#fed7d7" stroke="#fc8181" stroke-width="1.3"/>
  <text x="795" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#9b2c2c">3D</text>
  <text x="795" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#9b2c2c">坐标</text>
  <text x="795" y="190" text-anchor="middle" font-size="9" fill="#9b2c2c">(x, y, z)</text>
  <text x="795" y="206" text-anchor="middle" font-size="8" fill="#9b2c2c">每个原子</text>

  <!-- ===== Recycling Loop ===== -->
  <path d="M 795 230 L 795 320 L 95 320 L 95 290" fill="none" stroke="#805ad5" stroke-width="1.5" stroke-dasharray="8 4" marker-end="url(#arr-purple)"/>
  <rect x="340" y="308" width="180" height="24" rx="5" fill="#f5f0ff" stroke="#805ad5" stroke-width="0.8"/>
  <text x="430" y="325" text-anchor="middle" font-size="10" font-weight="600" fill="#6b46c1">Recycling 回收机制 (x3)</text>
</svg>