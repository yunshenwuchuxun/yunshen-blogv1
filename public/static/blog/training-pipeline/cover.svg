<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">大模型的基本训练流程 封面</title>
	<desc id="desc">一个能用的大模型不是一次训练出来的，而是一条流水线：预训练学通用知识、SFT 学会听话、偏好对齐把它调得更合人心意。</desc>
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#0b1120" />
			<stop offset="0.5" stop-color="#111a2e" />
			<stop offset="1" stop-color="#1e293b" />
		</linearGradient>
		<linearGradient id="accentA" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#818cf8" />
			<stop offset="1" stop-color="#22d3ee" />
		</linearGradient>
	</defs>
	<rect width="1200" height="630" fill="url(#bg)" />

	<text x="80" y="116" fill="#a5b4fc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="3">DATAWHALE diy-llm · CH.13</text>
	<text x="80" y="196" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="800">大模型的基本训练流程</text>
	<text x="80" y="256" fill="url(#accentA)" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">预训练 → SFT → 偏好对齐</text>

	<text x="80" y="324" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="23">一个能用的模型不是"跑一次训练"，而是一条流水线：</text>
	<text x="80" y="360" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="23">先学通用知识，再学会听话，最后调得更合人心意。</text>

	<!-- 底部：三段式流水线，模型逐级被"打磨" -->
	<g transform="translate(80,430)" font-family="Inter, Arial, sans-serif">
		<rect x="0" y="30" width="300" height="86" rx="14" fill="#1e293b" stroke="#818cf8" stroke-width="2" />
		<text x="24" y="66" fill="#c7d2fe" font-size="19" font-weight="700">① 预训练</text>
		<text x="24" y="94" fill="#94a3b8" font-size="14">海量文本 · next-token · 学知识</text>

		<path d="M304 73 L 356 73" stroke="#64748b" stroke-width="2.5" marker-end="url(#a)" />

		<rect x="360" y="30" width="300" height="86" rx="14" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
		<text x="384" y="66" fill="#bae6fd" font-size="19" font-weight="700">② SFT</text>
		<text x="384" y="94" fill="#94a3b8" font-size="14">少量高质量演示 · 学会听话</text>

		<path d="M664 73 L 716 73" stroke="#64748b" stroke-width="2.5" marker-end="url(#a)" />

		<rect x="720" y="30" width="300" height="86" rx="14" fill="#1e293b" stroke="#34d399" stroke-width="2" />
		<text x="744" y="66" fill="#a7f3d0" font-size="19" font-weight="700">③ 偏好对齐</text>
		<text x="744" y="94" fill="#94a3b8" font-size="14">RLHF / DPO / RLVR · 合人意</text>
	</g>
	<defs>
		<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#64748b" /></marker>
	</defs>
</svg>
