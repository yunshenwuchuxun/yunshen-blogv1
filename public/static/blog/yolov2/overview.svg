<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7FB"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DE1D8D"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 42px Inter, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 22px Inter, Arial, sans-serif; fill: #334155; }
      .label { font: 700 22px Inter, Arial, sans-serif; fill: #0F172A; }
      .body { font: 400 18px Inter, Arial, sans-serif; fill: #475569; }
      .small { font: 600 16px Inter, Arial, sans-serif; fill: #64748B; letter-spacing: 0.04em; }
      .pill { font: 700 16px Inter, Arial, sans-serif; fill: #FFFFFF; }
      .mini { font: 600 15px Inter, Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>

  <rect x="56" y="48" width="196" height="36" rx="18" fill="url(#accent)"/>
  <text x="154" y="72" text-anchor="middle" class="pill">YOLOv2 Overview</text>

  <text x="56" y="138" class="title">从统一回归到更成熟的检测系统</text>
  <text x="56" y="176" class="subtitle">YOLOv2 用 Better、Faster、Stronger 三条主线补齐 YOLOv1 的关键短板</text>

  <g filter="url(#shadow)">
    <rect x="56" y="228" width="320" height="384" rx="24" fill="#FFFFFF"/>
    <rect x="440" y="228" width="320" height="384" rx="24" fill="#FFFFFF"/>
    <rect x="824" y="228" width="320" height="384" rx="24" fill="#FFFFFF"/>
  </g>

  <text x="88" y="276" class="small">BETTER</text>
  <text x="88" y="314" class="label">更准、更稳</text>
  <text x="88" y="358" class="body">• BN 提升训练稳定性</text>
  <text x="88" y="392" class="body">• Anchor 取代直接回归</text>
  <text x="88" y="426" class="body">• K-means 生成先验框</text>
  <text x="88" y="460" class="body">• Sigmoid 约束中心点偏移</text>
  <text x="88" y="494" class="body">• Passthrough 改善小目标</text>
  <rect x="88" y="544" width="170" height="32" rx="16" fill="#FCE7F3"/>
  <text x="173" y="565" text-anchor="middle" class="mini">召回率与稳定性提升</text>

  <text x="472" y="276" class="small">FASTER</text>
  <text x="472" y="314" class="label">更快、更灵活</text>
  <text x="472" y="358" class="body">• Darknet-19 更轻量</text>
  <text x="472" y="392" class="body">• 全卷积检测头</text>
  <text x="472" y="426" class="body">• 416 × 416 输入更自然</text>
  <text x="472" y="460" class="body">• 多尺度训练适配不同分辨率</text>
  <rect x="472" y="544" width="176" height="32" rx="16" fill="#EDE9FE"/>
  <text x="560" y="565" text-anchor="middle" class="mini">速度与精度更可权衡</text>

  <text x="856" y="276" class="small">STRONGER</text>
  <text x="856" y="314" class="label">更大类别空间</text>
  <text x="856" y="358" class="body">• 检测数据学定位</text>
  <text x="856" y="392" class="body">• 分类数据学细粒度语义</text>
  <text x="856" y="426" class="body">• WordTree 统一标签体系</text>
  <text x="856" y="460" class="body">• YOLO9000 扩展到 9000+ 类</text>
  <rect x="856" y="544" width="186" height="32" rx="16" fill="#E0F2FE"/>
  <text x="949" y="565" text-anchor="middle" class="mini">从检测器走向大类别体系</text>

  <path d="M376 420H440" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M760 420H824" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M412 404L440 420L412 436" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M796 404L824 420L796 436" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
