<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" fill="none" role="img" aria-labelledby="t d">
	<title id="t">数据工程的三大风险</title>
	<desc id="d">版权合规、数据投毒（约 250 份恶意文档即可植入后门）、以及高频重复导致的记忆与隐私泄露。</desc>
	<rect width="1200" height="430" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="382" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />
	<text x="56" y="72" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">三大绕不开的数据风险</text>
	<text x="56" y="102" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="17">数据工程不只是工程问题，还牵涉法律、安全与隐私。</text>

	<g font-family="Inter, Arial, sans-serif">
		<!-- 版权 -->
		<rect x="64" y="140" width="340" height="240" rx="16" fill="#EEF2FF" stroke="#6366F1" />
		<circle cx="104" cy="184" r="20" fill="#6366F1" /><text x="104" y="191" fill="#FFFFFF" font-size="20" font-weight="800" text-anchor="middle">©</text>
		<text x="138" y="191" fill="#3730A3" font-size="20" font-weight="700">版权</text>
		<text x="88" y="236" fill="#4338CA" font-size="15">互联网内容默认受保护，</text>
		<text x="88" y="262" fill="#4338CA" font-size="15">"合理使用"仍有争议</text>
		<text x="88" y="288" fill="#4338CA" font-size="15">（如 NYT 诉 OpenAI）。</text>
		<rect x="88" y="312" width="290" height="48" rx="10" fill="#FFFFFF" stroke="#6366F1" />
		<text x="233" y="341" fill="#3730A3" font-size="14" font-weight="700" text-anchor="middle">对策：优先公版 / 开源 / 自有</text>

		<!-- 投毒（重点） -->
		<rect x="430" y="140" width="340" height="240" rx="16" fill="#FEF2F2" stroke="#EF4444" />
		<circle cx="470" cy="184" r="20" fill="#EF4444" /><text x="470" y="191" fill="#FFFFFF" font-size="20" font-weight="800" text-anchor="middle">!</text>
		<text x="504" y="191" fill="#991B1B" font-size="20" font-weight="700">数据投毒</text>
		<text x="600" y="262" fill="#DC2626" font-size="64" font-weight="800" text-anchor="middle">250</text>
		<text x="600" y="294" fill="#991B1B" font-size="15" text-anchor="middle">份恶意文档即可植入后门</text>
		<rect x="454" y="312" width="290" height="48" rx="10" fill="#FFFFFF" stroke="#EF4444" />
		<text x="599" y="341" fill="#991B1B" font-size="14" font-weight="700" text-anchor="middle">且与模型规模基本无关</text>

		<!-- 记忆/隐私 -->
		<rect x="796" y="140" width="340" height="240" rx="16" fill="#F5F3FF" stroke="#7C3AED" />
		<circle cx="836" cy="184" r="20" fill="#7C3AED" /><text x="836" y="191" fill="#FFFFFF" font-size="18" font-weight="800" text-anchor="middle">🔒</text>
		<text x="870" y="191" fill="#5B21B6" font-size="20" font-weight="700">记忆与隐私</text>
		<text x="820" y="236" fill="#6D28D9" font-size="15">高频重复样本导致</text>
		<text x="820" y="262" fill="#6D28D9" font-size="15">模型"机械记忆"，</text>
		<text x="820" y="288" fill="#6D28D9" font-size="15">带来隐私泄露风险。</text>
		<rect x="820" y="312" width="290" height="48" rx="10" fill="#FFFFFF" stroke="#7C3AED" />
		<text x="965" y="341" fill="#5B21B6" font-size="14" font-weight="700" text-anchor="middle">对策：去重 + 信息探针检测</text>
	</g>
</svg>
