<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">大模型数据工程封面</title>
	<desc id="desc">数据工程是大模型真正的护城河：把海量互联网原始数据，经清洗、筛选、去重，炼成干净的训练语料。</desc>
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#0b1120" />
			<stop offset="0.5" stop-color="#111a2e" />
			<stop offset="1" stop-color="#1e293b" />
		</linearGradient>
		<linearGradient id="accentA" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#22d3ee" />
			<stop offset="1" stop-color="#a78bfa" />
		</linearGradient>
		<filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
			<feGaussianBlur stdDeviation="5" result="blur" />
			<feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
		</filter>
	</defs>
	<rect width="1200" height="630" fill="url(#bg)" />

	<text x="80" y="116" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="3">DATAWHALE diy-llm · CH.11</text>
	<text x="80" y="196" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="800">大模型数据工程</text>
	<text x="80" y="258" fill="url(#accentA)" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">被低估的护城河</text>

	<text x="80" y="324" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="23">数据往往比模型结构更关键，也最难复制。</text>
	<text x="80" y="360" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="23">把海量互联网"垃圾"清洗、筛选、去重，炼成干净语料。</text>

	<!-- 右侧：数据漏斗 -->
	<g transform="translate(740,150)" font-family="Inter, Arial, sans-serif">
		<!-- 原始数据点（杂乱） -->
		<g fill="#475569">
			<rect x="20" y="0" width="300" height="70" rx="10" fill="#1e293b" stroke="#334155" />
		</g>
		<text x="170" y="42" fill="#64748b" font-size="18" text-anchor="middle">原始网页（噪声）</text>
		<!-- 漏斗 -->
		<path d="M40 90 L300 90 L210 230 L130 230 Z" fill="url(#accentA)" opacity="0.18" stroke="#22d3ee" stroke-width="1.5" />
		<text x="170" y="135" fill="#7dd3fc" font-size="14" text-anchor="middle">提取 · 过滤</text>
		<text x="170" y="160" fill="#7dd3fc" font-size="14" text-anchor="middle">筛选 · 去重</text>
		<!-- 干净 tokens -->
		<rect x="110" y="248" width="120" height="56" rx="10" fill="#0e7490" stroke="#22d3ee" filter="url(#glow)" />
		<text x="170" y="282" fill="#e0f2fe" font-size="18" font-weight="700" text-anchor="middle">干净语料</text>
		<text x="170" y="330" fill="#94a3b8" font-size="14" text-anchor="middle">3T–36T tokens</text>
	</g>
</svg>
