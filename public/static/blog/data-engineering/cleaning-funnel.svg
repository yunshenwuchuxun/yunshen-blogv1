<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" fill="none" role="img" aria-labelledby="t d">
	<title id="t">数据清洗漏斗</title>
	<desc id="d">原始网页经正文提取、语言识别、质量过滤、去重，体积层层缩小，最终得到干净语料。</desc>
	<rect width="1200" height="480" rx="28" fill="#F8FAFC" />
	<rect x="24" y="24" width="1152" height="432" rx="24" fill="#FFFFFF" stroke="#D0D5DD" />
	<text x="56" y="72" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">清洗漏斗：从 PB 级噪声到 TB 级语料</text>
	<text x="56" y="102" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="17">每一道工序都在丢弃噪声、保留正文，原始抓取里最终只有一小部分能进训练集。</text>

	<g font-family="Inter, Arial, sans-serif">
		<!-- 漏斗梯形分层（逐层变窄） -->
		<!-- 1 原始网页 -->
		<path d="M120 150 L1080 150 L980 200 L220 200 Z" fill="#FECACA" stroke="#EF4444" />
		<text x="600" y="182" fill="#991B1B" font-size="17" font-weight="700" text-anchor="middle">原始网页快照（Common Crawl，含大量噪声）</text>
		<!-- 2 正文提取 -->
		<path d="M220 210 L980 210 L900 258 L300 258 Z" fill="#FED7AA" stroke="#EA580C" />
		<text x="600" y="240" fill="#9A3412" font-size="16" font-weight="700" text-anchor="middle">正文提取：去 HTML / 模板 / 列表（C4 启发式）</text>
		<!-- 3 语言识别 -->
		<path d="M300 268 L900 268 L840 316 L360 316 Z" fill="#FEF08A" stroke="#CA8A04" />
		<text x="600" y="298" fill="#854D0E" font-size="16" font-weight="700" text-anchor="middle">语言识别（LID）：按目标语言保留</text>
		<!-- 4 质量过滤 -->
		<path d="M360 326 L840 326 L790 374 L410 374 Z" fill="#BBF7D0" stroke="#16A34A" />
		<text x="600" y="356" fill="#166534" font-size="16" font-weight="700" text-anchor="middle">质量过滤：困惑度分档（CCNet）</text>
		<!-- 5 去重 -->
		<path d="M410 384 L790 384 L740 420 L460 420 Z" fill="#A5F3FC" stroke="#0891B2" />
		<text x="600" y="408" fill="#155E75" font-size="15" font-weight="700" text-anchor="middle">去重：精确 + 近似（LSH）</text>
		<!-- 出口 -->
		<rect x="520" y="424" width="160" height="2" fill="#0891B2" />

		<!-- 右侧体积标注 -->
		<text x="1110" y="180" fill="#991B1B" font-size="14" text-anchor="end">体量大</text>
		<text x="1110" y="410" fill="#155E75" font-size="14" text-anchor="end">体量小、质量高</text>
		<path d="M1120 195 L1120 395" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#fa)" />
	</g>
	<defs>
		<marker id="fa" markerWidth="11" markerHeight="11" refX="6" refY="8" orient="auto"><path d="M0 0 L8 0 L4 8 z" fill="#94A3B8" /></marker>
	</defs>
</svg>
