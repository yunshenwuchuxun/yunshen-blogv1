<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7FB"/>
      <stop offset="1" stop-color="#F7FAFF"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DE1D8D"/>
      <stop offset="1" stop-color="#F575A5"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="1200" height="680" rx="32" fill="url(#bg)"/>
  <text x="70" y="82" fill="#111827" font-size="36" font-family="Inter, Arial, sans-serif" font-weight="700">YOLOv5 定向优化总览</text>
  <text x="70" y="118" fill="#4B5563" font-size="20" font-family="Inter, Arial, sans-serif">围绕特征提取、上下文建模与框回归的三处增强</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="240" height="300" rx="24" fill="#111827"/>
  </g>
  <text x="110" y="220" fill="white" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">Baseline</text>
  <text x="110" y="260" fill="#F9FAFB" font-size="24" font-family="Inter, Arial, sans-serif">YOLOv5s</text>
  <rect x="110" y="300" width="160" height="42" rx="12" fill="#1F2937" stroke="#374151"/>
  <text x="140" y="328" fill="#E5E7EB" font-size="20" font-family="Inter, Arial, sans-serif">Backbone</text>
  <rect x="110" y="354" width="160" height="42" rx="12" fill="#1F2937" stroke="#374151"/>
  <text x="160" y="382" fill="#E5E7EB" font-size="20" font-family="Inter, Arial, sans-serif">Neck</text>
  <rect x="110" y="408" width="160" height="42" rx="12" fill="#1F2937" stroke="#374151"/>
  <text x="162" y="436" fill="#E5E7EB" font-size="20" font-family="Inter, Arial, sans-serif">Head</text>

  <path d="M330 320H430" stroke="#6B7280" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M330 380H430" stroke="#6B7280" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M330 440H430" stroke="#6B7280" stroke-width="5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="440" y="210" width="300" height="110" rx="24" fill="white"/>
    <rect x="440" y="340" width="300" height="110" rx="24" fill="white"/>
    <rect x="440" y="470" width="300" height="110" rx="24" fill="white"/>
  </g>

  <rect x="466" y="232" width="96" height="28" rx="14" fill="url(#pink)"/>
  <text x="490" y="252" fill="white" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="700">CBAM</text>
  <text x="466" y="286" fill="#111827" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">抑制背景噪声</text>
  <text x="466" y="314" fill="#4B5563" font-size="18" font-family="Inter, Arial, sans-serif">让特征更聚焦于虫害区域与关键纹理</text>

  <rect x="466" y="362" width="96" height="28" rx="14" fill="url(#blue)"/>
  <text x="491" y="382" fill="white" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="700">ASPP</text>
  <text x="466" y="416" fill="#111827" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">增强多尺度上下文</text>
  <text x="466" y="444" fill="#4B5563" font-size="18" font-family="Inter, Arial, sans-serif">同时理解局部病灶细节与整片叶片结构</text>

  <rect x="466" y="492" width="130" height="28" rx="14" fill="#7C3AED"/>
  <text x="483" y="512" fill="white" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="700">Alpha-IoU</text>
  <text x="466" y="546" fill="#111827" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">优化框回归梯度</text>
  <text x="466" y="574" fill="#4B5563" font-size="18" font-family="Inter, Arial, sans-serif">让高质量预测框继续被精细修正</text>

  <path d="M760 390H870" stroke="#6B7280" stroke-width="5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="880" y="225" width="250" height="280" rx="28" fill="#FFFFFF"/>
  </g>
  <text x="928" y="272" fill="#111827" font-size="32" font-family="Inter, Arial, sans-serif" font-weight="700">YOLOPC</text>
  <text x="928" y="308" fill="#4B5563" font-size="20" font-family="Inter, Arial, sans-serif">面向虫害检测的定制版 YOLOv5</text>

  <circle cx="935" cy="362" r="8" fill="#DE1D8D"/>
  <text x="957" y="369" fill="#111827" font-size="20" font-family="Inter, Arial, sans-serif">特征更干净</text>
  <circle cx="935" cy="408" r="8" fill="#2563EB"/>
  <text x="957" y="415" fill="#111827" font-size="20" font-family="Inter, Arial, sans-serif">上下文更完整</text>
  <circle cx="935" cy="454" r="8" fill="#7C3AED"/>
  <text x="957" y="461" fill="#111827" font-size="20" font-family="Inter, Arial, sans-serif">定位更精细</text>

  <text x="70" y="620" fill="#6B7280" font-size="18" font-family="Inter, Arial, sans-serif">关键词：小目标、复杂背景、尺度变化大、轻量部署</text>
</svg>
