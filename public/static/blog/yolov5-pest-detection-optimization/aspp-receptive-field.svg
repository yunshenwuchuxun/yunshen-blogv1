<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#F9FAFB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#9CA3AF"/>
    </marker>
  </defs>
  <rect width="1200" height="700" rx="32" fill="url(#bg)"/>
  <text x="60" y="76" fill="#111827" font-size="36" font-family="Inter, Arial, sans-serif" font-weight="700">ASPP：并行空洞卷积扩大感受野</text>
  <text x="60" y="112" fill="#4B5563" font-size="20" font-family="Inter, Arial, sans-serif">目标：在轻量结构下同时捕获局部细节与大范围上下文</text>

  <g filter="url(#shadow)">
    <rect x="80" y="190" width="220" height="320" rx="24" fill="#FFFFFF"/>
    <rect x="360" y="170" width="160" height="110" rx="24" fill="#FFFFFF"/>
    <rect x="360" y="300" width="160" height="110" rx="24" fill="#FFFFFF"/>
    <rect x="360" y="430" width="160" height="110" rx="24" fill="#FFFFFF"/>
    <rect x="580" y="240" width="240" height="220" rx="24" fill="#FFFFFF"/>
    <rect x="890" y="215" width="240" height="270" rx="24" fill="#FFFFFF"/>
  </g>

  <text x="125" y="238" fill="#111827" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">输入特征图</text>
  <rect x="128" y="280" width="120" height="120" rx="18" fill="#DBEAFE" stroke="#60A5FA" stroke-width="3"/>
  <path d="M128 320H248M128 360H248M168 280V400M208 280V400" stroke="#60A5FA" stroke-width="2" opacity="0.8"/>
  <circle cx="188" cy="340" r="14" fill="#2563EB" fill-opacity="0.35"/>
  <text x="113" y="445" fill="#4B5563" font-size="18" font-family="Inter, Arial, sans-serif">同一份高层语义特征</text>

  <path d="M300 350H340" stroke="#9CA3AF" stroke-width="5" marker-end="url(#arrow)"/>

  <text x="390" y="212" fill="#111827" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">3×3 空洞卷积</text>
  <text x="410" y="245" fill="#1D4ED8" font-size="20" font-family="Inter, Arial, sans-serif">rate = 1</text>
  <text x="385" y="342" fill="#111827" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">3×3 空洞卷积</text>
  <text x="410" y="375" fill="#2563EB" font-size="20" font-family="Inter, Arial, sans-serif">rate = 3</text>
  <text x="385" y="472" fill="#111827" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">3×3 空洞卷积</text>
  <text x="410" y="505" fill="#3B82F6" font-size="20" font-family="Inter, Arial, sans-serif">rate = 5</text>

  <path d="M520 225H560" stroke="#9CA3AF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M520 355H560" stroke="#9CA3AF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M520 485H560" stroke="#9CA3AF" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="635" y="288" fill="#111827" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">Concat + Fuse</text>
  <rect x="635" y="330" width="130" height="22" rx="11" fill="#93C5FD"/>
  <rect x="635" y="358" width="160" height="22" rx="11" fill="#60A5FA"/>
  <rect x="635" y="386" width="190" height="22" rx="11" fill="#2563EB"/>
  <text x="633" y="432" fill="#4B5563" font-size="18" font-family="Inter, Arial, sans-serif">把不同感受野的特征拼接后再融合</text>

  <path d="M820 350H870" stroke="#9CA3AF" stroke-width="5" marker-end="url(#arrow)"/>

  <text x="935" y="258" fill="#111827" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">输出特征</text>
  <text x="935" y="292" fill="#4B5563" font-size="18" font-family="Inter, Arial, sans-serif">局部 + 全局上下文同时可用</text>
  <circle cx="962" cy="356" r="12" fill="#2563EB"/>
  <text x="986" y="363" fill="#111827" font-size="20" font-family="Inter, Arial, sans-serif">小病斑细节</text>
  <circle cx="962" cy="406" r="12" fill="#60A5FA"/>
  <text x="986" y="413" fill="#111827" font-size="20" font-family="Inter, Arial, sans-serif">叶片整体纹理</text>
  <circle cx="962" cy="456" r="12" fill="#93C5FD"/>
  <text x="986" y="463" fill="#111827" font-size="20" font-family="Inter, Arial, sans-serif">尺度变化鲁棒性</text>

  <rect x="80" y="575" width="1050" height="78" rx="20" fill="#0F172A"/>
  <text x="108" y="624" fill="#E2E8F0" font-size="22" font-family="Inter, Arial, sans-serif">感受野公式：r = k + (k - 1)(e - 1)，在卷积核大小不变时，提高膨胀率 e 就能扩大感受野。</text>
</svg>
